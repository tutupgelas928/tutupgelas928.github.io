<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- Default fallback (will be replaced by JS) -->  <title>Page</title>
  <meta name="description" content="Page">
  <link rel="canonical" href="/">  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
      background: #ffffff;
      color: #111;
    }

    .container {
      max-width: 720px;
      margin: 60px auto;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
    }

    .box {
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #eee;
      border-radius: 10px;
      background: #fafafa;
    }

    a {
      color: #0066cc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .container {
        margin: 30px auto;
      }
      h1 {
        font-size: 22px;
      }
    }
  </style></head><body>
  <div class="container">
    <h1 id="title"></h1>
    <p id="desc"></p><div class="box">
  <strong>Latest posts:</strong>
  <ul>
    {% for post in site.posts limit:5 %}
      <li><a href="{{ post.url }}">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
</div>

<div class="box">
  <a href="/">← Back to homepage</a>
</div>

  </div><script>
(function() {
  const { hostname, pathname, origin } = window.location;

  // Get slug
  let slug = pathname.split('/').filter(Boolean).pop();
  if (!slug) slug = "home";

  // Convert slug → Title Case
  function slugToTitle(slug) {
    return slug
      .replace(/[-_]+/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  const readable = slugToTitle(slug);

  // Build SEO values
  const fullTitle = readable + " | " + hostname;
  const description = `Explore ${readable} on ${hostname}. Find related content, guides, and useful resources.`;
  const canonical = origin + pathname;

  // Inject visible content
  document.getElementById("title").innerText = readable + " - " + hostname;
  document.getElementById("desc").innerText = description;

  // Update <title>
  document.title = fullTitle;

  // Update meta description
  let metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.setAttribute("content", description);

  // Update canonical
  let linkCanonical = document.querySelector("link[rel='canonical']");
  if (linkCanonical) linkCanonical.setAttribute("href", canonical);

})();
</script></body>
</html>
