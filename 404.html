<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Loading...</title>
  <meta name="description" content="Loading...">
  <link rel="canonical" href="/"></head><body>
  <h1 id="h1"></h1>
  <p id="desc"></p><script>
(function() {
  const { origin, hostname, pathname, search } = window.location;

  // --- 1. PRIORITY: query param (?q=...)
  const params = new URLSearchParams(search);
  let raw = params.get("q");

  // --- 2. fallback: last slug
  if (!raw) {
    const segments = pathname.split('/').filter(Boolean);
    raw = segments.length ? segments[segments.length - 1] : "home";
  }

  // --- 3. decode safely
  try {
    raw = decodeURIComponent(raw);
  } catch(e) {}

  // --- 4. CLEAN (Unicode-safe)
  function normalize(str) {
    return str
      // replace separators with space
      .replace(/[-_]+/g, ' ')

      // split letters and numbers
      .replace(/([\\p{L}])([0-9])/gu, '$1 $2')
      .replace(/([0-9])([\\p{L}])/gu, '$1 $2')

      // remove only dangerous chars (keep Unicode letters & numbers)
      .replace(/[^\p{L}\p{N}\s]/gu, '')

      // normalize spaces
      .replace(/\s+/g, ' ')
      .trim();
  }

  // --- 5. Title Case (Unicode-safe)
  function toTitle(str) {
    return str.replace(/\b\p{L}/gu, c => c.toUpperCase());
  }

  const clean = normalize(raw);
  const keyword = toTitle(clean || "Home");

  // --- dynamic values
  const title = keyword + " | " + hostname;
  const description = `${keyword} on ${hostname}`;
  const canonical = origin + pathname;

  // --- inject content
  document.getElementById("h1").innerText = keyword;
  document.getElementById("desc").innerText = description;

  document.title = title;

  let metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.setAttribute("content", description);

  let linkCanonical = document.querySelector("link[rel='canonical']");
  if (linkCanonical) linkCanonical.setAttribute("href", canonical);

})();
</script></body>
</html>
