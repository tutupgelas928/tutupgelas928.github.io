name: Mirror Upstream (Force Except Workflows + Index + Functions)

on:
  schedule:
    - cron: "0 0 */1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Save local files
        run: |
          mkdir -p /tmp/backup
          
          if [ -d ".github/workflows" ]; then
            cp -r .github/workflows /tmp/backup/
          fi
          
          if [ -f "index.html" ]; then
            cp index.html /tmp/backup/
          fi

          if [ -d "functions" ]; then
            cp -r functions /tmp/backup/
          fi

      - name: Add upstream
        run: |
          git remote remove upstream || true
          git remote add upstream https://github.com/raisfz/raisfz.github.io.git
          git fetch upstream

      - name: Hard reset to upstream
        run: |
          git reset --hard upstream/master

      - name: Restore excluded files
        run: |
          rm -rf .github/workflows
          rm -rf functions
          
          if [ -d "/tmp/backup/workflows" ]; then
            mkdir -p .github
            cp -r /tmp/backup/workflows .github/
          fi
          
          if [ -f "/tmp/backup/index.html" ]; then
            cp /tmp/backup/index.html index.html
          fi

          if [ -d "/tmp/backup/functions" ]; then
            cp -r /tmp/backup/functions .
          fi

      - name: Force push to fork
        run: |
          git add .
          git commit -m "Force sync except workflows, index.html, and functions" || echo "No changes"
          git push origin master --force
