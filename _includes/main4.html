<style>

/* CARD POST */
.post-item{
  background:#fff;
  padding:12px;
  margin-bottom:12px;
  border:1px solid #e5e5e5;
  border-radius:6px;
}

.post-item h2{
  font-size:16px;
  margin-bottom:6px;
}

.post-item h2 a{
  text-decoration:none;
  color:#111;
}

.excerpt{
  font-size:13px;
  color:#555;
}

</style>

<center><b>Latest Posts</b></center>

{% for post in site.posts limit:20 %}

<div class="post-item">

<h2>
<a href="{{ post.url }}">
{{ post.title }}
</a>
</h2>

<div class="excerpt">
{{ post.description }}
</div>

</div>

{% endfor %}
