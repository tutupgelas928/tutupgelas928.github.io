<style>
.spo {
  display:flex;flex-wrap:nowrap;overflow-x:auto;white-space:nowrap;list-style:none;margin:0;padding:0;gap:10px;
}
</style>

<script defer>
document.querySelectorAll('div.spo').forEach(div => {
  const ul = document.createElement('ul');
  ul.className = div.className;

  div.querySelectorAll('a').forEach(a => {
    const li = document.createElement('li');
    li.appendChild(a);
    ul.appendChild(li);
  });

  div.replaceWith(ul);
});
</script>
