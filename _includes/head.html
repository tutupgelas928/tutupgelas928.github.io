<style>
.spo {
  display:flex;flex-wrap:nowrap;overflow-x:auto;white-space:nowrap;list-style:none;margin:0;padding:0;gap:10px;
}
</style>

<script defer>
function initSpo() {
  document.querySelectorAll('.spo').forEach(el => {
    let ul;

    // convert div → ul
    if (el.tagName.toLowerCase() === 'div') {
      ul = document.createElement('ul');
      ul.className = el.className;

      el.querySelectorAll('a').forEach(a => {
        const li = document.createElement('li');
        li.appendChild(a);
        ul.appendChild(li);
      });

      el.replaceWith(ul);
    } else {
      ul = el;
    }

    // kalau sudah pernah diproses → skip
    if (ul.dataset.done) return;
    ul.dataset.done = "true";

    // menu default
    const menu = [
      { href: "/post/", text: "latest post" },
      { href: "/categories/", text: "categories" },
      { href: "/tags/", text: "tags" },
      { href: "/labels/", text: "labels" },
      { href: "/keywords/", text: "keywords" },
      { href: "/search", text: "latest search" }
    ];

    menu.reverse().forEach(item => {
      const li = document.createElement('li');
      const a = document.createElement('a');

      a.href = item.href;
      a.textContent = item.text;

      li.appendChild(a);
      ul.insertBefore(li, ul.firstChild);
    });
  });
}

// jalan normal
initSpo();

// fallback kalau Jekyll load belakangan
setTimeout(initSpo, 200);
</script>
