<footer style="text-align: center; padding: 30px 20px; font-size: 16px; color: #666;">
  <small>
    &copy; </small>
<span id="current-year"></span> 
 -  <a id="main-heading2" href="/" style="color: inherit; text-decoration: none;"></a>.
  <span>   All rights reserved.</span> 
  <script>
    (function () {
      const domain = window.location.hostname || "";
      const parts = domain.split(".");
      let brand = "";
      let rootDomain = domain;
      // Khusus untuk .my.id
      if (domain.endsWith(".my.id") && parts.length > 2) {
        // Ambil nama domain utama (2 bagian sebelum .my.id)
        const baseName = parts[parts.length - 3]; // contoh: domain / do-main
        rootDomain = "www." + baseName + ".my.id";

        // Ubah jadi Title Case dengan spasi jika ada tanda minus
        brand = baseName
          .split("-")
          .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
          .join(" ");
      }

      // Update elemen
      document.getElementById("current-year").textContent = new Date().getFullYear();
      const headingEl = document.getElementById("main-heading2");
      headingEl.textContent = brand;
      headingEl.href = "https://" + rootDomain;
    })();
  </script>
</footer>







<script defer>
function initSpo() {
  document.querySelectorAll('.spo').forEach(el => {
    let ul = el;

    // convert div → ul
    if (el.tagName.toLowerCase() === 'div') {
      ul = document.createElement('ul');
      ul.className = el.className;

      el.querySelectorAll('a').forEach(a => {
        const li = document.createElement('li');
        li.appendChild(a);
        ul.appendChild(li);
      });

      el.replaceWith(ul);
    }

    // pastikan hanya sekali proses
    if (ul.dataset.done === "true") return;
    ul.dataset.done = "true";

    // menu default
    const menu = [
      { href: "https://fazri.my.id/post/", text: "____________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________" },
      { href: "https://fazri.my.id/categories/", text: "categories" },
      { href: "https://fazri.my.id/tags/", text: "tags" },
      { href: "https://fazri.my.id/labels/", text: "labels" },
      { href: "https://fazri.my.id/keywords/", text: "keywords" },
      { href: "https://fazri.my.id/search", text: "latest search" }
    ];

    // CEK apakah sudah ada menu (biar ga dobel walau beda struktur)
    const firstLink = ul.querySelector('li a');
    if (firstLink && firstLink.getAttribute('href') === "/post/") return;

    // insert ke depan
    menu.slice().reverse().forEach(item => {
      const li = document.createElement('li');
      const a = document.createElement('a');

      a.href = item.href;
      a.textContent = item.text;

      li.appendChild(a);
      ul.insertBefore(li, ul.firstChild);
    });
  });
}

initSpo();
setTimeout(initSpo, 200);
</script>
