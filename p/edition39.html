<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="bingbot" content="index, follow">
    <meta name="yandex" content="index, follow">
    <meta name="referrer" content="always">
    <title id="dynamic-title">SIDE NAVIGATION · Leak Directory Menu</title>
    <meta id="dynamic-description" name="description" content="Side navigation directory for leak collections. Hierarchical menu system.">
    <link id="dynamic-canonical" rel="canonical" href="https://example.com/edition-b40/">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica Neue,sans-serif;color:#0f172a}
        
        /* === GLOBAL COLOR VARIABLES === */
        :root {
            --primary-color: #3b82f6;    /* ONE GLOBAL PRIMARY COLOR - Change this to any color */
            --primary-hover: #2563eb;
            --primary-light: #eff6ff;
            --primary-soft: #60a5fa;
            --text-dark: #0f172a;
            --text-gray: #475569;
            --text-light: #64748b;
            --border-light: #e2e8f0;
            --bg-white: #ffffff;
            --bg-soft: #f8fafc;
            --bg-dark: #0f172a;
        }
        
        /* Sidebar Navigation Style - Like Dashboard Side Menu */
        .nav-container{max-width:1200px;margin:0 auto;padding:20px}
        
        /* Header */
        .nav-header{background:var(--bg-white);border-radius:16px;padding:20px;margin-bottom:24px;border:1px solid var(--border-light)}
        .header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:8px}
        .logo{font-size:1.1rem;font-weight:800}
        .logo span{color:var(--primary-color)}
        .menu-code{font-family:monospace;font-size:0.6rem;color:var(--text-light);background:var(--bg-soft);padding:4px 12px;border-radius:20px}
        .header-desc{font-size:0.7rem;color:var(--text-light)}
        
        /* Breadcrumb */
        .breadcrumb{font-size:0.7rem;color:var(--text-light);margin-bottom:20px}
        .breadcrumb a{color:var(--primary-color);text-decoration:none}
        .breadcrumb a:hover{text-decoration:underline}
        
        /* Hero */
        .hero-nav{background:var(--bg-dark);color:#fff;border-radius:16px;padding:28px;margin-bottom:28px}
        .hero-badge{font-size:0.65rem;color:#94a3b8;margin-bottom:8px}
        .hero-title{font-size:1.2rem;font-weight:700;margin-bottom:12px}
        .hero-title span{color:var(--primary-soft)}
        .hero-desc{font-size:0.75rem;color:#cbd5e1;line-height:1.5;margin-bottom:14px}
        .hero-stats{display:flex;gap:24px;flex-wrap:wrap;font-size:0.6rem;color:#94a3b8}
        
        /* Main Grid - 2 Columns (Sidebar + Content) */
        .nav-grid{display:grid;grid-template-columns:300px 1fr;gap:24px;margin-bottom:32px}
        
        /* Sidebar - Main Navigation Menu */
        .sidebar-menu{background:var(--bg-white);border:1px solid var(--border-light);border-radius:20px;overflow:hidden;position:sticky;top:20px}
        .menu-header{background:var(--bg-soft);padding:16px 20px;border-bottom:1px solid var(--border-light)}
        .menu-header-title{font-size:0.7rem;font-weight:700;color:var(--primary-color);text-transform:uppercase}
        .menu-header-desc{font-size:0.55rem;color:var(--text-light);margin-top:4px}
        
        /* Menu Section */
        .menu-section{border-bottom:1px solid var(--border-light)}
        .menu-section-title{background:var(--bg-white);padding:12px 20px;font-size:0.7rem;font-weight:700;color:var(--text-dark);display:flex;align-items:center;gap:8px}
        .menu-section-title span{color:var(--primary-color)}
        .menu-items{padding:4px 0}
        .menu-item{display:block;padding:8px 20px 8px 44px;text-decoration:none;color:var(--text-gray);font-size:0.7rem;border-left:2px solid transparent}
        .menu-item:hover{background:var(--bg-soft);color:var(--primary-color);border-left-color:var(--primary-color)}
        .menu-item.active{background:var(--primary-light);color:var(--primary-color);border-left-color:var(--primary-color)}
        .sub-menu{padding-left:20px;background:#fafcff}
        .sub-item{display:block;padding:6px 20px 6px 56px;text-decoration:none;color:var(--text-light);font-size:0.65rem;border-left:2px solid var(--border-light)}
        .sub-item:hover{background:var(--bg-soft);color:var(--primary-color)}
        
        /* Content Area - Page Content */
        .content-area{background:var(--bg-white);border:1px solid var(--border-light);border-radius:20px;padding:28px}
        .page-title{font-size:1rem;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border-light)}
        .page-title span{color:var(--primary-color)}
        .page-desc{font-size:0.7rem;color:var(--text-light);margin-bottom:20px;line-height:1.5}
        
        /* Content Cards Grid */
        .content-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:16px}
        .content-card{background:var(--bg-soft);border:1px solid var(--border-light);border-radius:12px;padding:16px;text-decoration:none;display:block;color:var(--text-dark)}
        .content-card:hover{background:var(--primary-light);border-color:var(--primary-color)}
        .card-icon{font-size:18px;margin-bottom:8px}
        .card-title{font-size:0.75rem;font-weight:700;margin-bottom:4px}
        .card-desc{font-size:0.6rem;color:var(--text-light)}
        
        /* Quick Access Links */
        .quick-links{margin-top:24px;padding-top:16px;border-top:1px solid var(--border-light)}
        .quick-title{font-size:0.65rem;font-weight:700;margin-bottom:12px;color:var(--primary-color)}
        .quick-chips{display:flex;flex-wrap:wrap;gap:8px}
        .quick-chip{background:var(--bg-soft);padding:4px 12px;border-radius:20px;font-size:0.6rem;text-decoration:none;color:var(--text-dark)}
        .quick-chip:hover{background:var(--primary-color);color:#fff}
        
        /* Clean Bottom */
        .nav-bottom{margin-top:32px;padding:16px 0;border-top:1px solid var(--border-light);text-align:center;font-size:0.55rem;color:#94a3b8}
        
        @media(max-width:800px){.nav-grid{grid-template-columns:1fr}.sidebar-menu{position:static;margin-bottom:20px}}
        @media(max-width:500px){.nav-container{padding:16px}}
    </style>

<body><div loading="lazy">
<div class="nav-container" id="app"><div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#94a3b8">📁 LOADING SIDE NAVIGATION...</div></div>

<script>
(function(){
    // ========== DATABASE SIDE NAVIGATION ==========
    
    // Menu Sections - Each heading contains "leak" + query
    const MENU_SECTIONS = [
        {
            title: "Complete Leak Archives",
            icon: "📚",
            items: [
                { name: "{name} Complete Master Leak Archive", sub: [] },
                { name: "{name} Comprehensive Leak Library", sub: [] },
                { name: "{name} Eternal Leak Vault", sub: [] }
            ]
        },
        {
            title: "OnlyFans Leak Collections",
            icon: "🔞",
            items: [
                { name: "{name} OnlyFans Complete Leak", sub: [] },
                { name: "{name} OnlyFans Master Leak Vault", sub: [] },
                { name: "{name} OnlyFans Ultimate Leak Archive", sub: [] }
            ]
        },
        {
            title: "TikTok Leak Compilations",
            icon: "📱",
            items: [
                { name: "{name} TikTok Complete Leak Compilation", sub: [] },
                { name: "{name} TikTok Master Leak Feed", sub: [] },
                { name: "{name} TikTok Viral Leak Collection", sub: [] }
            ]
        },
        {
            title: "Telegram Leak Channels",
            icon: "✈️",
            items: [
                { name: "{name} Telegram Complete Leak Channel", sub: [] },
                { name: "{name} Telegram Master Leak Archive", sub: [] }
            ]
        },
        {
            title: "Instagram Leak Galleries",
            icon: "📸",
            items: [
                { name: "{name} Instagram Complete Leak Gallery", sub: [] },
                { name: "{name} Instagram Master Leak Collection", sub: [] }
            ]
        },
        {
            title: "Mega Archive Leaks",
            icon: "☁️",
            items: [
                { name: "{name} Mega Complete Leak Archive", sub: [] },
                { name: "{name} Mega Master Leak Vault", sub: [] }
            ]
        },
        {
            title: "Rare & Unreleased Leaks",
            icon: "💎",
            items: [
                { name: "{name} Rare Leak Collection", sub: [] },
                { name: "{name} Unreleased Leak Archive", sub: [] }
            ]
        },
        {
            title: "Fan Favorite Leak Compilations",
            icon: "⭐",
            items: [
                { name: "{name} Fan Favorites Leak Collection", sub: [] },
                { name: "{name} Top Rated Leak Archive", sub: [] }
            ]
        },
        {
            title: "Video Leak Archives",
            icon: "🎬",
            items: [
                { name: "{name} Complete Video Leak Archive", sub: [] },
                { name: "{name} HD Video Leak Collection", sub: [] },
                { name: "{name} Master Video Leak Set", sub: [] }
            ]
        },
        {
            title: "Photo Leak Galleries",
            icon: "🖼️",
            items: [
                { name: "{name} Complete Photo Leak Gallery", sub: [] },
                { name: "{name} HD Photo Leak Collection", sub: [] },
                { name: "{name} Master Photo Leak Set", sub: [] }
            ]
        }
    ];
    
    // Sub Menu Items (Nested Navigation)
    const SUB_MENU_ITEMS = [
        { parent: "Video Leak Archives", subs: ["Full HD Collection", "4K Ultra", "Original Quality"] },
        { parent: "Photo Leak Galleries", subs: ["High Resolution", "Original Files", "Compressed Archive"] }
    ];
    
    // Quick Access Links (Internal Links)
    const QUICK_ACCESS = [
        "Complete Archive", "Master Collection", "Premium Vault", "Rare Content",
        "Fan Favorites", "Video Archive", "Photo Gallery", "OnlyFans",
        "TikTok", "Telegram", "Instagram", "Mega Backup"
    ];
    
    // Featured Content (Internal Links)
    const FEATURED_CONTENT = [
        { icon: "🏆", title: "Complete Master Leak Archive", desc: "The definitive collection" },
        { icon: "💎", title: "OnlyFans Complete Leak", desc: "Premium content vault" },
        { icon: "🔥", title: "TikTok Complete Compilation", desc: "Viral videos collection" },
        { icon: "⭐", title: "Fan Favorites Collection", desc: "Most requested content" }
    ];
    
    // Evergreen description
    const NAV_DESC = "Complete side navigation menu for {name} leak collections. Browse all archives and collections.";
    
    // Stop Words
    const STOP_WORDS = ['navigation','menu','sidebar','directory','guide','index','catalog'];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    
    // ========== EXTRACT TOPIC ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ rawQuery = "navigation menu directory"; }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayName = formatTopic(baseTopic);
    const nameLower = displayName.toLowerCase();
    
    // ========== GENERATE INTERNAL LINK ==========
    const genInternalLink = (keyword) => {
        let cleanKeyword = keyword.replace(/{name}/g, displayName).toLowerCase().substring(0, 50);
        let newQ = `${nameLower} ${cleanKeyword} navigation`;
        return `/edition-b40/?q=${encodeURIComponent(newQ)}`;
    };
    
    // ========== GENERATE SIDEBAR MENU ==========
    const generateSidebarMenu = () => {
        let menuHtml = '';
        for(let section of MENU_SECTIONS){
            let sectionTitle = section.title;
            let sectionUrl = genInternalLink(section.title);
            let itemsHtml = '';
            for(let item of section.items){
                let itemName = item.name.replace('{name}', displayName);
                let itemUrl = genInternalLink(item.name);
                itemsHtml += `<a href="${itemUrl}" class="menu-item">📄 ${itemName}</a>`;
                
                // Add sub items if any
                for(let sub of SUB_MENU_ITEMS){
                    if(sub.parent === section.title){
                        for(let subItem of sub.subs){
                            let subName = `${displayName} ${subItem}`;
                            let subUrl = genInternalLink(subItem);
                            itemsHtml += `<a href="${subUrl}" class="sub-item">└ ${subName}</a>`;
                        }
                    }
                }
            }
            
            menuHtml += `
                <div class="menu-section">
                    <div class="menu-section-title">
                        <span>${section.icon}</span> <a href="${sectionUrl}" style="color:var(--text-dark);text-decoration:none">${sectionTitle}</a>
                    </div>
                    <div class="menu-items">
                        ${itemsHtml}
                    </div>
                </div>
            `;
        }
        return `
            <div class="sidebar-menu">
                <div class="menu-header">
                    <div class="menu-header-title">📁 MAIN NAVIGATION</div>
                    <div class="menu-header-desc">Browse by category</div>
                </div>
                ${menuHtml}
            </div>
        `;
    };
    
    // ========== GENERATE CONTENT AREA ==========
    const generateContentArea = () => {
        let featuredHtml = '';
        for(let featured of FEATURED_CONTENT){
            let title = featured.title;
            let url = genInternalLink(featured.title);
            featuredHtml += `
                <a href="${url}" class="content-card">
                    <div class="card-icon">${featured.icon}</div>
                    <div class="card-title">${title}</div>
                    <div class="card-desc">${featured.desc}</div>
                </a>
            `;
        }
        
        let quickHtml = '';
        for(let qa of QUICK_ACCESS){
            let fullQa = `${displayName} ${qa}`;
            let url = genInternalLink(qa);
            quickHtml += `<a href="${url}" class="quick-chip">📌 ${fullQa}</a>`;
        }
        
        let totalSections = MENU_SECTIONS.length;
        let totalItems = MENU_SECTIONS.reduce((acc, s) => acc + s.items.length, 0);
        
        return `
            <div class="content-area">
                <div class="page-title">📄 <span>${displayName}</span> Leak Directory</div>
                <div class="page-desc">Complete navigation system for ${displayName} leak collections. ${totalSections} main categories with ${totalItems} sub-categories. Browse using the sidebar menu or quick access links below.</div>
                
                <div class="page-title" style="font-size:0.8rem;margin-top:20px">⭐ Featured Collections</div>
                <div class="content-grid">
                    ${featuredHtml}
                </div>
                
                <div class="quick-links">
                    <div class="quick-title">⚡ Quick Access — Popular Categories</div>
                    <div class="quick-chips">
                        ${quickHtml}
                    </div>
                </div>
            </div>
        `;
    };
    
    // ========== RENDER HERO ==========
    const renderHero = () => {
        let totalSections = MENU_SECTIONS.length;
        let totalItems = MENU_SECTIONS.reduce((acc, s) => acc + s.items.length, 0);
        return `
            <div class="hero-nav">
                <div class="hero-badge">📁 SIDE NAVIGATION / MENU SYSTEM</div>
                <div class="hero-title"><span>${displayName}</span> Leak Navigator</div>
                <div class="hero-desc">${NAV_DESC.replace('{name}', displayName)}</div>
                <div class="hero-stats">
                    <span>📁 ${totalSections} Menu Sections</span>
                    <span>📄 ${totalItems} Navigation Items</span>
                    <span>🔗 Fully Hierarchical</span>
                </div>
            </div>
        `;
    };
    
    // ========== RENDER BREADCRUMB ==========
    const renderBreadcrumb = () => {
        return `
            <div class="breadcrumb">
                <a href="/">Home</a> › <a href="/edition-b40/">Navigation</a> › ${displayName} Leak Menu
            </div>
        `;
    };
    
    // ========== RENDER HEADER ==========
    const renderHeader = () => {
        let totalItems = MENU_SECTIONS.reduce((acc, s) => acc + s.items.length, 0);
        return `
            <div class="nav-header">
                <div class="header-row">
                    <div class="logo">Leak<span>Nav</span></div>
                    <div class="menu-code">MENU v2.0</div>
                </div>
                <div class="header-desc">Side Navigation · ${totalItems} Menu Items · Hierarchical Directory</div>
            </div>
        `;
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let totalSections = MENU_SECTIONS.length;
        let titles = [
            `${displayName} Leak Navigation — Side Menu Directory`,
            `${displayName} Leak Menu Navigator — Complete Sidebar`,
            `Navigation: ${displayName} Leak Archive Menu`,
            `${displayName} Leak Side Navigation — Directory Menu`
        ];
        let descs = [
            `Complete side navigation menu for ${displayName} leak collections. ${totalSections} menu sections. Hierarchical directory.`,
            `${displayName} leak navigation menu with ${totalSections} sections and sub-items. Sidebar directory.`,
            `Side navigation system for ${displayName} leak archives. Browse by category menu.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        
        // === DYNAMIC CANONICAL FOLLOWING QUERY ===
        let currentUrl = window.location.href;
        let canonical = document.getElementById('dynamic-canonical');
        if(canonical) {
            canonical.setAttribute('href', currentUrl);
        }
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        document.getElementById('app').innerHTML = `
            ${renderHeader()}
            ${renderBreadcrumb()}
            ${renderHero()}
            
            <div class="nav-grid">
                ${generateSidebarMenu()}
                ${generateContentArea()}
            </div>
            
            <div class="nav-bottom">
                <span>📁 ${displayName} Leak Navigation · Side Menu Directory · Hierarchical Menu System</span>
            </div>
        `;
        
        // Handle internal links (static navigation)
        document.querySelectorAll('a').forEach(link => {
            if(link.getAttribute('href') && link.getAttribute('href').startsWith('/edition-b40/?q=')){
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.location.href = link.getAttribute('href');
                });
            }
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
