<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="bingbot" content="index, follow">
    <meta name="yandex" content="index, follow">
    <meta name="referrer" content="always">
    <title id="dynamic-title">SPECTRUM � Color-Coded Leak Directory</title>
    <meta id="dynamic-description" name="description" content="Spectrum color-coded directory for leak collections. Rainbow organization. Easy visual navigation.">
    <link id="dynamic-canonical" rel="canonical" href="https://example.com/edition-b44/">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        
        /* GLOBAL COLOR VARIABLES - Change only ONE variable below */
        :root {
            --primary-red: #ff6b6b;
            --primary-orange: #ffb347;
            --primary-yellow: #ffd93d;
            --primary-green: #6bcb77;
            --primary-blue: #4d96ff;
            --primary-purple: #9b59b6;
            --primary-pink: #ff85a1;
            --primary-teal: #2dd4bf;
            --primary-coral: #ff6b6b;
            --primary-lavender: #a78bfa;
            --bg-dark: #1a1a2e;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-light: #e2e8f0;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
        }
        
        body{background:var(--bg-dark);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica Neue,sans-serif;color:var(--text-light)}
        
        /* Spectrum Style - Like Rainbow Color Palette */
        .spectrum-container{max-width:1200px;margin:0 auto;padding:20px}
        
        /* Header */
        .spectrum-header{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:24px;padding:20px;margin-bottom:24px;border:1px solid var(--border-color)}
        .header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:8px}
        .logo{font-size:1.2rem;font-weight:800}
        .logo span{color:var(--primary-red)}
        .spectrum-badge{background:linear-gradient(90deg,var(--primary-red),var(--primary-yellow),var(--primary-green),var(--primary-blue),var(--primary-purple));padding:4px 14px;border-radius:30px;font-size:0.6rem;font-weight:700;color:var(--bg-dark)}
        .header-desc{font-size:0.7rem;color:var(--text-muted)}
        
        /* Breadcrumb */
        .breadcrumb{font-size:0.7rem;color:var(--text-muted);margin-bottom:20px}
        .breadcrumb a{color:var(--primary-red);text-decoration:none}
        .breadcrumb a:hover{text-decoration:underline}
        
        /* Hero */
        .hero-spectrum{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:24px;padding:28px;margin-bottom:28px;border:1px solid var(--border-color)}
        .hero-badge{display:inline-block;background:linear-gradient(90deg,var(--primary-red),var(--primary-yellow),var(--primary-green),var(--primary-blue),var(--primary-purple));padding:4px 16px;border-radius:30px;font-size:0.65rem;font-weight:700;color:var(--bg-dark);margin-bottom:12px}
        .hero-title{font-size:1.3rem;font-weight:800;margin-bottom:12px}
        .hero-title span{color:var(--primary-yellow)}
        .hero-desc{font-size:0.75rem;color:var(--text-muted);line-height:1.5;margin-bottom:14px}
        .hero-stats{display:flex;gap:24px;flex-wrap:wrap;font-size:0.6rem;color:var(--text-muted)}
        
        /* Color Spectrum Bars */
        .spectrum-bar{display:flex;height:40px;border-radius:20px;overflow:hidden;margin-bottom:32px}
        .spectrum-segment{flex:1;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;color:var(--bg-dark);text-decoration:none}
        .spectrum-segment:hover{opacity:0.9}
        .red-bg{background:var(--primary-red)}
        .orange-bg{background:var(--primary-orange)}
        .yellow-bg{background:var(--primary-yellow)}
        .green-bg{background:var(--primary-green)}
        .blue-bg{background:var(--primary-blue)}
        .purple-bg{background:var(--primary-purple)}
        .pink-bg{background:var(--primary-pink)}
        .teal-bg{background:var(--primary-teal)}
        
        /* Color Categories Grid */
        .color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-bottom:32px}
        
        /* Color Category Card */
        .color-card{background:var(--bg-card);border-radius:20px;overflow:hidden;border:1px solid var(--border-color)}
        .card-color-bar{height:8px}
        .card-content{padding:16px}
        .card-category{font-size:0.55rem;font-weight:700;text-transform:uppercase;margin-bottom:8px}
        .card-title{font-size:0.8rem;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border-color)}
        .card-links{display:flex;flex-direction:column;gap:10px}
        .color-link{display:block;padding:8px 0;text-decoration:none;color:#cbd5e1;font-size:0.7rem;border-bottom:1px solid #2d3a4e}
        .color-link:hover{color:var(--primary-yellow);padding-left:4px}
        
        /* Rainbow Tags Section */
        .rainbow-section{background:var(--bg-card);border-radius:20px;padding:20px;margin-bottom:24px;border:1px solid var(--border-color)}
        .rainbow-title{font-size:0.7rem;font-weight:800;margin-bottom:16px;color:var(--primary-yellow)}
        .rainbow-tags{display:flex;flex-wrap:wrap;gap:10px}
        .rainbow-tag{background:linear-gradient(135deg,var(--primary-red),var(--primary-orange),var(--primary-yellow),var(--primary-green),var(--primary-blue),var(--primary-purple));padding:6px 16px;border-radius:30px;font-size:0.6rem;text-decoration:none;color:var(--bg-dark);font-weight:600}
        .rainbow-tag:hover{opacity:0.85}
        
        /* Color Palette Index */
        .palette-index{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:24px}
        .palette-dot{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;color:var(--bg-dark);text-decoration:none}
        
        /* Clean Bottom */
        .spectrum-bottom{margin-top:32px;padding:16px 0;border-top:1px solid var(--border-color);text-align:center;font-size:0.55rem;color:var(--text-dim)}
        
        @media(max-width:700px){.color-grid{grid-template-columns:1fr}.spectrum-bar{height:auto;flex-wrap:wrap;gap:8px}.spectrum-segment{padding:8px;min-width:80px}}
        @media(max-width:500px){.spectrum-container{padding:16px}}
    </style>

<body><div loading="lazy">
<div class="spectrum-container" id="app"><div style="display:flex;justify-content:center;align-items:center;height:100vh;color:var(--text-dim)"> LOADING SPECTRUM...</div></div>

<script>
(function(){
    // ========== DATABASE SPECTRUM (EVERGREEN, MANY INTERNAL LINKS) ==========
    
    // Color Categories with Leak Collections
    const COLOR_CATEGORIES = [
        { color: "red", bg: "var(--primary-red)", text: "COMPLETE", name: "Red Spectrum � Complete Leak Archives", items: [
            "{name} Complete Master Leak Archive",
            "{name} Comprehensive Leak Library",
            "{name} Eternal Leak Vault"
        ]},
        { color: "orange", bg: "var(--primary-orange)", text: "PREMIUM", name: "Orange Spectrum � OnlyFans Leak Collections", items: [
            "{name} OnlyFans Complete Leak",
            "{name} OnlyFans Master Leak Vault",
            "{name} OnlyFans Ultimate Leak Archive"
        ]},
        { color: "yellow", bg: "var(--primary-yellow)", text: "VIRAL", name: "Yellow Spectrum � TikTok Leak Compilations", items: [
            "{name} TikTok Complete Leak Compilation",
            "{name} TikTok Master Leak Feed",
            "{name} TikTok Viral Leak Collection"
        ]},
        { color: "green", bg: "var(--primary-green)", text: "CHANNEL", name: "Green Spectrum � Telegram Leak Channels", items: [
            "{name} Telegram Complete Leak Channel",
            "{name} Telegram Master Leak Archive"
        ]},
        { color: "blue", bg: "var(--primary-blue)", text: "GALLERY", name: "Blue Spectrum � Instagram Leak Galleries", items: [
            "{name} Instagram Complete Leak Gallery",
            "{name} Instagram Master Leak Collection"
        ]},
        { color: "purple", bg: "var(--primary-purple)", text: "STORAGE", name: "Purple Spectrum � Mega Archive Leaks", items: [
            "{name} Mega Complete Leak Archive",
            "{name} Mega Master Leak Vault"
        ]},
        { color: "pink", bg: "var(--primary-pink)", text: "RARE", name: "Pink Spectrum � Rare & Unreleased Leaks", items: [
            "{name} Rare Leak Collection",
            "{name} Unreleased Leak Archive"
        ]},
        { color: "teal", bg: "var(--primary-teal)", text: "FAN", name: "Teal Spectrum � Fan Favorite Leak Compilations", items: [
            "{name} Fan Favorites Leak Collection",
            "{name} Top Rated Leak Archive"
        ]}
    ];
    
    // Additional Color Collections (Video & Photo)
    const EXTRA_COLORS = [
        { color: "coral", bg: "var(--primary-coral)", name: "Video Leak Archives", items: [
            "{name} Complete Video Leak Archive",
            "{name} HD Video Leak Collection",
            "{name} Master Video Leak Set"
        ]},
        { color: "lavender", bg: "var(--primary-lavender)", name: "Photo Leak Galleries", items: [
            "{name} Complete Photo Leak Gallery",
            "{name} HD Photo Leak Collection",
            "{name} Master Photo Leak Set"
        ]}
    ];
    
    // Rainbow Tags (Internal Links)
    const RAINBOW_TAGS = [
        "Complete Archive", "Master Collection", "Premium Vault", "Rare Content",
        "Fan Favorites", "Video Archive", "Photo Gallery", "OnlyFans", "TikTok",
        "Telegram", "Instagram", "Mega Backup", "HD Quality", "4K Resolution",
        "Unreleased", "Top Rated", "Eternal Vault", "Comprehensive Library"
    ];
    
    // Palette Index Colors
    const PALETTE_COLORS = [
        { name: "Red", color: "var(--primary-red)", link: "Complete Leak Archives" },
        { name: "Orange", color: "var(--primary-orange)", link: "OnlyFans Leak Collections" },
        { name: "Yellow", color: "var(--primary-yellow)", link: "TikTok Leak Compilations" },
        { name: "Green", color: "var(--primary-green)", link: "Telegram Leak Channels" },
        { name: "Blue", color: "var(--primary-blue)", link: "Instagram Leak Galleries" },
        { name: "Purple", color: "var(--primary-purple)", link: "Mega Archive Leaks" },
        { name: "Pink", color: "var(--primary-pink)", link: "Rare & Unreleased Leaks" },
        { name: "Teal", color: "var(--primary-teal)", link: "Fan Favorite Leak Compilations" },
        { name: "Coral", color: "var(--primary-coral)", link: "Video Leak Archives" },
        { name: "Lavender", color: "var(--primary-lavender)", link: "Photo Leak Galleries" }
    ];
    
    // Evergreen description
    const SPECTRUM_DESC = "Spectrum color-coded directory for {name} leak collections. Rainbow organization for easy visual navigation.";
    
    // Stop Words
    const STOP_WORDS = ['spectrum','color','rainbow','palette','hue','shade','tint','chroma'];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    
    // ========== EXTRACT TOPIC (English) ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ rawQuery = "rainbow color directory"; }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayName = formatTopic(baseTopic);
    const nameLower = displayName.toLowerCase();
    
    // ========== GENERATE INTERNAL LINK ==========
    const genInternalLink = (keyword) => {
        let cleanKeyword = keyword.replace(/{name}/g, displayName).toLowerCase().substring(0, 50);
        let newQ = `${nameLower} ${cleanKeyword} spectrum`;
        return `/edition-b44/?q=${encodeURIComponent(newQ)}`;
    };
    
    // ========== GENERATE SPECTRUM BAR ==========
    const generateSpectrumBar = () => {
        const segments = [
            { name: "Complete", color: "red-bg", link: "Complete Leak Archives" },
            { name: "Premium", color: "orange-bg", link: "OnlyFans Leak Collections" },
            { name: "Viral", color: "yellow-bg", link: "TikTok Leak Compilations" },
            { name: "Channel", color: "green-bg", link: "Telegram Leak Channels" },
            { name: "Gallery", color: "blue-bg", link: "Instagram Leak Galleries" },
            { name: "Storage", color: "purple-bg", link: "Mega Archive Leaks" },
            { name: "Rare", color: "pink-bg", link: "Rare & Unreleased Leaks" },
            { name: "Fan", color: "teal-bg", link: "Fan Favorite Leak Compilations" }
        ];
        let segmentsHtml = '';
        for(let seg of segments){
            let url = genInternalLink(seg.link);
            segmentsHtml += `<a href="${url}" class="spectrum-segment ${seg.color}">${seg.name}</a>`;
        }
        return `<div class="spectrum-bar">${segmentsHtml}</div>`;
    };
    
    // ========== GENERATE COLOR CATEGORIES ==========
    const generateColorCategories = () => {
        let categoriesHtml = '';
        let allCategories = [...COLOR_CATEGORIES, ...EXTRA_COLORS];
        for(let cat of allCategories){
            let itemsHtml = '';
            for(let item of cat.items){
                let title = item.replace('{name}', displayName);
                let url = genInternalLink(item);
                itemsHtml += `<a href="${url}" class="color-link"> ${title}</a>`;
            }
            categoriesHtml += `
                <div class="color-card">
                    <div class="card-color-bar" style="background:${cat.bg}"></div>
                    <div class="card-content">
                        <div class="card-category" style="color:${cat.bg}">${cat.text || cat.name.split(' � ')[0]}</div>
                        <div class="card-title">${cat.name}</div>
                        <div class="card-links">
                            ${itemsHtml}
                        </div>
                    </div>
                </div>
            `;
        }
        return categoriesHtml;
    };
    
    // ========== GENERATE RAINBOW TAGS ==========
    const generateRainbowTags = () => {
        let tagsHtml = '';
        for(let tag of RAINBOW_TAGS){
            let fullTag = `${displayName} ${tag}`;
            let url = genInternalLink(tag);
            tagsHtml += `<a href="${url}" class="rainbow-tag"> ${fullTag}</a>`;
        }
        return `
            <div class="rainbow-section">
                <div class="rainbow-title"> Rainbow Tags � Explore by Color</div>
                <div class="rainbow-tags">
                    ${tagsHtml}
                </div>
            </div>
        `;
    };
    
    // ========== GENERATE PALETTE INDEX ==========
    const generatePaletteIndex = () => {
        let paletteHtml = '';
        for(let color of PALETTE_COLORS){
            let url = genInternalLink(color.link);
            paletteHtml += `<a href="${url}" class="palette-dot" style="background:${color.color}" title="${color.name}"></a>`;
        }
        return `<div class="palette-index">${paletteHtml}</div>`;
    };
    
    // ========== RENDER HERO ==========
    const renderHero = () => {
        let totalColors = COLOR_CATEGORIES.length + EXTRA_COLORS.length;
        let totalItems = [...COLOR_CATEGORIES, ...EXTRA_COLORS].reduce((acc, cat) => acc + cat.items.length, 0);
        return `
            <div class="hero-spectrum">
                <div class="hero-badge"> SPECTRUM / RAINBOW DIRECTORY</div>
                <div class="hero-title"><span>${displayName}</span> Leak Spectrum</div>
                <div class="hero-desc">${SPECTRUM_DESC.replace('{name}', displayName)}</div>
                <div class="hero-stats">
                    <span> ${totalColors} Color Categories</span>
                    <span> ${totalItems} Spectrum Entries</span>
                    <span> Rainbow Indexed</span>
                </div>
            </div>
        `;
    };
    
    // ========== RENDER BREADCRUMB ==========
    const renderBreadcrumb = () => {
        return `
            <div class="breadcrumb">
                <a href="/">Home</a> � <a href="/edition-b44/">Spectrum</a> � ${displayName} Color Directory
            </div>
        `;
    };
    
    // ========== RENDER HEADER ==========
    const renderHeader = () => {
        let totalItems = [...COLOR_CATEGORIES, ...EXTRA_COLORS].reduce((acc, cat) => acc + cat.items.length, 0);
        return `
            <div class="spectrum-header">
                <div class="header-row">
                    <div class="logo">Leak<span>Spectrum</span></div>
                    <div class="spectrum-badge"> ${totalItems} SPECTRUM COLORS</div>
                </div>
                <div class="header-desc">Color-Coded Directory � Rainbow Organization � Visual Navigation</div>
            </div>
        `;
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let totalColors = COLOR_CATEGORIES.length + EXTRA_COLORS.length;
        let titles = [
            `${displayName} Leak Spectrum � Color-Coded Directory`,
            `${displayName} Leak Rainbow Directory � Spectrum Colors`,
            `Spectrum: ${displayName} Leak Color Categories`,
            `${displayName} Leak Spectrum � ${totalColors} Color Sections`
        ];
        let descs = [
            `Rainbow color-coded directory for ${displayName} leak collections. ${totalColors} color categories. Visual navigation.`,
            `${displayName} leak spectrum with ${totalColors} color-coded sections. Easy visual browsing.`,
            `Color spectrum directory for ${displayName} leak archives. Rainbow organization system.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        
        // DYNAMIC CANONICAL - follows the query parameter
        let can = document.getElementById('dynamic-canonical'); 
        if(can) {
            let currentUrl = window.location.href;
            let baseUrl = currentUrl.split('?')[0];
            let queryString = window.location.search;
            if(queryString) {
                can.setAttribute('href', baseUrl + queryString);
            } else {
                can.setAttribute('href', baseUrl);
            }
        }
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        document.getElementById('app').innerHTML = `
            ${renderHeader()}
            ${renderBreadcrumb()}
            ${renderHero()}
            ${generateSpectrumBar()}
            ${generatePaletteIndex()}
            <div class="color-grid">
                ${generateColorCategories()}
            </div>
            ${generateRainbowTags()}
            
            <div class="spectrum-bottom">
                <span> ${displayName} Leak Spectrum � Color-Coded Directory � Rainbow Organization</span>
            </div>
        `;
        
        // Handle internal links (static navigation)
        document.querySelectorAll('a').forEach(link => {
            if(link.getAttribute('href') && link.getAttribute('href').startsWith('/edition-b44/?q=')){
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.location.href = link.getAttribute('href');
                });
            }
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
