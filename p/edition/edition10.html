<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="referrer" content="always">
    <title id="dynamic-title">ACTIVITY TRACKER � Real-time Fan Analytics Hub</title>
    <meta id="dynamic-description" name="description" content="Real-time activity tracker and analytics hub. Monitor content across all platforms.">
    <link id="dynamic-canonical" rel="canonical" href="https://example.com/edition11/">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0e27;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#e2e8f0}
        
        /* Style Fan Analytics Hub - Real-time Dashboard, Data-rich */
        .tracker-container{max-width:1400px;margin:0 auto;padding:24px}
        
        /* Header */
        .dashboard-header{background:linear-gradient(135deg,#0f1535,#0a0e27);border-radius:24px;padding:24px 32px;margin-bottom:28px;border:1px solid rgba(59,130,246,0.3)}
        .header-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;margin-bottom:16px}
        .subject-name{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent}
        .live-badge{background:#10b98120;border:1px solid #10b981;padding:4px 12px;border-radius:30px;font-size:0.65rem;display:flex;align-items:center;gap:6px}
        .live-dot{width:8px;height:8px;background:#10b981;border-radius:50%;animation:pulse 1.5s infinite}
        @keyframes pulse{0%{opacity:1}50%{opacity:0.3}100%{opacity:1}}
        
        /* Quick Stats Row */
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:28px}
        .stat-card{background:#0f1535;border-radius:20px;padding:20px;border:1px solid #1e2546}
        .stat-label{font-size:0.65rem;text-transform:uppercase;color:#8b92b0;letter-spacing:1px;margin-bottom:8px}
        .stat-number{font-size:2rem;font-weight:800;color:#60a5fa}
        .stat-trend{font-size:0.6rem;color:#10b981;margin-top:4px}
        
        /* Main Grid - 3 Columns */
        .dashboard-grid{display:grid;grid-template-columns:280px 1fr 320px;gap:24px;margin-bottom:32px}
        
        /* Left Panel - Platform Activity */
        .platform-panel{background:#0f1535;border-radius:20px;padding:20px;border:1px solid #1e2546}
        .panel-title{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#8b92b0;margin-bottom:20px}
        .platform-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #1e2546;cursor:pointer}
        .platform-item:hover .platform-name{color:#60a5fa}
        .platform-info{display:flex;align-items:center;gap:10px}
        .platform-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
        .platform-name{font-size:0.75rem;font-weight:500}
        .platform-value{font-size:0.7rem;font-weight:600;color:#60a5fa}
        .platform-trend{font-size:0.55rem;color:#10b981;margin-left:8px}
        
        /* Center Panel - Activity Feed (Panjang) */
        .feed-panel{background:#0f1535;border-radius:20px;border:1px solid #1e2546;overflow:hidden}
        .feed-header{padding:16px 20px;border-bottom:1px solid #1e2546;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
        .feed-title{font-size:0.7rem;font-weight:600;text-transform:uppercase}
        .feed-tabs{display:flex;gap:8px}
        .tab{background:#1a2040;padding:4px 12px;border-radius:20px;font-size:0.6rem;cursor:pointer}
        .tab-active{background:#60a5fa;color:#0a0e27}
        
        /* Activity Card (Panjang) */
        .activity-card{padding:20px;border-bottom:1px solid #1e2546;cursor:pointer;transition:background 0.2s}
        .activity-card:hover{background:#131a42}
        .activity-time{font-size:0.55rem;color:#8b92b0;margin-bottom:8px;font-family:monospace}
        .activity-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
        .activity-icon{width:36px;height:36px;border-radius:12px;background:#1e2546;display:flex;align-items:center;justify-content:center;font-size:18px}
        .activity-platform{font-size:0.7rem;font-weight:600}
        .activity-badge{background:#60a5fa20;padding:2px 8px;border-radius:12px;font-size:0.55rem;color:#60a5fa;margin-left:8px}
        .activity-title{font-size:0.8rem;font-weight:600;margin-bottom:8px}
        .activity-desc{font-size:0.7rem;color:#b4bcd0;line-height:1.5;margin-bottom:12px}
        .activity-stats{display:flex;gap:16px;margin:8px 0}
        .activity-stat{font-size:0.6rem}
        .activity-stat strong{color:#60a5fa}
        .activity-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
        .activity-tag{background:#1e2546;padding:2px 10px;border-radius:14px;font-size:0.55rem;color:#8b92b0}
        
        /* Right Panel - Trending & Alerts */
        .trending-panel{display:flex;flex-direction:column;gap:24px}
        .trend-card{background:#0f1535;border-radius:20px;padding:20px;border:1px solid #1e2546}
        .trend-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #1e2546;cursor:pointer}
        .trend-rank{width:28px;height:28px;background:#1e2546;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700}
        .trend-info{flex:1;margin-left:12px}
        .trend-name{font-size:0.7rem;font-weight:500}
        .trend-meta{font-size:0.55rem;color:#8b92b0}
        .trend-value{font-size:0.7rem;font-weight:600;color:#60a5fa}
        
        /* Alert List */
        .alert-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1e2546;cursor:pointer}
        .alert-dot{width:8px;height:8px;background:#f59e0b;border-radius:50%}
        .alert-text{font-size:0.7rem;flex:1}
        .alert-time{font-size:0.55rem;color:#8b92b0}
        
        /* Footer */
        .tracker-footer{margin-top:24px;padding:16px 20px;background:#0f1535;border-radius:16px;border:1px solid #1e2546;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:0.6rem;color:#8b92b0}
        
        @media(max-width:1100px){.dashboard-grid{grid-template-columns:1fr}.platform-panel{order:3}.trending-panel{order:2}.feed-panel{order:1}.stats-row{grid-template-columns:repeat(2,1fr)}}
        @media(max-width:600px){.tracker-container{padding:16px}.dashboard-header{padding:16px}.subject-name{font-size:1.3rem}.stat-number{font-size:1.5rem}}
    </style>
{% include head.html %}
  </head>
<body><div loading="lazy">
<div class="tracker-container" id="app"><div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#8b92b0"> Loading Activity Tracker...</div></div>

<script>
(function(){
    // ========== DATABASE FAN ANALYTICS HUB ==========
    
    // Platforms with config
    const PLATFORMS = [
        { id: 'TikTok', icon: '', color: '#000', activity: 0, growth: 12 },
        { id: 'OnlyFans', icon: '', color: '#00aff0', activity: 0, growth: 8 },
        { id: 'Instagram', icon: '', color: '#d62976', activity: 0, growth: 5 },
        { id: 'Twitter', icon: '', color: '#1da1f2', activity: 0, growth: -2 },
        { id: 'Telegram', icon: '', color: '#0088cc', activity: 0, growth: 18 },
        { id: 'Discord', icon: '', color: '#5865f2', activity: 0, growth: 10 },
        { id: 'Reddit', icon: '', color: '#ff4500', activity: 0, growth: 3 },
        { id: 'YouTube', icon: '', color: '#ff0000', activity: 0, growth: 7 }
    ];
    
    // 60 Activity Headlines
    const HEADLINES = [
        "New content discovered on {platform}",
        "Archive updated with {count} new items",
        "High activity spike detected on {platform}",
        "Fan-favorite collection trending now",
        "Rare content surfaced in community hub",
        "Popular compilation reaching new milestones",
        "Content verification completed for batch",
        "New source channel identified for distribution",
        "Community discussion spiking on related topic",
        "Content from {date} now archived and available"
    ];
    
    // 80 Activity Descriptions (panjang)
    const DESCRIPTIONS = [
        "The community has identified approximately {count} new items circulating on {platform}. Early analysis suggests these originated from {source} and have gained {views} views within the first {hours} hours. Fan engagement is significantly higher than recent averages.",
        "Activity monitoring shows a {percent}% increase in content sharing across {platforms} platforms in the past {days} days. The majority of new activity is concentrated in {region} time zones, suggesting coordinated timing by the community.",
        "Verification of recently surfaced content has confirmed {percent}% authenticity. Metadata analysis indicates the material aligns with previously documented sources. Community moderators have flagged this as high-quality content.",
        "Fan responses to the latest content have been overwhelmingly positive. Engagement metrics show {count} shares and {likes} likes across monitored platforms. This represents the highest engagement in {period} months.",
        "Archive preservation efforts have successfully backed up {count} new items. Redundant copies now exist across {mirrors} independent locations. Access speed and reliability have improved significantly."
    ];
    
    // 40 Source Types
    const SOURCES = ['fan archive','community hub','verified source','historical backup','recent discovery','external collection','shared folder','public channel'];
    
    // 30 Alert Messages
    const ALERTS = [
        "New content detected � {count} items",
        "Activity spike on {platform} � +{percent}%",
        "Trending in fan community � {topic}",
        "Archive updated � check recent additions",
        "High engagement � {count} interactions",
        "Content verified � authenticity confirmed"
    ];
    
    // 30 Tag Options
    const TAGS = ['new','trending','verified','popular','rare','exclusive','recent','high-quality','community-favorite','archived'];
    
    // Stop Words
    const STOP_WORDS = [
        'tracker','analytics','dashboard','activity','monitor','hub','trending','alert','archive',
        'leaked','leak','leaks','content','video','photo','exclusive'
    ];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const range = (min,max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const formatNumber = (n) => n.toLocaleString();
    
    // ========== EKSTRAK TOPIK ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ window.location.href = "/"; return; }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayName = formatTopic(baseTopic);
    const nameLower = displayName.toLowerCase();
    
    // ========== GENERATE LINK ==========
    const genLink = (platform = null) => {
        let p = platform || rand(PLATFORMS).id;
        let newQ = `${nameLower} activity ${p.toLowerCase()} update`;
        return { url:`/edition11/?q=${encodeURIComponent(newQ)}`, platform: p };
    };
    
    // ========== GENERATE PLATFORM ACTIVITY ==========
    const generatePlatformActivity = () => {
        let items = [];
        for(let p of PLATFORMS){
            let activity = range(85, 9850);
            let trend = range(-15, 35);
            let trendIcon = trend > 0 ? '' : (trend < 0 ? '' : '');
            let trendColor = trend > 0 ? '#10b981' : (trend < 0 ? '#ef4444' : '#8b92b0');
            items.push(`
                <div class="platform-item" data-url="${genLink(p.id).url}">
                    <div class="platform-info">
                        <div class="platform-icon" style="background:${p.color}20;color:${p.color}">${p.icon}</div>
                        <div>
                            <div class="platform-name">${p.id}</div>
                            <div style="font-size:0.55rem;color:#8b92b0">${activity.toLocaleString()} interactions</div>
                        </div>
                    </div>
                    <div class="platform-value" style="color:${trendColor}">${trendIcon} ${Math.abs(trend)}%</div>
                </div>
            `);
        }
        return items.join('');
    };
    
    // ========== GENERATE ACTIVITY CARD (PANJANG) ==========
    const generateActivityCard = (idx) => {
        let platform = rand(PLATFORMS);
        let count = range(5, 245);
        let source = rand(SOURCES);
        let views = range(1250, 125000);
        let hours = range(2, 48);
        let percent = range(15, 95);
        let platformsCount = range(2, 8);
        let days = range(1, 14);
        let region = rand(['Eastern','Western','Northern','Southern','Asian','European']);
        let likes = range(500, 45000);
        let period = range(1, 6);
        let mirrors = range(2, 12);
        
        let headline = rand(HEADLINES)
            .replace('{platform}', platform.id)
            .replace('{count}', count.toLocaleString())
            .replace('{date}', `${2020+range(-2,4)}-${range(1,12)}-${range(1,28)}`);
        
        let desc = rand(DESCRIPTIONS)
            .replace('{count}', count.toLocaleString())
            .replace('{platform}', platform.id)
            .replace('{source}', source)
            .replace('{views}', formatNumber(views))
            .replace('{hours}', hours)
            .replace('{percent}', percent)
            .replace('{platforms}', platformsCount)
            .replace('{days}', days)
            .replace('{region}', region)
            .replace('{likes}', formatNumber(likes))
            .replace('{period}', period)
            .replace('{mirrors}', mirrors);
        
        let tags = [];
        for(let i=0;i<3;i++) tags.push(rand(TAGS));
        
        let timestamp = `${range(0,23).toString().padStart(2,'0')}:${range(0,59).toString().padStart(2,'0')}:${range(0,59).toString().padStart(2,'0')} UTC`;
        
        return `
            <div class="activity-card" data-url="${genLink(platform.id).url}">
                <div class="activity-time">${timestamp}</div>
                <div class="activity-header">
                    <div class="activity-icon" style="background:${platform.color}20;color:${platform.color}">${platform.icon}</div>
                    <div>
                        <span class="activity-platform">${platform.id}</span>
                        <span class="activity-badge">+${range(2,28)}% activity</span>
                    </div>
                </div>
                <div class="activity-title">${headline}</div>
                <div class="activity-desc">${desc}</div>
                <div class="activity-stats">
                    <span class="activity-stat"> <strong>${formatNumber(views)}</strong> views</span>
                    <span class="activity-stat"> <strong>${formatNumber(likes)}</strong> likes</span>
                    <span class="activity-stat"> <strong>${formatNumber(range(120,8500))}</strong> shares</span>
                </div>
                <div class="activity-tags">
                    ${tags.map(t => `<span class="activity-tag">#${t}</span>`).join('')}
                    <span class="activity-tag">#${platform.id.toLowerCase()}</span>
                    <span class="activity-tag">#${nameLower.replace(/ /g,'')}</span>
                </div>
            </div>
        `;
    };
    
    // ========== GENERATE TRENDING ITEMS ==========
    const generateTrending = () => {
        let topics = [
            'Fan Favorite Compilation',
            'Recently Discovered Archive',
            'Community Discussion Thread',
            'Top Shared Content',
            'Most Viewed This Week',
            'Trending Collection'
        ];
        let items = [];
        for(let i=0;i<5;i++){
            let topic = topics[i] + (Math.random() > 0.5 ? `: ${displayName}` : '');
            let count = range(125, 8500);
            items.push(`
                <div class="trend-item" data-url="${genLink().url}">
                    <div class="trend-rank">${i+1}</div>
                    <div class="trend-info">
                        <div class="trend-name">${topic}</div>
                        <div class="trend-meta">${formatNumber(count)} interactions</div>
                    </div>
                    <div class="trend-value">${range(5,45)}%</div>
                </div>
            `);
        }
        return items.join('');
    };
    
    // ========== GENERATE ALERTS ==========
    const generateAlerts = () => {
        let alerts = [];
        for(let i=0;i<4;i++){
            let platform = rand(PLATFORMS);
            let alert = rand(ALERTS)
                .replace('{count}', range(8, 128).toLocaleString())
                .replace('{platform}', platform.id)
                .replace('{percent}', range(12, 68))
                .replace('{topic}', rand(['new content','archive update','fan discussion']));
            alerts.push(`
                <div class="alert-item" data-url="${genLink(platform.id).url}">
                    <div class="alert-dot"></div>
                    <div class="alert-text">${alert}</div>
                    <div class="alert-time">${range(1,45)}m ago</div>
                </div>
            `);
        }
        return alerts.join('');
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let titles = [
            `${displayName} � Activity Tracker & Analytics Hub`,
            `${displayName} � Real-time Fan Monitoring Dashboard`,
            `${displayName} � Content Activity Tracker`,
            `${displayName} � Live Fan Analytics Dashboard`
        ];
        let descs = [
            `Real-time ${displayName} activity tracker. Monitor content across ${PLATFORMS.length} platforms. Live updates.`,
            `${displayName} fan analytics hub. Track trending content and community activity. Updated in real-time.`,
            `Live dashboard for ${displayName} fans. Monitor content discovery and engagement across all platforms.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        let totalItems = range(1250, 4850);
        let activeToday = range(125, 580);
        let newThisWeek = range(45, 280);
        let engagement = range(85, 245);
        let currentTime = new Date().toLocaleTimeString();
        
        document.getElementById('app').innerHTML = `
            <div class="dashboard-header">
                <div class="header-top">
                    <div class="subject-name">${displayName}</div>
                    <div class="live-badge"><div class="live-dot"></div> LIVE MONITORING � ${currentTime} UTC</div>
                </div>
                <div style="font-size:0.75rem;color:#8b92b0">Real-time activity tracker � Monitor content across ${PLATFORMS.length} platforms � Updated every 30 seconds</div>
            </div>
            
            <div class="stats-row">
                <div class="stat-card"><div class="stat-label">Total Tracked Items</div><div class="stat-number">${totalItems.toLocaleString()}</div><div class="stat-trend"> ${range(2,12)}% this week</div></div>
                <div class="stat-card"><div class="stat-label">Active Today</div><div class="stat-number">${activeToday.toLocaleString()}</div><div class="stat-trend">+${range(8,45)} new</div></div>
                <div class="stat-card"><div class="stat-label">New This Week</div><div class="stat-number">${newThisWeek.toLocaleString()}</div><div class="stat-trend"> from last week</div></div>
                <div class="stat-card"><div class="stat-label">Engagement Rate</div><div class="stat-number">${engagement}%</div><div class="stat-trend"> ${range(1,8)}%</div></div>
            </div>
            
            <div class="dashboard-grid">
                <!-- Left: Platform Activity -->
                <div class="platform-panel">
                    <div class="panel-title"> PLATFORM ACTIVITY</div>
                    ${generatePlatformActivity()}
                </div>
                
                <!-- Center: Activity Feed (Panjang) -->
                <div class="feed-panel">
                    <div class="feed-header">
                        <div class="feed-title"> LIVE ACTIVITY FEED</div>
                        <div class="feed-tabs">
                            <span class="tab tab-active">Latest</span>
                            <span class="tab">Trending</span>
                            <span class="tab">Archived</span>
                        </div>
                    </div>
                    ${generateActivityCard(0)}
                    ${generateActivityCard(1)}
                    ${generateActivityCard(2)}
                    ${generateActivityCard(3)}
                </div>
                
                <!-- Right: Trending & Alerts -->
                <div>
                    <div class="trend-card">
                        <div class="panel-title"> TRENDING NOW</div>
                        ${generateTrending()}
                    </div>
                    
                    <div class="trend-card">
                        <div class="panel-title"> LIVE ALERTS</div>
                        ${generateAlerts()}
                    </div>
                    
                    <div class="trend-card">
                        <div class="panel-title"> QUICK STATS</div>
                        <div style="margin-top:8px">
                            <div style="display:flex;justify-content:space-between;margin-bottom:12px"><span>Avg daily growth</span><span style="color:#60a5fa">+${range(3,12)}%</span></div>
                            <div style="display:flex;justify-content:space-between;margin-bottom:12px"><span>Peak activity hour</span><span style="color:#60a5fa">${range(18,23)}:00 UTC</span></div>
                            <div style="display:flex;justify-content:space-between;margin-bottom:12px"><span>Most active day</span><span style="color:#60a5fa">${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'][range(0,6)]}</span></div>
                            <div style="display:flex;justify-content:space-between"><span>Data coverage</span><span style="color:#60a5fa">${range(85,100)}%</span></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="tracker-footer">
                <span> Activity Tracker v${range(2,4)}.${range(0,9)}</span>
                <span> ${range(12,35)} active sources � ${range(85,99)}% uptime</span>
                <span> Real-time updates � Next refresh in ${range(5,25)}s</span>
                <span> Target: ${displayName}</span>
            </div>
        `;
        
        // Attach event listeners
        document.querySelectorAll('[data-url]').forEach(el => {
            el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
        });
        document.querySelectorAll('.activity-card, .platform-item, .trend-item, .alert-item').forEach(card => {
            card.addEventListener('click', () => { if(card.getAttribute('data-url')) window.location.href = card.getAttribute('data-url'); });
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
