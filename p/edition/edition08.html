<script>
(function(){
    // ========== DATABASE VARIAN EDITORIAL (100% BERBEDA) ==========
    
    // 50 Editorial Actions
    const ACTIONS = [
        "read","study","browse","peruse","examine","survey","scan","review","analyze","interpret",
        "understand","learn","master","comprehend","absorb","assimilate","digest","explore","discover","uncover",

        "cite","consult","research","investigate","deliberate","consider","contemplate","reflect","meditate"
    ];
    
    // 50 Resource Types
    const RESOURCES = [
        "complete archive","master collection","definitive guide","ultimate resource","comprehensive library",
        "full compendium","extensive catalog","detailed documentation","complete reference","ultimate anthology",
        "master directory","full repository","complete set","ultimate collection","definitive anthology",
        "essential library","core resource","primary source","original material","authentic documentation",
        "verified archive","official record","authoritative source","definitive reference","complete coverage",
        "full spectrum","entire collection","total archive","absolute compilation","perfect resource",
        "premium selection","elite collection","signature series","legacy archive","heritage collection",
        "timeless resource","evergreen content","permanent archive","classic collection","traditional set",
        "modern compilation","contemporary archive","digital library","online resource","web collection"
    ];
    
    // 40 Descriptors
    const DESCRIPTORS = [
        "exclusive","premium","authentic","verified","original","complete","full","ultimate","definitive",
        "essential","comprehensive","extensive","thorough","detailed","meticulous","precise","accurate",
        "professional","master","expert","scholarly","academic","educational","instructional","informative",
        "illuminating","enlightening","revealing","insightful","profound","thoughtful","considered","careful",
        "rigorous","systematic","methodical","organized","structured","comprehensive","integrated","unified"
    ];
    
    // 30 Value Descriptors
    const VALUES = [
        "permanent access","lifetime archive","always available","evergreen resource","timeless collection",
        "classic reference","legacy content","heritage material","foundational resource","essential knowledge",
        "core understanding","mastery guide","expert insight","professional reference","academic source",
        "scholarly content","research material","study guide","learning resource","educational content",
        "training material","development resource","growth content","improvement guide","enhancement tool",
        "reference standard","benchmark quality","authoritative source","definitive resource","canonical work"
    ];
    
    // 30 Headlines/Capture Lines (Editorial style)
    const HEADLINES = [
        "The Definitive Collection",
        "Complete Master Archive",
        "Essential Resource Library",
        "Ultimate Reference Guide",
        "Comprehensive Study Material",
        "Authoritative Source Document",
        "Scholarly Archive Collection",
        "Professional Research Library",
        "Academic Resource Center",
        "Educational Material Database",
        "Learning Resource Collection",
        "Knowledge Repository Vault",
        "Information Archive Complete",
        "Documentation Master Set",
        "Record Collection Ultimate"
    ];
    
    // 20 Era Indicators (tanpa tahun spesifik)
    const ERAS = [
        "modern era","contemporary period","digital age","information age","classical period",
        "traditional era","historic collection","legacy archive","heritage series","vintage compilation",
        "retrospective collection","anniversary edition","commemorative set","special collection","archival series",
        "preservation copy","restored edition","remastered collection","digitized archive","enhanced edition"
    ];
    
    // 30 Byline Names (Editor/Curator style)
    const BYLINES = [
        "Editorial Board","Archive Curators","Research Team","Documentation Dept","Collection Managers",
        "Resource Librarians","Knowledge Keepers","Data Archivists","Content Specialists","Media Curators",
        "Digital Preservation","Heritage Collection","Legacy Archive","Master Compilation","Ultimate Reference",
        "Definitive Source","Authoritative Edition","Scholarly Press","Academic Foundation","Research Council",
        "Study Group","Learning Collective","Education Center","Training Institute","Development Workshop"
    ];
    
    // 50 Display Names (Publisher/Curator)
    const PUBLISHERS = [
        "ArchivePress","VaultPublications","CollectionHouse","ResourceMedia","KnowledgeWorks",
        "CompilationStudio","AnthologyPress","LibraryEditions","RepositoryBooks","DocumentCenter",
        "RecordArchive","FileDepot","StorageMedia","DigitalVault","CyberPress","NetPublications",
        "WebEditions","OnlineArchive","CloudLibrary","DigitalCollection","ArchiveEdition","VaultPress",
        "CollectionBooks","ResourceLibrary","KnowledgeBase","InfoCenter","DataArchive","ContentHouse"
    ];
    
    // 30 Usernames
    const USERNAMES = [
        "archivepress","vaultpub","collectionhouse","resourcemedia","knowledgeworks",
        "compilationstudio","anthologypress","libraryeditions","repositorybooks","documentcenter",
        "recordarchive","filedepot","storagemedia","digitalvault","cyberpress",
        "netpubs","webeditions","onlinearXiv","cloudlibrary","digitalcollection"
    ];
    
    // 6 Category Types (editorial)
    const CATEGORIES = ['Archive','Collection','Resource','Library','Compendium','Anthology'];
    const CATEGORY_COLORS = ['#c41e3a','#1a1a1a','#c41e3a','#1a1a1a','#c41e3a','#1a1a1a'];
    
    // 10 Preview Backgrounds (pattern/style)
    const PREVIEW_STYLES = [
        'linear-gradient(135deg,#f5f2eb,#e8e4dd)','linear-gradient(135deg,#e8e4dd,#f5f2eb)',
        'linear-gradient(135deg,#f0eeea,#ddd9d2)','radial-gradient(circle at 30% 40%,#f5f2eb,#e0ddd8)',
        'radial-gradient(circle at 70% 60%,#f5f2eb,#e0ddd8)','linear-gradient(120deg,#faf8f5,#edeae4)',
        'linear-gradient(160deg,#f5f2eb,#e5e1da)','radial-gradient(ellipse at center,#f5f2eb,#e0ddd8)'
    ];
    const PREVIEW_ICONS = ['📚','📖','🏛️','📜','🗂️','📁','🔍','📌','📍','✒️','🖋️','📓','📔','📕','📗','📘','📙','📰','🗞️','📑'];
    
    // 8 File Sizes
    const FILE_SIZES = ['245 MB','512 MB','789 MB','1.2 GB','1.8 GB','2.3 GB','3.1 GB','4.5 GB'];
    
    // 15 View Ranges
    const VIEW_RANGES = [
        [12000,45000],[45000,120000],[120000,300000],[300000,650000],[650000,1100000],
        [1100000,1800000],[1800000,3000000],[3000000,5000000],[5000000,8000000],[8000000,12000000],
        [12000000,18000000],[18000000,25000000],[25000000,35000000],[35000000,50000000],[50000000,80000000]
    ];
    
    // 15 Time Indicators
    const TIME_INDICATORS = [
        "first published","originally archived","digitized","preserved","curated",
        "compiled","collected","documented","recorded","assembled",
        "gathered","compiled","edited","reviewed","verified"
    ];
    
    // Interaction Ranges
    const SAVE_RANGES = [[500,1500],[1500,5000],[5000,15000],[15000,35000],[35000,75000],[75000,150000]];
    const NOTE_RANGES = [[200,800],[800,2500],[2500,8000],[8000,20000],[20000,50000],[50000,120000]];
    
    // 20 CTA Texts (Editorial)
    const CTA_TEXTS = [
        "Read Full Archive","Explore Collection","Browse Resource","View Compendium","Access Library",
        "Study Material","Review Documentation","Research Content","Examine Record","Peruse Collection",
        "Discover Archive","Uncover Resource","Reveal Library","Present Collection","Showcase Archive"
    ];
    
    // 15 Bio Templates (Editorial)
    const BIO_TEMPLATES = [
        (n,f) => `The complete ${n} archive. Professionally curated collection. ${f.toLocaleString()}+ readers.`,
        (n,f) => `Official ${n} resource library. Permanent access. ${f.toLocaleString()}+ subscribers.`,
        (n) => `${n} master archive. Premium quality collection. Updated regularly.`,
        (n,f) => `#1 source for ${n} content. ${f.toLocaleString()}+ satisfied readers.`,
        (n) => `${n} definitive collection. The most complete archive available.`,
        (n,f) => `The ${n} archive. ${f.toLocaleString()}+ researchers worldwide.`,
        (n) => `The ultimate ${n} collection. Everything in one place.`,
        (n,f) => `${n} central resource. ${f.toLocaleString()}+ members.`,
        (n) => `Premium ${n} archive. Collector's edition quality.`,
        (n,f) => `Original ${n} vault. Trusted by ${f.toLocaleString()}+ readers.`,
        (n) => `${n} master collection. Complete verified archive.`,
        (n,f) => `${n} premium archive. ${f.toLocaleString()}+ readers agree.`,
        (n) => `Most comprehensive ${n} collection online. Updated regularly.`,
        (n,f) => `Join ${f.toLocaleString()}+ others accessing ${n} resources.`,
        (n) => `${n} content central. New additions every week.`
    ];
    
    // 30 Related Topic Names
    const RELATED_TOPICS = [
        (n) => `${n} Archive`,(n) => `${n} Collection`,(n) => `${n} Library`,
        (n) => `${n} Resource`,(n) => `${n} Compendium`,(n) => `${n} Anthology`,
        (n) => `${n} Repository`,(n) => `${n} Database`,(n) => `Complete ${n}`,
        (n) => `Master ${n}`,(n) => `Ultimate ${n}`,(n) => `Essential ${n}`,
        (n) => `Definitive ${n}`,(n) => `Comprehensive ${n}`,() => `Premium Archives`,
        () => `Master Collections`,() => `Ultimate Resources`,() => `Essential Libraries`,
        () => `Featured Archives`,() => `Curated Collections`
    ];
    
    // 30 Topic Tags
    const TOPIC_TAGS = [
        "Archive","Collection","Resource","Library","Compendium","Anthology","Repository",
        "Database","Compilation","Set","Series","Edition","Volume","Issue","Number",
        "Complete","Master","Ultimate","Essential","Definitive","Comprehensive","Premium"
    ];
    
    // Stop Words
    const STOP_WORDS = [
        'archive','collection','library','resource','database','compendium','anthology','repository',
        'compilation','set','series','edition','volume','complete','master','ultimate','essential',
        'definitive','comprehensive','premium','read','study','browse','explore','discover'
    ];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const range = (min,max) => Math.floor(Math.random() * (max - min + 1)) + min;
    
    // ========== EKSTRAK TOPIK ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ window.location.href = "/"; return; }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayTopic = formatTopic(baseTopic);
    const topicLower = displayTopic.toLowerCase();
    
    // ========== GENERATE LINK ==========
    const genLink = () => {
        let a = rand(ACTIONS), r = rand(RESOURCES), d = rand(DESCRIPTORS), v = rand(VALUES);
        let e = rand(ERAS);
        let newQ = `${topicLower} ${a} ${r} ${d}`;
        if(Math.random() > 0.5) newQ += ` ${e}`;
        if(Math.random() > 0.7) newQ += ` ${v}`;
        return { 
            url:`/edition09/?q=${encodeURIComponent(newQ)}`, 
            title:`${a[0].toUpperCase()+a.slice(1)} ${r}`,
            desc:d,
            resource:r,
            action:a
        };
    };
    
    // ========== GENERATE METRIK ==========
    const genMetrics = () => ({
        views: range(...rand(VIEW_RANGES)), saves: range(...rand(SAVE_RANGES)),
        notes: range(...rand(NOTE_RANGES)), era: rand(ERAS),
        fileSize: rand(FILE_SIZES), time: rand(TIME_INDICATORS)
    });
    
    // ========== RENDER ARTICLE CARD ==========
    const renderArticleCard = (link, idx, isFeatured=false) => {
        let m = genMetrics();
        let headline = rand(HEADLINES);
        let previewStyle = rand(PREVIEW_STYLES);
        let previewIcon = rand(PREVIEW_ICONS);
        let publisher = rand(PUBLISHERS);
        let category = rand(CATEGORIES);
        let fmt = (n) => n.toLocaleString();
        
        if(isFeatured){
            return `
                <div class="featured-card" data-url="${link.url}">
                    <div class="featured-content">
                        <div class="featured-category">${category.toUpperCase()} · ${m.era.toUpperCase()}</div>
                        <div class="featured-title">${displayTopic}: ${headline}</div>
                        <div class="featured-desc">Complete ${topicLower} ${link.resource}. ${m.fileSize} · ${m.time} · ${fmt(m.views)} views</div>
                        <div class="featured-meta"><span>📚 ${fmt(m.saves)} saves</span><span>📝 ${fmt(m.notes)} notes</span><span>🏛️ ${publisher}</span></div>
                    </div>
                    <div class="featured-image" style="background:${previewStyle}">${previewIcon}</div>
                </div>
            `;
        }
        
        return `
            <div class="article-card" data-url="${link.url}">
                <div class="article-preview" style="background:${previewStyle}">${previewIcon}</div>
                <div class="article-category">${category}</div>
                <div class="article-title">${displayTopic}: ${headline}</div>
                <div class="article-excerpt">${link.desc} ${link.resource}. ${m.fileSize} · ${fmt(m.views)} views</div>
                <div class="article-meta"><span>📚 ${fmt(m.saves)}</span><span>📝 ${fmt(m.notes)}</span></div>
            </div>
        `;
    };
    
    // ========== RENDER ARCHIVE LIST ==========
    const renderArchiveList = (links) => {
        let items = [];
        for(let i=0;i<7;i++){
            let link = links[i] || genLink();
            let count = range(12,98);
            items.push(`
                <li class="archive-item" data-url="${link.url}">
                    <span class="archive-name">${link.title.substring(0,45)}${link.title.length>45?'...':''}</span>
                    <span class="archive-count">${count}K</span>
                </li>
            `);
        }
        return items.join('');
    };
    
    // ========== RENDER TOPIC TAGS ==========
    const renderTopicTags = () => {
        let tags = [];
        for(let i=0;i<12;i++){
            let link = genLink();
            let tag = rand(TOPIC_TAGS);
            tags.push(`<span class="topic-tag" data-url="${link.url}">${topicLower} ${tag}</span>`);
        }
        return tags.join('');
    };
    
    // ========== SEO DINAMIS ==========
    const updateSEO = () => {
        let titles = [
            `${displayTopic} · Complete Archive & Collection | TheArchive`,
            `${displayTopic} · The Definitive Resource Library | TheArchive`,
            `${displayTopic} · Master Collection & Research Archive | TheArchive`,
            `${displayTopic} · Complete Reference & Study Material | TheArchive`
        ];
        let descs = [
            `The complete ${displayTopic} archive. Professionally curated collection. Permanent access. Premium quality.`,
            `Access the definitive ${displayTopic} library. Full collection, master quality, verified archive.`,
            `${displayTopic} ultimate resource online. Complete archive, premium content, authoritative source.`,
            `The most comprehensive ${displayTopic} collection. Professionally curated with permanent access.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== GET CURRENT DATE (FORMAT EDITORIAL) ==========
    const getEditorialDate = () => {
        const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
        const now = new Date();
        return `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        let links = Array.from({length:15}, ()=>genLink());
        let featuredLink = links[0] || genLink();
        let stats = { items: range(120,850), readers: range(300,2500) };
        let bio = rand(BIO_TEMPLATES)(displayTopic, stats.readers);
        let currentDate = getEditorialDate();
        
        document.getElementById('app').innerHTML = `
            <div class="site-header">
                <div class="logo-area">
                    <div class="logo">The<span style="color:#c41e3a">Archive</span></div>
                    <div class="logo-sub">EST. 2024 · DIGITAL LIBRARY</div>
                </div>
                <div class="header-meta">
                    <div class="date">${currentDate}</div>
                    <div style="margin-top:4px">Vol. ${range(1,24)} · No. ${range(1,12)}</div>
                </div>
            </div>
            
            <div class="breadcrumb">
                <a href="/">HOME</a> / <a href="/edition09/">ARCHIVE</a> / <span style="color:#c41e3a">${displayTopic.toUpperCase()}</span>
            </div>
            
            <div class="hero">
                <div class="hero-eyebrow">FEATURED COLLECTION</div>
                <div class="hero-title">${displayTopic}</div>
                <div class="hero-dek">${bio}</div>
                <div class="hero-stats">
                    <div class="hero-stat"><span class="hero-stat-number">${stats.items.toLocaleString()}+</span><span class="hero-stat-label">ARCHIVE ITEMS</span></div>
                    <div class="hero-stat"><span class="hero-stat-number">${stats.readers.toLocaleString()}</span><span class="hero-stat-label">MONTHLY READERS</span></div>
                    <div class="hero-stat"><span class="hero-stat-number">24/7</span><span class="hero-stat-label">PERMANENT ACCESS</span></div>
                </div>
            </div>
            
            <div class="featured-section">
                ${renderArticleCard(featuredLink, 0, true)}
            </div>
            
            <div>
                <div class="section-title">Latest from the Archive</div>
                <div class="topic-grid" id="topicGrid">
                    ${links.slice(1,10).map((l,i)=>renderArticleCard(l,i,false)).join('')}
                </div>
            </div>
            
            <div class="two-col-grid">
                <div class="col-archive">
                    <div class="subtitle">Complete Archive</div>
                    <ul class="archive-list" id="archiveList">
                        ${renderArchiveList(links)}
                    </ul>
                </div>
                <div class="col-topics">
                    <div class="subtitle">Related Topics</div>
                    <div id="topicTags">
                        ${renderTopicTags()}
                    </div>
                </div>
            </div>
            
            <div class="site-footer">
                <p>TheArchive · ${currentDate} · ${displayTopic} Complete Collection</p>
                <p style="margin-top:12px">📚 Permanent Digital Archive · ${stats.items.toLocaleString()} Items · ${stats.readers.toLocaleString()} Readers</p>
            </div>
        `;
        
        // Attach event listeners
        document.querySelectorAll('[data-url]').forEach(el => {
            el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
        });
        document.querySelectorAll('.article-card, .featured-card, .archive-item, .topic-tag').forEach(card => {
            card.addEventListener('click', () => window.location.href = card.getAttribute('data-url'));
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
