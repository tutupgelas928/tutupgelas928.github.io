<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="referrer" content="always">
    <title id="dynamic-title">FAN CLUB PORTAL · Official Community Hub</title>
    <meta id="dynamic-description" name="description" content="Official fan club portal. Connect with fellow fans. Access exclusive content and community features.">
    <link id="dynamic-canonical" rel="canonical" href="https://example.com/club/">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#faf8f5;font-family:'Plus Jakarta Sans',sans-serif;color:#1a1a2e}
        
        /* Style Fan Club Portal - Community Hub, Social, Engaging */
        .club-container{max-width:1300px;margin:0 auto;padding:0 24px}
        
        /* Header Banner */
        .club-banner{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);border-radius:32px;margin:24px 0 32px;padding:48px;position:relative;overflow:hidden}
        .banner-badge{display:inline-block;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);padding:6px 16px;border-radius:30px;font-size:0.7rem;font-weight:600;margin-bottom:20px}
        .banner-title{font-size:3rem;font-weight:800;color:#fff;margin-bottom:12px;line-height:1.2}
        .banner-subtitle{font-size:1rem;color:rgba(255,255,255,0.8);margin-bottom:24px;max-width:600px}
        .banner-stats{display:flex;gap:32px;flex-wrap:wrap;margin-top:24px}
        .banner-stat{text-align:center}
        .banner-stat-number{font-size:1.5rem;font-weight:800;color:#ff6b6b}
        .banner-stat-label{font-size:0.65rem;text-transform:uppercase;color:rgba(255,255,255,0.6)}
        
        /* Navigation Tabs */
        .nav-tabs{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap;border-bottom:2px solid #e8e4e0;padding-bottom:16px}
        .nav-tab{background:transparent;border:none;padding:10px 24px;font-size:0.8rem;font-weight:600;color:#666;cursor:pointer;border-radius:30px;transition:all 0.2s}
        .nav-tab:hover{background:#f0ede8;color:#1a1a2e}
        .nav-tab-active{background:#1a1a2e;color:#fff}
        
        /* Main Grid - 3 Columns Social Style */
        .club-grid{display:grid;grid-template-columns:280px 1fr 320px;gap:28px;margin-bottom:48px}
        
        /* Left Panel - Member Spotlight */
        .members-panel{background:#fff;border-radius:24px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.04);border:1px solid #eeeae5}
        .panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .panel-title{font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#666}
        .member-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0ede8;cursor:pointer}
        .member-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#ee5a24);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
        .member-info{flex:1}
        .member-name{font-size:0.8rem;font-weight:700}
        .member-role{font-size:0.6rem;color:#999}
        .member-badge{background:#ff6b6b10;color:#ff6b6b;padding:2px 8px;border-radius:12px;font-size:0.55rem}
        
        /* Center Panel - Feed (Panjang) */
        .feed-panel{background:#fff;border-radius:24px;border:1px solid #eeeae5;overflow:hidden}
        .feed-header{padding:16px 20px;border-bottom:1px solid #eeeae5}
        .feed-input{background:#f8f6f3;border-radius:40px;padding:12px 20px;display:flex;align-items:center;gap:12px}
        .feed-avatar{width:36px;height:36px;border-radius:50%;background:#ddd;display:flex;align-items:center;justify-content:center}
        .feed-placeholder{flex:1;color:#999;font-size:0.75rem}
        
        /* Post Card (Panjang) */
        .post-card{padding:20px;border-bottom:1px solid #eeeae5;cursor:pointer;transition:background 0.2s}
        .post-card:hover{background:#fefcf9}
        .post-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
        .post-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
        .post-user{flex:1}
        .post-name{font-size:0.8rem;font-weight:700}
        .post-time{font-size:0.6rem;color:#999}
        .post-content{font-size:0.8rem;line-height:1.5;color:#444;margin-bottom:12px}
        .post-media{background:#f8f6f3;border-radius:20px;padding:12px;margin:12px 0;display:flex;align-items:center;gap:12px}
        .media-icon{width:40px;height:40px;background:#1a1a2e;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff}
        .media-info{flex:1}
        .media-title{font-size:0.7rem;font-weight:600}
        .media-meta{font-size:0.55rem;color:#999}
        .post-stats{display:flex;gap:20px;margin-top:12px;padding-top:12px;border-top:1px solid #eeeae5}
        .post-stat{font-size:0.65rem;color:#999}
        .post-stat strong{color:#ff6b6b}
        
        /* Right Panel - Events & Links */
        .events-panel{display:flex;flex-direction:column;gap:24px}
        .event-card{background:#fff;border-radius:24px;padding:20px;border:1px solid #eeeae5}
        .event-title{font-size:0.8rem;font-weight:700;margin-bottom:16px}
        .event-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f0ede8;cursor:pointer}
        .event-date{background:#ff6b6b10;padding:4px 12px;border-radius:12px;font-size:0.6rem;font-weight:700;color:#ff6b6b}
        .event-name{font-size:0.7rem;font-weight:500}
        
        .link-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0ede8;cursor:pointer}
        .link-icon{width:32px;height:32px;background:#f0ede8;border-radius:10px;display:flex;align-items:center;justify-content:center}
        
        /* Footer */
        .club-footer{margin-top:48px;padding:32px 0;border-top:1px solid #eeeae5;text-align:center;font-size:0.7rem;color:#999}
        
        @media(max-width:1100px){.club-grid{grid-template-columns:1fr}.members-panel{order:3}.events-panel{order:2}.feed-panel{order:1}.banner-title{font-size:2rem}.banner{padding:32px}}
        @media(max-width:600px){.club-container{padding:0 16px}.club-banner{padding:24px}.banner-title{font-size:1.5rem}}
    </style>
</head>
<body>
<div class="club-container" id="app"><div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#999">⚡ Loading Fan Club Portal...</div></div>

<script>
(function(){
    // ========== DATABASE FAN CLUB PORTAL ==========
    
    // Member Names
    const FIRST_NAMES = ['Sarah','Mike','Emma','James','Lisa','David','Anna','Chris','Jessica','Tom','Rachel','Kevin','Laura','Brian','Amy','Jason','Nina','Alex','Maria','John','Sophie','Daniel','Olivia','Matthew','Chloe','Andrew','Grace','Ryan','Hannah','Eric'];
    const LAST_NAMES = ['Wong','Smith','Johnson','Lee','Kim','Chen','Davis','Wilson','Martinez','Anderson','Taylor','Thomas','Moore','Jackson','White','Harris','Martin','Thompson','Garcia','Robinson'];
    
    // 50 Post Contents (panjang, engaging)
    const POSTS = [
        "Just found a amazing collection! Sharing with the community. Check the pinned links. This is exactly what I've been searching for weeks!",
        "Has anyone seen the latest content? I heard it's gaining traction. So excited to see the community growing like this! 🔥🔥",
        "Thank you to everyone who shared resources. This community is truly special. We're all here for the same reason and helping each other out!",
        "The new material is incredible! Quality is top-notch. If anyone needs help navigating, feel free to DM me. Always happy to help fellow fans.",
        "What's your favorite piece so far? I'm loving the behind-the-scenes content. It really shows another side we rarely get to see!",
        "Just hit 1000 posts in the archive! This community is amazing. Thank you all for contributing and keeping everything organized!",
        "Has anyone found the complete collection yet? I've been gathering pieces from different sources. Happy to compare notes with other fans!",
        "The quality of this latest batch is incredible. Someone really put effort into preserving this. Much appreciated! 🙏",
        "I've organized everything in my personal collection. If you're looking for something specific, let me know. Sharing is caring!",
        "This community has grown so much. Remember when we were just starting? Now look at us. So proud of everyone here! ❤️"
    ];
    
    // 30 Comment Templates
    const COMMENTS = [
        "Thanks for sharing! This is great!",
        "Amazing find! Been looking for this.",
        "Quality content as always 👏",
        "The community is awesome!",
        "Finally found what I was searching for!",
        "Appreciate all the hard work organizing this!",
        "So glad I found this community 🙌",
        "This is exactly what I needed today!",
        "Incredible resource. Thank you to everyone involved!",
        "The amount of work put into this is amazing!"
    ];
    
    // 20 Event Names
    const EVENTS = [
        "Community Archive Update",
        "Member Appreciation Week",
        "Weekly Content Share",
        "New Member Orientation",
        "Archive Organization Day",
        "Community Discussion Night",
        "Content Discovery Session",
        "Fan Meetup (Virtual)",
        "Year-End Celebration",
        "Special Announcement"
    ];
    
    // 15 Link Resources
    const RESOURCES = [
        { icon: "📚", name: "Community Wiki", desc: "Complete guide" },
        { icon: "💬", name: "Discussion Forum", desc: "Join conversations" },
        { icon: "📁", name: "Archive Index", desc: "Browse collections" },
        { icon: "🔍", name: "Search Guide", desc: "Find content" },
        { icon: "📖", name: "Beginner Guide", desc: "Start here" },
        { icon: "⭐", name: "Top Picks", desc: "Fan favorites" }
    ];
    
    // Stop Words
    const STOP_WORDS = ['club','portal','community','fan','group','hub','forum','discussion','chat'];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const range = (min,max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const formatNumber = (n) => n.toLocaleString();
    
    // ========== EKSTRAK TOPIK ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ window.location.href = "/"; return; }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayName = formatTopic(baseTopic);
    const nameLower = displayName.toLowerCase();
    
    // ========== GENERATE LINK ==========
    const genLink = (type = 'post') => {
        let newQ = `${nameLower} ${type} discussion community`;
        return { url:`/club/?q=${encodeURIComponent(newQ)}`, type: type };
    };
    
    // ========== GENERATE MEMBERS ==========
    const generateMembers = () => {
        let members = [];
        let roles = ['⭐ Top Contributor', '🔥 Active Member', '🌟 New Member', '💎 Veteran', '👑 Founder'];
        for(let i=0;i<6;i++){
            let firstName = rand(FIRST_NAMES);
            let lastName = rand(LAST_NAMES);
            let name = `${firstName} ${lastName}`;
            let initial = firstName[0];
            let role = roles[range(0,4)];
            let posts = formatNumber(range(12, 1850));
            members.push(`
                <div class="member-item" data-url="${genLink('member').url}">
                    <div class="member-avatar">${initial}</div>
                    <div class="member-info">
                        <div class="member-name">${name}</div>
                        <div class="member-role">${posts} posts · ${role}</div>
                    </div>
                    <div class="member-badge">${range(5,95)} badges</div>
                </div>
            `);
        }
        return members.join('');
    };
    
    // ========== GENERATE POST CARD (PANJANG) ==========
    const generatePostCard = (idx) => {
        let firstName = rand(FIRST_NAMES);
        let lastName = rand(LAST_NAMES);
        let name = `${firstName} ${lastName}`;
        let initial = firstName[0];
        let time = `${range(1,12)}h ago`;
        let content = rand(POSTS);
        let comments = range(8, 145);
        let likes = range(25, 890);
        let shares = range(5, 67);
        
        let hasMedia = Math.random() > 0.6;
        let mediaHtml = '';
        if(hasMedia){
            let mediaSize = range(45, 850);
            let mediaCount = range(1, 12);
            mediaHtml = `
                <div class="post-media">
                    <div class="media-icon">📁</div>
                    <div class="media-info">
                        <div class="media-title">New archive update</div>
                        <div class="media-meta">${mediaCount} files · ${mediaSize} MB</div>
                    </div>
                    <div>→</div>
                </div>
            `;
        }
        
        return `
            <div class="post-card" data-url="${genLink('post').url}">
                <div class="post-header">
                    <div class="post-avatar">${initial}</div>
                    <div class="post-user">
                        <div class="post-name">${name}</div>
                        <div class="post-time">${time}</div>
                    </div>
                </div>
                <div class="post-content">${content}</div>
                ${mediaHtml}
                <div class="post-stats">
                    <span class="post-stat">❤️ <strong>${likes}</strong> likes</span>
                    <span class="post-stat">💬 <strong>${comments}</strong> comments</span>
                    <span class="post-stat">↗️ <strong>${shares}</strong> shares</span>
                </div>
            </div>
        `;
    };
    
    // ========== GENERATE EVENTS ==========
    const generateEvents = () => {
        let events = [];
        for(let i=0;i<4;i++){
            let eventName = rand(EVENTS);
            let date = `${range(1,28)}/${range(1,12)}`;
            let attendees = formatNumber(range(45, 580));
            events.push(`
                <div class="event-item" data-url="${genLink('event').url}">
                    <div class="event-date">${date}</div>
                    <div>
                        <div class="event-name">${eventName}</div>
                        <div style="font-size:0.55rem;color:#999">${attendees} attending</div>
                    </div>
                </div>
            `);
        }
        return events.join('');
    };
    
    // ========== GENERATE LINKS ==========
    const generateLinks = () => {
        return RESOURCES.map(res => `
            <div class="link-item" data-url="${genLink(res.name.toLowerCase()).url}">
                <div class="link-icon">${res.icon}</div>
                <div>
                    <div style="font-size:0.7rem;font-weight:600">${res.name}</div>
                    <div style="font-size:0.55rem;color:#999">${res.desc}</div>
                </div>
                <div style="margin-left:auto;color:#999">→</div>
            </div>
        `).join('');
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let titles = [
            `${displayName} · Official Fan Club Portal`,
            `${displayName} · Community Hub & Fan Club`,
            `${displayName} · Connect with Fellow Fans`,
            `${displayName} · The Ultimate Fan Community`
        ];
        let descs = [
            `Join the official ${displayName} fan club. Connect with ${range(1250, 18500)} fellow fans. Access community resources and exclusive content.`,
            `${displayName} fan community hub. Discussion forums, shared resources, and fan connections. Join ${range(850, 12500)}+ active members.`,
            `The ultimate ${displayName} fan destination. Connect, share, and discover with the community. Free to join.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        let totalMembers = range(2850, 18500);
        let onlineNow = range(125, 890);
        let totalPosts = range(12500, 48500);
        let newToday = range(45, 380);
        
        document.getElementById('app').innerHTML = `
            <div class="club-banner">
                <div class="banner-badge">⭐ OFFICIAL FAN CLUB ⭐</div>
                <div class="banner-title">${displayName}<br>Fan Community</div>
                <div class="banner-subtitle">Join thousands of fans sharing, discussing, and celebrating together. The ultimate destination for ${displayName} enthusiasts.</div>
                <div class="banner-stats">
                    <div class="banner-stat"><div class="banner-stat-number">${formatNumber(totalMembers)}+</div><div class="banner-stat-label">MEMBERS</div></div>
                    <div class="banner-stat"><div class="banner-stat-number">${onlineNow}</div><div class="banner-stat-label">ONLINE NOW</div></div>
                    <div class="banner-stat"><div class="banner-stat-number">${formatNumber(totalPosts)}+</div><div class="banner-stat-label">COMMUNITY POSTS</div></div>
                    <div class="banner-stat"><div class="banner-stat-number">+${newToday}</div><div class="banner-stat-label">NEW TODAY</div></div>
                </div>
            </div>
            
            <div class="nav-tabs">
                <button class="nav-tab nav-tab-active">Feed</button>
                <button class="nav-tab">Discussions</button>
                <button class="nav-tab">Resources</button>
                <button class="nav-tab">Events</button>
                <button class="nav-tab">Members</button>
                <button class="nav-tab">About</button>
            </div>
            
            <div class="club-grid">
                <!-- Left: Members -->
                <div class="members-panel">
                    <div class="panel-header">
                        <div class="panel-title">⭐ TOP CONTRIBUTORS</div>
                        <div style="font-size:0.55rem;color:#ff6b6b">view all</div>
                    </div>
                    ${generateMembers()}
                </div>
                
                <!-- Center: Feed (Panjang) -->
                <div class="feed-panel">
                    <div class="feed-header">
                        <div class="feed-input">
                            <div class="feed-avatar">👤</div>
                            <div class="feed-placeholder">Share something with the community...</div>
                        </div>
                    </div>
                    ${generatePostCard(0)}
                    ${generatePostCard(1)}
                    ${generatePostCard(2)}
                    ${generatePostCard(3)}
                    ${generatePostCard(4)}
                </div>
                
                <!-- Right: Events & Links -->
                <div>
                    <div class="event-card">
                        <div class="event-title">📅 UPCOMING EVENTS</div>
                        ${generateEvents()}
                    </div>
                    
                    <div class="event-card">
                        <div class="event-title">🔗 COMMUNITY RESOURCES</div>
                        ${generateLinks()}
                    </div>
                    
                    <div class="event-card">
                        <div class="event-title">💬 COMMUNITY STATS</div>
                        <div style="margin-top:8px">
                            <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span>Total discussions</span><span style="color:#ff6b6b;font-weight:600">${formatNumber(range(1250,4850))}</span></div>
                            <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span>Active daily</span><span style="color:#ff6b6b;font-weight:600">${formatNumber(range(185,1250))}</span></div>
                            <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span>Top contributor</span><span style="color:#ff6b6b;font-weight:600">${rand(FIRST_NAMES)} ${rand(LAST_NAMES)}</span></div>
                            <div style="display:flex;justify-content:space-between"><span>Community rating</span><span style="color:#ff6b6b;font-weight:600">4.9/5 stars ⭐</span></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="club-footer">
                <p>✨ ${displayName} Official Fan Club · ${formatNumber(totalMembers)}+ Members Worldwide</p>
                <p style="margin-top:8px">A community by fans, for fans · Free to join · ${new Date().toLocaleDateString()}</p>
            </div>
        `;
        
        // Attach event listeners
        document.querySelectorAll('[data-url]').forEach(el => {
            el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
        });
        document.querySelectorAll('.post-card, .member-item, .event-item, .link-item').forEach(card => {
            card.addEventListener('click', () => { if(card.getAttribute('data-url')) window.location.href = card.getAttribute('data-url'); });
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
</body>
</html>
