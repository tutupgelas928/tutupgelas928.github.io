<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="referrer" content="always">
    <title id="dynamic-title">LeakX · Akses Konten Viral Terbaru</title>
    <meta id="dynamic-description" name="description" content="Temukan konten viral terbaru. Update setiap hari. Akses eksklusif untuk member.">
    <link id="dynamic-canonical" rel="canonical" href="https://example.com/edition07/">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #e7e9ea;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #000000;
            min-height: 100vh;
            border-left: 1px solid #2f3336;
            border-right: 1px solid #2f3336;
        }

        /* header */
        .header {
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #2f3336;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .logo span {
            color: #1d9bf0;
        }

        .search-box {
            background: #202327;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #71767b;
        }

        /* breadcrumb */
        .breadcrumb {
            padding: 0.5rem 1rem;
            font-size: 0.7rem;
            color: #71767b;
            background: #000000;
            border-bottom: 1px solid #2f3336;
        }

        .breadcrumb a {
            color: #1d9bf0;
            text-decoration: none;
        }

        /* trending bar */
        .trending-bar {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #2f3336;
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .trending-item {
            font-size: 0.7rem;
            white-space: nowrap;
            cursor: pointer;
            transition: color 0.2s;
        }

        .trending-item:hover {
            color: #1d9bf0;
        }

        /* profile header */
        .profile-header {
            padding: 1rem;
            border-bottom: 1px solid #2f3336;
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-name {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .profile-handle {
            font-size: 0.7rem;
            color: #71767b;
        }

        .follow-btn {
            background: #1d9bf0;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .follow-btn:hover {
            opacity: 0.8;
        }

        .profile-bio {
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        .profile-stats {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            font-size: 0.7rem;
            color: #71767b;
        }

        /* tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid #2f3336;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 0.75rem;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .tab.active {
            border-bottom: 2px solid #1d9bf0;
            color: #1d9bf0;
        }

        /* link card - komponen utama untuk klik */
        .link-card {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #2f3336;
            cursor: pointer;
            transition: background 0.1s;
            position: relative;
        }

        .link-card:hover {
            background: #080808;
        }

        .card-header {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .card-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #1d9bf0, #ec489a);
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .card-user-info {
            flex: 1;
        }

        .card-name {
            font-weight: 700;
            font-size: 0.85rem;
        }

        .card-username {
            font-size: 0.75rem;
            color: #71767b;
        }

        .card-time {
            font-size: 0.7rem;
            color: #71767b;
        }

        .card-content {
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            padding-left: 48px;
        }

        .badge {
            display: inline-block;
            background: #1d9bf0;
            font-size: 0.6rem;
            padding: 0.1rem 0.4rem;
            border-radius: 12px;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        .badge.hot {
            background: #ec489a;
        }

        .badge.new {
            background: #00ba7c;
        }

        .media-preview {
            background: #1a1a1a;
            border-radius: 16px;
            margin: 0.5rem 0 0.5rem 48px;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #2f3336;
            position: relative;
        }

        .play-icon {
            width: 32px;
            height: 32px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .media-info {
            flex: 1;
            font-size: 0.7rem;
        }

        .media-size {
            font-size: 0.6rem;
            color: #71767b;
        }

        .view-count {
            font-size: 0.6rem;
            color: #1d9bf0;
        }

        /* CTA button */
        .cta-button {
            background: linear-gradient(135deg, #1d9bf0, #ec489a);
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
            margin-left: 48px;
            margin-top: 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            animation: pulse 2s infinite;
        }

        .cta-button:hover {
            transform: scale(1.02);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.85; }
            100% { opacity: 1; }
        }

        /* card actions */
        .card-actions {
            display: flex;
            gap: 2rem;
            margin-top: 0.5rem;
            padding-left: 48px;
            font-size: 0.7rem;
            color: #71767b;
        }

        .action-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* sidebar sections */
        .sidebar-section {
            padding: 1rem;
            border-top: 1px solid #2f3336;
        }

        .section-title {
            font-weight: 700;
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
        }

        .trending-topic {
            margin-bottom: 0.75rem;
            cursor: pointer;
        }

        .trending-rank {
            font-size: 0.65rem;
            color: #71767b;
        }

        .trending-name {
            font-weight: 600;
            font-size: 0.8rem;
        }

        .trending-posts {
            font-size: 0.6rem;
            color: #71767b;
        }

        .follow-suggestion {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .suggestion-info {
            flex: 1;
        }

        .suggestion-name {
            font-weight: 600;
            font-size: 0.8rem;
        }

        .suggestion-handle {
            font-size: 0.65rem;
            color: #71767b;
        }

        .suggestion-follow {
            background: #1d9bf0;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.65rem;
            cursor: pointer;
        }

        .footer {
            padding: 1rem;
            text-align: center;
            font-size: 0.6rem;
            color: #71767b;
            border-top: 1px solid #2f3336;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 640px) {
            .container { border-left: none; border-right: none; }
            .card-content, .media-preview, .card-actions, .cta-button { padding-left: 48px; margin-left: 0; }
        }
    </style>

<body><div loading="lazy">

<div class="container" id="app">
    <!-- loading state -->
    <div id="loading" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div>Loading...</div>
    </div>

    <!-- konten utama akan di-render oleh JS -->
</div>

<script>
(function() {
    // ========== KONFIGURASI DATABASE KATA ==========
    const ACTIONS = [
        "watch", "download", "view", "access", "stream", 
        "unlock", "see", "get", "open", "reveal",
        "browse", "check", "find", "discover", "explore"
    ];
    
    const CONTENT_TYPES = [
        "full video", "complete set", "mega folder", "archive",
        "compilation", "collection", "dump", "vault", "gallery",
        "pack", "bundle", "library", "database", "repository",
        "leak", "exclusive", "private content", "premium"
    ];
    
    const QUALIFIERS = [
        "exclusive", "viral", "leaked", "private", "premium",
        "uncensored", "full HD", "rare", "limited", "new",
        "2024", "2025", "authentic", "verified", "original"
    ];
    
    const URGENCY = [
        "before takedown", "limited time", "only today", 
        "expiring soon", "last chance", "few left",
        "trending now", "viral today", "hot off the press"
    ];
    
    const TRIGGERS = [
        { type: "fomo", text: "⚠️ Only few views left before removal!" },
        { type: "social", text: "🔥 1.2M people already watched this" },
        { type: "urgency", text: "⏰ Link expires in 24 hours" },
        { type: "scarcity", text: "📁 Last copy available" },
        { type: "activity", text: "🔒 47 people viewing this right now" },
        { type: "curiosity", text: "🫣 You won't believe what's inside" }
    ];
    
    const AVATARS = ["🔥", "💎", "⭐", "👑", "🔞", "💿", "📁", "🎬", "📸", "🎥"];
    const USERNAMES = ["leakarchive", "viralfinder", "exclusivehub", "contentvault", "leakcentral", "viralnow", "dailyxclusive", "leakfeed", "contentking", "vaultkeeper"];
    const DISPLAY_NAMES = ["LeakArchive", "ViralFinder", "ExclusiveHub", "ContentVault", "LeakCentral", "ViralNow", "DailyXclusive", "LeakFeed", "ContentKing", "VaultKeeper"];
    
    // ========== AMBIL KUERI DARI URL ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    
    // Jika tidak ada kueri, redirect ke halaman utama
    if (!rawQuery || rawQuery.trim() === "") {
        window.location.href = "/";
        return;
    }
    
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g, ' '));
    
    // ========== EKSTRAK NAMA DASAR ==========
    const STOP_WORDS = ['leaked', 'leak', 'leaks', 'archive', 'collection', 'dump', 'vault', 'pack', 'bundle', 'gallery', 'content', 'media', 'videos', 'photos', 'pics', 'onlyfans', 'tiktok', 'instagram', 'twitter', 'telegram', 'discord', 'trending', 'viral', 'exclusive', 'private', 'premium', 'watch', 'download', 'view', 'access', 'stream', 'unlock', 'see', 'get', 'open', 'reveal', 'full', 'complete', 'hot', 'new'];
    
    let baseName = rawQuery.toLowerCase();
    STOP_WORDS.forEach(word => {
        const regex = new RegExp('\\b' + word + '\\b', 'gi');
        baseName = baseName.replace(regex, '');
    });
    baseName = baseName.replace(/\s+/g, ' ').trim();
    if (baseName.length < 2) baseName = rawQuery;
    
    function formatName(str) {
        return str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    }
    const displayName = formatName(baseName);
    const displayLower = displayName.toLowerCase();
    
    // ========== FUNGSI PEMBUAT LINK DINAMIS ==========
    function generateVariantLink(suffixType = "full") {
        const action = ACTIONS[Math.floor(Math.random() * ACTIONS.length)];
        const contentType = CONTENT_TYPES[Math.floor(Math.random() * CONTENT_TYPES.length)];
        const qualifier = QUALIFIERS[Math.floor(Math.random() * QUALIFIERS.length)];
        const urgencyText = URGENCY[Math.floor(Math.random() * URGENCY.length)];
        
        let newQuery = `${displayLower} ${action} ${contentType} ${qualifier}`;
        
        if (suffixType === "with_urgency" && Math.random() > 0.5) {
            newQuery += ` ${urgencyText}`;
        }
        
        return {
            url: `/edition07/?q=${encodeURIComponent(newQuery)}`,
            anchor: `${action.charAt(0).toUpperCase() + action.slice(1)} ${contentType}`,
            qualifier: qualifier,
            urgency: urgencyText
        };
    }
    
    function generateBulkLinks(count = 30) {
        const links = [];
        for (let i = 0; i < count; i++) {
            links.push(generateVariantLink("with_urgency"));
        }
        return links;
    }
    
    // ========== FUNGSI RENDER LINK CARD ==========
    function renderLinkCard(link, index) {
        const views = Math.floor(Math.random() * 50000) + 1000;
        const size = Math.floor(Math.random() * 500) + 50;
        const replies = Math.floor(Math.random() * 200) + 10;
        const retweets = Math.floor(Math.random() * 500) + 50;
        const likes = Math.floor(Math.random() * 2000) + 200;
        const timeAgo = `${Math.floor(Math.random() * 12) + 1}h`;
        const avatar = AVATARS[Math.floor(Math.random() * AVATARS.length)];
        const displayNameRand = DISPLAY_NAMES[Math.floor(Math.random() * DISPLAY_NAMES.length)];
        const usernameRand = USERNAMES[Math.floor(Math.random() * USERNAMES.length)];
        const trigger = TRIGGERS[Math.floor(Math.random() * TRIGGERS.length)];
        
        const badgeClass = link.qualifier === 'exclusive' ? 'hot' : (link.qualifier === 'new' ? 'new' : '');
        
        return `
            <div class="link-card" data-url="${link.url}">
                <div class="card-header">
                    <div class="card-avatar">${avatar}</div>
                    <div class="card-user-info">
                        <div class="card-name">
                            ${displayNameRand}
                            ${link.qualifier ? `<span class="badge ${badgeClass}">${link.qualifier.toUpperCase()}</span>` : ''}
                        </div>
                        <div class="card-username">@${usernameRand}</div>
                        <div class="card-time">· ${timeAgo}</div>
                    </div>
                </div>
                <div class="card-content">
                    ${trigger.text} ${displayName} ${link.anchor} ${link.qualifier} content just dropped!
                    <div class="view-count">👁️ ${views.toLocaleString()} views</div>
                </div>
                <div class="media-preview">
                    <div class="play-icon">▶</div>
                    <div class="media-info">
                        <div>${link.anchor.toUpperCase()}</div>
                        <div class="media-size">${size} MB · ${link.qualifier} quality</div>
                    </div>
                    <div>→</div>
                </div>
                <div class="cta-button">
                    ⚡ CLICK TO ${link.anchor.toUpperCase()} ⚡
                </div>
                <div class="card-actions">
                    <span class="action-item">💬 ${replies}</span>
                    <span class="action-item">🔁 ${retweets}</span>
                    <span class="action-item">❤️ ${likes}</span>
                    <span class="action-item">📤</span>
                </div>
            </div>
        `;
    }
    
    // ========== RENDER TRENDING TOPICS ==========
    function renderTrendingTopics(baseLinks) {
        const topics = [];
        for (let i = 0; i < 5; i++) {
            const link = baseLinks[i] || generateVariantLink();
            const topicName = `#${displayLower.replace(/ /g, '')}${link.qualifier.replace(/ /g, '')}`;
            const posts = Math.floor(Math.random() * 80) + 10;
            topics.push(`
                <div class="trending-topic" data-url="${link.url}">
                    <div class="trending-rank">Trending ${i+1} · ${link.qualifier}</div>
                    <div class="trending-name">${topicName}</div>
                    <div class="trending-posts">${posts}K posts</div>
                </div>
            `);
        }
        return topics.join('');
    }
    
    // ========== RENDER WHO TO FOLLOW ==========
    function renderWhoToFollow() {
        const suggestions = [];
        for (let i = 0; i < 3; i++) {
            const link = generateVariantLink();
            const name = DISPLAY_NAMES[Math.floor(Math.random() * DISPLAY_NAMES.length)];
            const handle = USERNAMES[Math.floor(Math.random() * USERNAMES.length)];
            suggestions.push(`
                <div class="follow-suggestion" data-url="${link.url}">
                    <div class="suggestion-info">
                        <div class="suggestion-name">${name}</div>
                        <div class="suggestion-handle">@${handle}</div>
                    </div>
                    <div class="suggestion-follow">Follow</div>
                </div>
            `);
        }
        return suggestions.join('');
    }
    
    // ========== UPDATE SEO ==========
    function updateSEO() {
        const pageTitle = `${displayName} · Akses Konten Eksklusif Terbaru | LeakX`;
        const pageDesc = `Temukan konten eksklusif ${displayName} terbaru. Update viral setiap hari. Akses cepat dan mudah.`;
        document.title = pageTitle;
        
        let metaDesc = document.getElementById('dynamic-description');
        if (metaDesc) metaDesc.setAttribute('content', pageDesc);
        
        let canonical = document.getElementById('dynamic-canonical');
        if (canonical) canonical.setAttribute('href', window.location.href.split('?')[0]);
    }
    
    // ========== RENDER HALAMAN UTUH ==========
    function renderPage() {
        const bulkLinks = generateBulkLinks(12);
        const randomNumbers = {
            tweets: Math.floor(Math.random() * 500) + 100,
            following: Math.floor(Math.random() * 200) + 50,
            followers: Math.floor(Math.random() * 800) + 200
        };
        
        const html = `
            <div class="header">
                <div class="logo">Leak<span>X</span></div>
                <div class="search-box">🔍 Search</div>
            </div>
            <div class="breadcrumb">
                <a href="/">Home</a> / Edition / ${displayName}
            </div>
            <div class="trending-bar" id="trendingBar">
                ${bulkLinks.slice(0, 8).map(link => `<span class="trending-item" data-url="${link.url}">🔥 ${link.anchor}</span>`).join('')}
            </div>
            
            <div class="profile-header">
                <div class="profile-row">
                    <div>
                        <div class="profile-name">${displayName} <span style="font-size:0.7rem; color:#1d9bf0;">· Archive</span></div>
                        <div class="profile-handle">@${displayLower}_archive</div>
                    </div>
                    <div class="follow-btn">Follow</div>
                </div>
                <div class="profile-bio">
                    The complete archive of ${displayName} exclusive content. Updated daily with new material.
                </div>
                <div class="profile-stats">
                    <span>📝 ${randomNumbers.tweets} Posts</span>
                    <span>👥 ${randomNumbers.following} Following</span>
                    <span>❤️ ${randomNumbers.followers} Followers</span>
                </div>
            </div>
            
            <div class="tabs">
                <div class="tab active">For You</div>
                <div class="tab">Following</div>
                <div class="tab">Media</div>
                <div class="tab">Likes</div>
            </div>
            
            <div id="feedContainer">
                ${bulkLinks.map((link, idx) => renderLinkCard(link, idx)).join('')}
            </div>
            
            <div class="sidebar-section">
                <div class="section-title">🔥 Trending terkait</div>
                <div id="trendingContainer">
                    ${renderTrendingTopics(bulkLinks)}
                </div>
            </div>
            
            <div class="sidebar-section">
                <div class="section-title">Who to follow</div>
                <div id="followContainer">
                    ${renderWhoToFollow()}
                </div>
            </div>
            
            <div class="footer">
                LeakX · ${randomNumbers.followers} followers · Updated real-time · #${displayLower.replace(/ /g, '')}Archive
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
        attachEventListeners();
    }
    
    // ========== ATTACH EVENT LISTENER UNTUK SEMUA LINK ==========
    function attachEventListeners() {
        // Semua elemen dengan data-url akan menjadi link
        const clickableElements = document.querySelectorAll('[data-url]');
        clickableElements.forEach(el => {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                const url = this.getAttribute('data-url');
                if (url) window.location.href = url;
            });
        });
        
        // Link card
        const linkCards = document.querySelectorAll('.link-card');
        linkCards.forEach(card => {
            card.addEventListener('click', function() {
                const url = this.getAttribute('data-url');
                if (url) window.location.href = url;
            });
        });
        
        // Trending items di bar
        const trendingItems = document.querySelectorAll('.trending-item');
        trendingItems.forEach(item => {
            item.addEventListener('click', function() {
                const url = this.getAttribute('data-url');
                if (url) window.location.href = url;
            });
        });
        
        // Follow suggestions
        const followSugg = document.querySelectorAll('.follow-suggestion');
        followSugg.forEach(sugg => {
            sugg.addEventListener('click', function() {
                const url = this.getAttribute('data-url');
                if (url) window.location.href = url;
            });
        });
        
        // Trending topics di sidebar
        const trendingTopics = document.querySelectorAll('.trending-topic');
        trendingTopics.forEach(topic => {
            topic.addEventListener('click', function() {
                const url = this.getAttribute('data-url');
                if (url) window.location.href = url;
            });
        });
    }
    
    // ========== EKSEKUSI ==========
    updateSEO();
    renderPage();
})();
</script>
