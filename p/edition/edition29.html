<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="bingbot" content="index, follow">
    <meta name="yandex" content="index, follow">
    <meta name="referrer" content="always">
    <title id="dynamic-title">BREACH ALERT · Real-time Leak Intelligence Center</title>
    <meta id="dynamic-description" name="description" content="Real-time breach intelligence and leak detection. Live monitoring across all platforms.">
    <link id="dynamic-canonical" rel="canonical" href="https://example.com/breach/">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:radial-gradient(ellipse at 20% 30%, #0a0a0a, #030303);min-height:100vh;font-family:'Chakra Petch',sans-serif;color:#e0e0e0}
        
        /* Animated Background Grid */
        .grid-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
        .grid-bg::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(0,255,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,0,0.03) 1px,transparent 1px);background-size:40px 40px;animation:gridMove 20s linear infinite}
        @keyframes gridMove{0%{transform:translate(0,0)}100%{transform:translate(40px,40px)}}
        
        .breach-container{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 24px}
        
        /* Glowing Header */
        .glitch-header{background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,255,0,0.3);padding:16px 0;margin-bottom:32px;position:relative;overflow:hidden}
        .glitch-header::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,255,0,0.1),transparent);animation:scan 4s linear infinite}
        @keyframes scan{0%{left:-100%}100%{left:200%}}
        
        .header-flex{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
        .logo{display:flex;align-items:center;gap:12px}
        .logo-icon{font-size:28px;animation:pulseGlow 2s ease-in-out infinite}
        @keyframes pulseGlow{0%,100%{text-shadow:0 0 2px #0f0;filter:drop-shadow(0 0 2px #0f0)}50%{text-shadow:0 0 8px #0f0;filter:drop-shadow(0 0 8px #0f0)}}
        .logo-text{font-size:1.2rem;font-weight:700;letter-spacing:2px}
        .logo-text span{color:#00ff00;animation:blink 1.5s step-end infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
        .threat-level{background:rgba(255,0,0,0.2);border:1px solid #ff0000;padding:6px 16px;border-radius:30px;font-size:0.65rem;animation:borderPulse 1.5s infinite}
        @keyframes borderPulse{0%,100%{box-shadow:0 0 0px #ff0000}50%{box-shadow:0 0 12px #ff0000}}
        
        /* Hero Animated */
        .hero-animated{background:linear-gradient(135deg,rgba(0,20,0,0.6),rgba(0,0,0,0.8));border:1px solid rgba(0,255,0,0.2);border-radius:24px;padding:48px;margin-bottom:40px;position:relative;overflow:hidden}
        .hero-animated::after{content:'LIVE';position:absolute;top:20px;right:30px;background:#ff0000;color:#fff;padding:4px 12px;border-radius:4px;font-size:0.6rem;font-weight:700;animation:livePulse 1s infinite}
        @keyframes livePulse{0%,100%{opacity:1}50%{opacity:0.5}}
        .hero-tag{font-size:0.65rem;color:#00ff00;margin-bottom:16px;letter-spacing:3px;animation:slideIn 0.8s ease-out}
        @keyframes slideIn{0%{opacity:0;transform:translateX(-30px)}100%{opacity:1;transform:translateX(0)}}
        .hero-title{font-size:2.8rem;font-weight:800;margin-bottom:20px;animation:fadeInUp 0.8s ease-out 0.2s both}
        .hero-title span{color:#00ff00;text-shadow:0 0 10px #00ff00;animation:textGlow 2s ease-in-out infinite}
        @keyframes textGlow{0%,100%{text-shadow:0 0 5px #00ff00}50%{text-shadow:0 0 20px #00ff00}}
        @keyframes fadeInUp{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}
        .hero-desc{font-size:0.9rem;color:#aaa;max-width:700px;margin-bottom:32px;animation:fadeInUp 0.8s ease-out 0.4s both}
        .hero-stats{display:flex;gap:48px;flex-wrap:wrap;animation:fadeInUp 0.8s ease-out 0.6s both}
        .hero-stat .value{font-size:1.5rem;font-weight:800;color:#00ff00;animation:countUp 0.5s ease-out}
        .hero-stat .label{font-size:0.6rem;color:#666}
        
        /* Threat Indicators */
        .threat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:40px}
        .threat-indicator{background:rgba(0,0,0,0.6);border:1px solid #1f1f1f;border-radius:16px;padding:20px;text-align:center;animation:fadeInUp 0.5s ease-out both}
        .threat-indicator:nth-child(1){animation-delay:0.1s}
        .threat-indicator:nth-child(2){animation-delay:0.2s}
        .threat-indicator:nth-child(3){animation-delay:0.3s}
        .threat-indicator:nth-child(4){animation-delay:0.4s}
        .threat-gauge{width:100%;height:4px;background:#1f1f1f;border-radius:4px;margin:12px 0;overflow:hidden}
        .threat-fill{height:4px;border-radius:4px;animation:fillBar 1s ease-out forwards}
        @keyframes fillBar{0%{width:0%}100%{width:var(--width)}}
        .threat-label{font-size:0.7rem;font-weight:600}
        .threat-value{font-size:1.2rem;font-weight:800;color:#00ff00}
        
        /* Leak Cards Grid */
        .leak-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-bottom:48px}
        .leak-card{background:rgba(0,0,0,0.6);border:1px solid #1f1f1f;border-radius:20px;padding:24px;cursor:pointer;transition:all 0.3s;animation:fadeInUp 0.5s ease-out both;position:relative;overflow:hidden}
        .leak-card:hover{transform:translateY(-6px) scale(1.02);border-color:#00ff00;box-shadow:0 0 20px rgba(0,255,0,0.2)}
        .leak-card::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,255,0,0.05),transparent);transition:left 0.5s}
        .leak-card:hover::before{left:100%}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
        .card-level{padding:4px 12px;border-radius:20px;font-size:0.55rem;font-weight:700;animation:pulseBadge 2s infinite}
        .level-critical{background:#ff0000;color:#fff;animation:pulseBadge 1s infinite}
        .level-high{background:#ff6600;color:#fff}
        .level-medium{background:#ffcc00;color:#000}
        @keyframes pulseBadge{0%,100%{opacity:1}50%{opacity:0.6}}
        .card-icon{font-size:28px;animation:float 3s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
        .card-title{font-size:1rem;font-weight:700;margin-bottom:12px;line-height:1.3}
        .card-desc{font-size:0.7rem;color:#999;margin-bottom:16px;line-height:1.5}
        .card-meta{display:flex;justify-content:space-between;padding-top:12px;border-top:1px solid #1f1f1f;font-size:0.55rem;color:#666}
        
        /* Live Feed Animated */
        .live-feed{background:rgba(0,0,0,0.5);border:1px solid #1f1f1f;border-radius:20px;padding:24px;margin-bottom:48px}
        .feed-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:1px solid #1f1f1f;padding-bottom:12px}
        .feed-title{font-size:0.8rem;font-weight:700;color:#00ff00}
        .feed-title::before{content:'●';color:#00ff00;margin-right:8px;animation:blink 1s infinite}
        .feed-items{display:flex;flex-direction:column;gap:12px}
        .feed-row{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(0,0,0,0.3);border-radius:12px;cursor:pointer;transition:all 0.2s;animation:slideInRow 0.5s ease-out both}
        .feed-row:hover{background:rgba(0,255,0,0.05);transform:translateX(6px)}
        @keyframes slideInRow{0%{opacity:0;transform:translateX(-20px)}100%{opacity:1;transform:translateX(0)}}
        .feed-time{font-family:monospace;font-size:0.55rem;color:#00ff00;min-width:70px}
        .feed-text{flex:1;font-size:0.7rem}
        .feed-badge{background:#ff0000;padding:2px 8px;border-radius:12px;font-size:0.55rem;animation:pulseBadge 1.5s infinite}
        
        /* Platform Intelligence */
        .platform-intel{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-bottom:48px}
        .platform-card{background:rgba(0,0,0,0.5);border:1px solid #1f1f1f;border-radius:20px;padding:20px;animation:fadeInUp 0.5s ease-out both}
        .platform-title{font-size:0.7rem;color:#00ff00;margin-bottom:12px}
        .platform-list{display:flex;flex-direction:column;gap:10px}
        .platform-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1f1f1f;cursor:pointer}
        .platform-row:hover .platform-name{color:#00ff00}
        .platform-name{font-size:0.7rem}
        .platform-leaks{font-family:monospace;font-size:0.6rem;color:#ff6600}
        
        /* Footer */
        .breach-footer{margin-top:48px;padding:24px 0;border-top:1px solid #1f1f1f;display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;font-size:0.6rem;color:#666}
        
        @media(max-width:900px){.leak-grid{grid-template-columns:1fr}.threat-grid{grid-template-columns:repeat(2,1fr)}.hero-title{font-size:1.8rem}}
        @media(max-width:600px){.breach-container{padding:0 16px}.hero-animated{padding:28px}.threat-grid{grid-template-columns:1fr}.platform-intel{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="breach-container" id="app"><div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#666;font-family:'Chakra Petch'">>_ INITIALIZING BREACH INTELLIGENCE...</div></div>

<script>
(function(){
    // ========== DATABASE BREACH INTELLIGENCE ==========
    
    // Leak Cards Data (setiap heading mengandung "leak")
    const LEAK_CARDS = [
        { level: "CRITICAL", icon: "🔥", title: "{name} Complete Archive Leak — Full Content Exposure", desc: "Massive {name} content leak detected across {platforms} platforms. Total {count} verified files. Critical spread velocity detected. Multiple backup mirrors active." },
        { level: "HIGH", icon: "⚠️", title: "{name} Exclusive Vault Leak — Premium Content Breach", desc: "High-value {name} exclusive leak identified. Premium subscriber content now in public domain. {count} new files. Authenticity verified at {percent}%." },
        { level: "HIGH", icon: "📱", title: "{name} TikTok Private Leak — Viral Content Dump", desc: "{name} TikTok private content leak detected. {count} videos compromised. Rapid distribution across social channels. Trending on multiple platforms." },
        { level: "MEDIUM", icon: "📸", title: "{name} Instagram Story Leak — Private Gallery Exposure", desc: "{name} Instagram private story content leak. {count} images/videos from private account now circulating. Verified authentic." },
        { level: "CRITICAL", icon: "💎", title: "{name} OnlyFans Full Leak — Complete Subscription Dump", desc: "Full {name} OnlyFans subscription leak. All exclusive content exposed. {count} videos and {photos} photos. Critical threat level." },
        { level: "HIGH", icon: "✈️", title: "{name} Telegram Channel Leak — Mass Distribution", desc: "{name} content spreading via private Telegram channels. {mirrors} active mirrors. Estimated {users}K users accessed within {hours} hours." }
    ];
    
    // Live Feed Items (animasi)
    const FEED_ITEMS = [
        { text: "{name} Archive Leak Detected — {count} new files", badge: "NEW" },
        { text: "{name} OnlyFans Leak Verification Complete — {percent}% authentic", badge: "VERIFIED" },
        { text: "{name} Telegram Leak Spreading — {speed}x normal velocity", badge: "ALERT" },
        { text: "{name} TikTok Leak Trending — #{trending} on platform", badge: "TRENDING" },
        { text: "{name} Discord Server Leak — {count} files compromised", badge: "BREACH" },
        { text: "{name} Mega Backup Leak — {size} GB exposed", badge: "NEW" }
    ];
    
    // Platform data
    const PLATFORMS = [
        { name: "Telegram", leaks: 0, trend: "up" },
        { name: "OnlyFans", leaks: 0, trend: "up" },
        { name: "Discord", leaks: 0, trend: "up" },
        { name: "Twitter/X", leaks: 0, trend: "steady" },
        { name: "Instagram", leaks: 0, trend: "up" },
        { name: "TikTok", leaks: 0, trend: "up" },
        { name: "Reddit", leaks: 0, trend: "down" },
        { name: "Telegram (Backup)", leaks: 0, trend: "up" }
    ];
    
    // Stop Words
    const STOP_WORDS = ['breach','leak','monitor','intelligence','alert','threat','exposure','compromise'];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const range = (min,max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const formatNumber = (n) => n.toLocaleString();
    
    // ========== EKSTRAK TOPIK ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ rawQuery = "celebrity content breach"; }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayName = formatTopic(baseTopic);
    const nameLower = displayName.toLowerCase();
    
    // ========== GENERATE LINK ==========
    const genLink = (title) => {
        let newQ = `${nameLower} ${title.toLowerCase().substring(0, 50)} leak`;
        return { url:`/breach/?q=${encodeURIComponent(newQ)}` };
    };
    
    // ========== GENERATE THREAT INDICATORS ==========
    const generateThreatIndicators = () => {
        const threats = [
            { label: "LEAK VELOCITY", value: range(65, 98), color: "#ff0000" },
            { label: "PLATFORM SPREAD", value: range(72, 95), color: "#ff6600" },
            { label: "VERIFICATION RATE", value: range(88, 99), color: "#00ff00" },
            { label: "THREAT INDEX", value: range(82, 97), color: "#ff0000" }
        ];
        return threats.map((t, i) => `
            <div class="threat-indicator" style="animation-delay:${0.1 + i*0.1}s">
                <div class="threat-label">${t.label}</div>
                <div class="threat-value">${t.value}%</div>
                <div class="threat-gauge"><div class="threat-fill" style="--width:${t.value}%;width:${t.value}%;background:${t.color}"></div></div>
            </div>
        `).join('');
    };
    
    // ========== GENERATE LEAK CARDS ==========
    const generateLeakCards = () => {
        return LEAK_CARDS.map((card, idx) => {
            let title = card.title.replace('{name}', displayName);
            let desc = card.desc
                .replace('{name}', displayName)
                .replace('{platforms}', range(2, 7))
                .replace('{count}', formatNumber(range(125, 2850)))
                .replace('{percent}', range(85, 99))
                .replace('{photos}', formatNumber(range(45, 850)))
                .replace('{mirrors}', range(3, 18))
                .replace('{users}', formatNumber(range(12, 185)))
                .replace('{hours}', range(2, 24));
            let levelClass = card.level === 'CRITICAL' ? 'level-critical' : (card.level === 'HIGH' ? 'level-high' : 'level-medium');
            let fileSize = `${range(45, 850)} MB`;
            let timestamp = `${range(1, 45)} min ago`;
            return `
                <div class="leak-card" data-url="${genLink(card.title).url}" style="animation-delay:${0.5 + idx*0.1}s">
                    <div class="card-header">
                        <div class="card-level ${levelClass}">${card.level} ALERT</div>
                        <div class="card-icon">${card.icon}</div>
                    </div>
                    <div class="card-title">${title}</div>
                    <div class="card-desc">${desc.substring(0, 120)}...</div>
                    <div class="card-meta">
                        <span>📁 ${fileSize}</span>
                        <span>⏱️ ${timestamp}</span>
                        <span>🔴 ACTIVE LEAK</span>
                    </div>
                </div>
            `;
        }).join('');
    };
    
    // ========== GENERATE LIVE FEED ==========
    const generateLiveFeed = () => {
        let items = [];
        for(let i=0;i<8;i++){
            let item = rand(FEED_ITEMS);
            let text = item.text
                .replace('{name}', displayName)
                .replace('{count}', formatNumber(range(45, 1850)))
                .replace('{percent}', range(92, 99))
                .replace('{speed}', range(3, 15))
                .replace('{trending}', ['#1','#2','#3','#5','#10'][range(0,4)])
                .replace('{size}', `${range(25, 450)}GB`);
            let time = `${range(0,23).toString().padStart(2,'0')}:${range(0,59).toString().padStart(2,'0')}:${range(0,59).toString().padStart(2,'0')}`;
            items.push(`
                <div class="feed-row" data-url="${genLink(item.text).url}" style="animation-delay:${0.1 + i*0.05}s">
                    <div class="feed-time">${time}</div>
                    <div class="feed-text">⚠️ ${text}</div>
                    <div class="feed-badge">${item.badge}</div>
                </div>
            `);
        }
        return items.join('');
    };
    
    // ========== GENERATE PLATFORM INTEL ==========
    const generatePlatformIntel = () => {
        let leftPlatforms = PLATFORMS.slice(0,4);
        let rightPlatforms = PLATFORMS.slice(4,8);
        
        const renderList = (platforms) => {
            return platforms.map(p => {
                let leakCount = formatNumber(range(45, 2850));
                let trendIcon = p.trend === 'up' ? '↑' : (p.trend === 'down' ? '↓' : '→');
                let trendColor = p.trend === 'up' ? '#00ff00' : (p.trend === 'down' ? '#ff0000' : '#ffcc00');
                return `
                    <div class="platform-row" data-url="${genLink(p.name).url}">
                        <div class="platform-name">📱 ${p.name}</div>
                        <div class="platform-leaks" style="color:${trendColor}">${trendIcon} ${leakCount} leaks</div>
                    </div>
                `;
            }).join('');
        };
        
        return `
            <div class="platform-card">
                <div class="platform-title">🔍 PRIMARY THREAT VECTORS</div>
                <div class="platform-list">${renderList(leftPlatforms)}</div>
            </div>
            <div class="platform-card">
                <div class="platform-title">🔍 SECONDARY DISTRIBUTION</div>
                <div class="platform-list">${renderList(rightPlatforms)}</div>
            </div>
        `;
    };
    
    // ========== RENDER HERO ==========
    const renderHero = () => {
        let totalLeaks = formatNumber(range(185, 1850));
        let activeThreats = range(12, 45);
        let monitoredPlatforms = PLATFORMS.length;
        
        return `
            <div class="hero-animated">
                <div class="hero-tag">⚡ LIVE BREACH INTELLIGENCE NETWORK ⚡</div>
                <div class="hero-title"><span>${displayName}</span> Leak Intelligence Center</div>
                <div class="hero-desc">Real-time breach detection and content leak monitoring for ${displayName}. Intelligence feeds from ${monitoredPlatforms} threat vectors. Verified leak alerts with live distribution tracking. Critical updates every second.</div>
                <div class="hero-stats">
                    <div class="hero-stat"><div class="value">${totalLeaks}</div><div class="label">CONFIRMED LEAKS</div></div>
                    <div class="hero-stat"><div class="value">${activeThreats}</div><div class="label">ACTIVE THREATS</div></div>
                    <div class="hero-stat"><div class="value">${monitoredPlatforms}</div><div class="label">MONITORED VECTORS</div></div>
                </div>
            </div>
        `;
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let titles = [
            `${displayName} Leak Intelligence — Real-Time Breach Alert Center`,
            `${displayName} Leak Monitor — Live Threat Detection Dashboard`,
            `${displayName} Content Leak — Complete Breach Intelligence Hub`,
            `BREACH ALERT: ${displayName} Leak Detection — Live Updates`
        ];
        let descs = [
            `Real-time ${displayName} leak intelligence. ${range(185, 1850)}+ confirmed leaks. Live monitoring across ${PLATFORMS.length} threat vectors. Verified breach alerts.`,
            `${displayName} breach detection center. Complete leak tracking with live distribution analysis. Instant threat alerts.`,
            `Live ${displayName} leak intelligence dashboard. Monitor ${displayName} content breaches across all platforms. Real-time alerts.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        let totalIndexed = formatNumber(range(12500, 48500));
        
        document.getElementById('app').innerHTML = `
            <div class="glitch-header">
                <div class="header-flex">
                    <div class="logo">
                        <div class="logo-icon">🛡️</div>
                        <div class="logo-text">BREACH<span>INTEL</span></div>
                    </div>
                    <div class="threat-level">🚨 CRITICAL THREAT LEVEL: ${range(8,10)}/10</div>
                </div>
            </div>
            
            ${renderHero()}
            
            <div class="threat-grid">
                ${generateThreatIndicators()}
            </div>
            
            <div class="leak-grid">
                ${generateLeakCards()}
            </div>
            
            <div class="live-feed">
                <div class="feed-header">
                    <div class="feed-title">LIVE LEAK INTELLIGENCE FEED</div>
                    <div style="font-size:0.55rem;color:#00ff00">UPDATING REAL-TIME</div>
                </div>
                <div class="feed-items">
                    ${generateLiveFeed()}
                </div>
            </div>
            
            <div class="platform-intel">
                ${generatePlatformIntel()}
            </div>
            
            <div class="breach-footer">
                <span>🛡️ BREACHINTEL · ${displayName} Intelligence Center</span>
                <span>📡 ${totalIndexed} monitored assets</span>
                <span>⚡ Last scan: ${range(1,5)} seconds ago</span>
                <span>🔒 Verified intelligence network</span>
            </div>
        `;
        
        // Attach event listeners
        document.querySelectorAll('[data-url]').forEach(el => {
            el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
        });
        document.querySelectorAll('.leak-card, .feed-row, .platform-row').forEach(card => {
            card.addEventListener('click', () => { 
                if(card.getAttribute('data-url')) window.location.href = card.getAttribute('data-url');
            });
        });
    };
    
    updateSEO();
    renderPage();
})();
