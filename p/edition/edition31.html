<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="bingbot" content="index, follow">
    <meta name="yandex" content="index, follow">
    <meta name="referrer" content="always">
    <title id="dynamic-title">VISUAL DISCOVERY · Complete Media Gallery Portal</title>
    <meta id="dynamic-description" name="description" content="Complete visual media gallery. Discover and explore content collections. Fast visual discovery.">
    <link id="dynamic-canonical" rel="canonical" href="https://example.com/gallery/">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#050505;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#e5e5e5}
        
        /* Style Visual Discovery Grid - Media Gallery, Pinterest-like, Visual Heavy */
        .gallery-container{max-width:1600px;margin:0 auto;padding:0 20px}
        
        /* Header Glass */
        .glass-header{background:rgba(5,5,5,0.9);backdrop-filter:blur(12px);border-bottom:1px solid #1a1a1a;padding:16px 0;position:sticky;top:0;z-index:100}
        .header-flex{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
        .logo{display:flex;align-items:center;gap:10px}
        .logo-icon{font-size:28px}
        .logo-text{font-size:1.1rem;font-weight:700;letter-spacing:-0.5px}
        .logo-text span{color:#ff4757}
        .nav-links{display:flex;gap:24px}
        .nav-link{font-size:0.7rem;color:#888;cursor:pointer}
        .nav-link:hover{color:#ff4757}
        
        /* Hero Visual */
        .visual-hero{text-align:center;padding:60px 0 40px}
        .hero-pill{display:inline-block;background:rgba(255,71,87,0.15);border:1px solid rgba(255,71,87,0.3);padding:6px 20px;border-radius:40px;font-size:0.7rem;color:#ff4757;margin-bottom:24px}
        .hero-main-title{font-size:3.2rem;font-weight:800;margin-bottom:20px;line-height:1.2}
        .hero-main-title span{background:linear-gradient(135deg,#ff4757,#ff6b81,#ffa502);-webkit-background-clip:text;background-clip:text;color:transparent}
        .hero-sub{font-size:0.9rem;color:#888;max-width:600px;margin:0 auto 32px}
        
        /* Category Pills */
        .category-pills{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:48px}
        .pill{background:#111;border:1px solid #222;padding:8px 22px;border-radius:40px;font-size:0.7rem;cursor:pointer;transition:all 0.2s}
        .pill:hover{border-color:#ff4757;color:#ff4757}
        .pill-active{background:#ff4757;border-color:#ff4757;color:#fff}
        
        /* Masonry Grid (3 columns) */
        .masonry-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:60px}
        
        /* Media Card with Query in Heading */
        .media-card{background:#0a0a0a;border-radius:20px;overflow:hidden;cursor:pointer;transition:all 0.3s;border:1px solid #1a1a1a}
        .media-card:hover{transform:translateY(-6px);border-color:#ff4757;box-shadow:0 12px 28px rgba(0,0,0,0.3)}
        .media-preview{height:200px;background:linear-gradient(135deg,#1a1a1a,#0a0a0a);display:flex;align-items:center;justify-content:center;position:relative}
        .preview-icon{font-size:48px;opacity:0.5}
        .media-badge{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);padding:4px 10px;border-radius:16px;font-size:0.55rem;color:#ff4757}
        .media-info{padding:16px}
        .media-category{font-size:0.55rem;text-transform:uppercase;letter-spacing:1px;color:#ff4757;margin-bottom:6px}
        .media-title{font-size:0.85rem;font-weight:700;margin-bottom:8px;line-height:1.3}
        .media-meta{display:flex;gap:12px;font-size:0.55rem;color:#666;margin-bottom:12px}
        .media-stats{display:flex;gap:16px;padding-top:12px;border-top:1px solid #1a1a1a}
        .media-stat{font-size:0.55rem;color:#666}
        
        /* Featured Row (2 columns) */
        .featured-row{margin-bottom:60px}
        .featured-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
        .featured-title{font-size:1.3rem;font-weight:700}
        .featured-title span{color:#ff4757}
        .featured-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:28px}
        
        .featured-card{background:#0a0a0a;border-radius:24px;padding:24px;border:1px solid #1a1a1a;cursor:pointer;transition:all 0.3s}
        .featured-card:hover{transform:translateY(-4px);border-color:#ff4757}
        .featured-icon{font-size:40px;margin-bottom:16px}
        .featured-name{font-size:1rem;font-weight:700;margin-bottom:8px}
        .featured-desc{font-size:0.7rem;color:#888;margin-bottom:16px;line-height:1.5}
        .featured-meta{display:flex;gap:20px;font-size:0.6rem;color:#666}
        
        /* Trending Tags */
        .trending-section{margin-bottom:48px;background:#0a0a0a;border-radius:24px;padding:28px;border:1px solid #1a1a1a}
        .trending-title{font-size:0.9rem;font-weight:700;margin-bottom:20px}
        .tag-cloud{display:flex;flex-wrap:wrap;gap:12px}
        .tag{background:#111;padding:6px 18px;border-radius:30px;font-size:0.7rem;cursor:pointer;transition:all 0.2s}
        .tag:hover{background:#ff4757;color:#fff}
        
        /* Footer */
        .gallery-footer{margin-top:60px;padding:32px 0;border-top:1px solid #1a1a1a;display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;font-size:0.65rem;color:#666}
        
        @media(max-width:1000px){.masonry-grid{grid-template-columns:repeat(2,1fr)}.featured-grid{grid-template-columns:1fr}}
        @media(max-width:700px){.masonry-grid{grid-template-columns:1fr}.hero-main-title{font-size:2rem}}
    </style>
</head>
<body>
<div class="gallery-container" id="app"><div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#666">⚡ Loading Visual Discovery Gallery...</div></div>

<script>
(function(){
    // ========== DATABASE VISUAL DISCOVERY GALLERY ==========
    
    // Media data dengan heading mengandung query
    const MEDIA_ITEMS = [
        { category: "VIDEO", title: "{name} Complete Video Collection", platform: "Multiple", items: 245, size: "12.4 GB", rating: 4.9 },
        { category: "VIDEO", title: "{name} Behind the Scenes Footage", platform: "TikTok", items: 67, size: "3.2 GB", rating: 4.8 },
        { category: "VIDEO", title: "{name} Live Performance Archive", platform: "YouTube", items: 34, size: "8.7 GB", rating: 4.9 },
        { category: "PHOTO", title: "{name} Complete Photo Gallery", platform: "Instagram", items: 845, size: "2.1 GB", rating: 4.7 },
        { category: "PHOTO", title: "{name} Exclusive Photoshoot Collection", platform: "OnlyFans", items: 156, size: "1.8 GB", rating: 4.9 },
        { category: "PHOTO", title: "{name} Candid Moments Archive", platform: "Twitter", items: 423, size: "1.2 GB", rating: 4.6 },
        { category: "EXCLUSIVE", title: "{name} Premium Vault Content", platform: "Telegram", items: 89, size: "5.6 GB", rating: 4.9 },
        { category: "EXCLUSIVE", title: "{name} Rare Unreleased Collection", platform: "Discord", items: 34, size: "2.3 GB", rating: 4.8 },
        { category: "COMPILATION", title: "{name} Fan Favorite Compilation", platform: "Multiple", items: 512, size: "15.2 GB", rating: 4.9 },
        { category: "COMPILATION", title: "{name} Best Moments Highlight Reel", platform: "YouTube", items: 128, size: "4.5 GB", rating: 4.8 },
        { category: "ARCHIVE", title: "{name} Complete Historical Archive", platform: "Multiple", items: 1250, size: "45.3 GB", rating: 4.9 },
        { category: "ARCHIVE", title: "{name} Digital Preservation Library", platform: "Multiple", items: 890, size: "28.7 GB", rating: 4.8 }
    ];
    
    // Featured Collections (dengan heading mengandung query)
    const FEATURED = [
        { icon: "🏆", name: "{name} Ultimate Collection", desc: "The most comprehensive {name} archive ever assembled. Every piece of content meticulously preserved.", items: 1250, size: "52.4 GB" },
        { icon: "💎", name: "{name} Exclusive Vault", desc: "Rare and premium {name} content not available anywhere else. Verified authenticity.", items: 345, size: "18.6 GB" },
        { icon: "⭐", name: "{name} Fan Favorites", desc: "Community-curated {name} collection featuring the most requested and highest rated content.", items: 512, size: "24.3 GB" },
        { icon: "🔮", name: "{name} Rare Discovery", desc: "Recently uncovered {name} material. Previously undocumented content added weekly.", items: 89, size: "4.2 GB" }
    ];
    
    // Platform Tags
    const PLATFORMS = ['TikTok', 'OnlyFans', 'Instagram', 'Twitter', 'Telegram', 'Discord', 'YouTube', 'Reddit'];
    
    // Trending Topics (dengan query)
    const TRENDING = [
        "Latest Additions", "Most Popular", "Recently Updated", "Fan Requests", "Top Rated",
        "HD Quality", "Exclusive Content", "Rare Footage", "Behind the Scenes", "Live Performances"
    ];
    
    // Stop Words
    const STOP_WORDS = [
        'gallery','visual','discovery','media','portal','grid','masonry','collection',
        'leaked','leak','leaks','archive','content','vault','compilation','library'
    ];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const range = (min,max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const formatNumber = (n) => n.toLocaleString();
    
    // ========== EKSTRAK TOPIK ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ 
        rawQuery = "complete media gallery";
    }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayName = formatTopic(baseTopic);
    const nameLower = displayName.toLowerCase();
    
    // ========== GENERATE LINK ==========
    const genLink = (title) => {
        let cleanTitle = title.replace('{name}', displayName).toLowerCase().substring(0, 50);
        let newQ = `${nameLower} ${cleanTitle}`;
        return { url:`/gallery/?q=${encodeURIComponent(newQ)}` };
    };
    
    // ========== GENERATE MEDIA GRID (dengan heading mengandung query) ==========
    const generateMediaGrid = () => {
        return MEDIA_ITEMS.map(item => {
            let title = item.title.replace('{name}', displayName);
            let views = formatNumber(range(1250, 125000));
            let badge = item.category === 'EXCLUSIVE' ? '⭐ EXCLUSIVE' : (item.category === 'VIDEO' ? '🎬 VIDEO' : (item.category === 'PHOTO' ? '📸 PHOTO' : '📁 ARCHIVE'));
            
            return `
                <div class="media-card" data-url="${genLink(item.title).url}">
                    <div class="media-preview">
                        <div class="preview-icon">${item.category === 'VIDEO' ? '🎬' : (item.category === 'PHOTO' ? '📸' : '💿')}</div>
                        <div class="media-badge">${badge}</div>
                    </div>
                    <div class="media-info">
                        <div class="media-category">${item.platform} · ${item.category}</div>
                        <div class="media-title">${title}</div>
                        <div class="media-meta">📁 ${item.items} files · 💾 ${item.size}</div>
                        <div class="media-stats">
                            <span class="media-stat">👁️ ${views} views</span>
                            <span class="media-stat">⭐ ${item.rating}/5</span>
                            <span class="media-stat">⬇️ ${formatNumber(range(45, 8500))}</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    };
    
    // ========== GENERATE FEATURED (dengan heading mengandung query) ==========
    const generateFeatured = () => {
        return FEATURED.map(f => {
            let name = f.name.replace('{name}', displayName);
            let desc = f.desc.replace('{name}', displayName);
            return `
                <div class="featured-card" data-url="${genLink(f.name).url}">
                    <div class="featured-icon">${f.icon}</div>
                    <div class="featured-name">${name}</div>
                    <div class="featured-desc">${desc}</div>
                    <div class="featured-meta">
                        <span>📁 ${f.items} items</span>
                        <span>💾 ${f.size}</span>
                        <span>⭐ ${range(4,5)}.${range(0,9)}/5</span>
                    </div>
                </div>
            `;
        }).join('');
    };
    
    // ========== GENERATE TRENDING TAGS (dengan query) ==========
    const generateTrending = () => {
        return TRENDING.map(tag => {
            let enhancedTag = `${displayName} ${tag}`;
            return `<span class="tag" data-url="${genLink(tag).url}">${enhancedTag}</span>`;
        }).join('');
    };
    
    // ========== RENDER HERO (dengan heading mengandung query) ==========
    const renderHero = () => {
        let totalItems = formatNumber(range(18500, 125000));
        let totalCollections = formatNumber(range(85, 485));
        
        return `
            <div class="visual-hero">
                <div class="hero-pill">🎨 VISUAL DISCOVERY ENGINE</div>
                <div class="hero-main-title"><span>${displayName}</span><br>Complete Media Gallery</div>
                <div class="hero-sub">Explore ${totalItems}+ ${displayName} media items. Video compilations, photo galleries, exclusive vaults, and rare collections. Updated daily with new discoveries.</div>
                <div class="hero-pill" style="background:transparent">📊 ${totalCollections} collections · 8 platforms · 24/7 access</div>
            </div>
        `;
    };
    
    // ========== RENDER CATEGORY PILLS ==========
    const renderCategoryPills = () => {
        let categories = ['All Content', `${displayName} Videos`, `${displayName} Photos`, `${displayName} Exclusive`, `${displayName} Archives`, `${displayName} Fan Favorites`];
        return categories.map((cat, idx) => `
            <div class="pill ${idx === 0 ? 'pill-active' : ''}" data-url="${genLink(cat).url}">${cat}</div>
        `).join('');
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let titles = [
            `${displayName} · Complete Media Gallery & Visual Discovery`,
            `${displayName} Visual Gallery - Find Every ${displayName} Content`,
            `Complete ${displayName} Media Gallery | Visual Discovery Portal`,
            `${displayName} Photo & Video Gallery - Ultimate Collection`
        ];
        let descs = [
            `Complete ${displayName} visual media gallery. ${formatNumber(range(18500, 125000))}+ images and videos. Fast discovery across all platforms. Updated daily.`,
            `${displayName} media gallery with visual discovery tools. Browse ${displayName} video compilations, photo galleries, and exclusive content collections.`,
            `Discover ${displayName} content visually. Gallery-style browsing for videos, photos, and exclusive material. Organized collections for easy access.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        let totalItems = formatNumber(range(18500, 125000));
        
        document.getElementById('app').innerHTML = `
            <div class="glass-header">
                <div class="header-flex">
                    <div class="logo">
                        <div class="logo-icon">🎨</div>
                        <div class="logo-text">Visual<span>Discovery</span></div>
                    </div>
                    <div class="nav-links">
                        <div class="nav-link">Gallery</div>
                        <div class="nav-link">Collections</div>
                        <div class="nav-link">Trending</div>
                        <div class="nav-link">About</div>
                    </div>
                </div>
            </div>
            
            ${renderHero()}
            
            <div class="category-pills">
                ${renderCategoryPills()}
            </div>
            
            <div class="masonry-grid">
                ${generateMediaGrid()}
            </div>
            
            <div class="featured-row">
                <div class="featured-header">
                    <div class="featured-title">🌟 <span>${displayName}</span> Featured Collections</div>
                    <div style="font-size:0.7rem;color:#ff4757;cursor:pointer">View all →</div>
                </div>
                <div class="featured-grid">
                    ${generateFeatured()}
                </div>
            </div>
            
            <div class="trending-section">
                <div class="trending-title">🔥 Trending: ${displayName} Content Tags</div>
                <div class="tag-cloud">
                    ${generateTrending()}
                </div>
            </div>
            
            <div class="gallery-footer">
                <span>🎨 VisualDiscovery · ${displayName} Complete Media Gallery</span>
                <span>📊 ${totalItems} total items indexed</span>
                <span>🔄 Updated ${range(1,15)} minutes ago</span>
                <span>⭐ Rated ${range(4,5)}.${range(0,9)}/5 by users</span>
            </div>
        `;
        
        // Attach event listeners
        document.querySelectorAll('[data-url]').forEach(el => {
            el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
        });
        document.querySelectorAll('.media-card, .featured-card, .tag, .pill, .nav-link').forEach(card => {
            card.addEventListener('click', () => { 
                if(card.getAttribute('data-url')) window.location.href = card.getAttribute('data-url');
            });
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
</body>
</html>
