        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        let links = Array.from({length:22}, ()=>genLink());
        let stats = { tweets:range(50,650), following:range(30,350), followers:range(100,1500) };
        let bio = rand(BIO)(displayName, stats.followers);
        let handle = `${displayLower.replace(/\s/g,'')}_${rand(HS)}`;
        let tabs = ['For You','Latest','Trending','New','Hot','Viral','Now'];
        let secTitles = ['🔥 Trending terkait','🌍 Viral sekarang','📈 Populer','💥 Sedang ramai','⚡ Breaking now','🔥 Hot topics'];
        let footers = ['LeakX','ViralLeak','LeakCentral','ExclusiveHub','ContentVault','LeakZone'];
        
        document.getElementById('app').innerHTML = `
            <div class="header"><div class="logo">Leak<span>X</span><span class="accent">.</span></div><div class="search-box">🔍 Search</div></div>
            <div class="breadcrumb"><a href="/">Home</a> / <a href="/edition04/">Go</a> / ${displayName}</div>
            <div class="trending-bar">${renderBar(links)}</div>
            <div class="profile-header"><div class="profile-row"><div><div class="profile-name">${displayName} <span style="font-size:0.7rem;color:#1d9bf0;">· ${rand(['Archive','Hub','Vault','Central','Source'])}</span></div><div class="profile-handle">@${handle}</div></div><div class="follow-btn">Follow</div></div><div class="profile-bio">${bio}</div><div class="profile-stats"><span>📝 ${stats.tweets} Posts</span><span>👥 ${stats.following} Following</span><span>❤️ ${stats.followers} Followers</span></div></div>
            <div class="tabs"><div class="tab active">${rand(tabs)}</div><div class="tab">Following</div><div class="tab">Media</div><div class="tab">Likes</div></div>
            <div id="feedContainer">${links.map((l,i)=>renderCard(l,i)).join('')}</div>
            <div class="sidebar-section"><div class="section-title">${rand(secTitles)}</div><div id="trendingContainer">${renderTrending(links)}</div></div>
            <div class="sidebar-section"><div class="section-title">${rand(['Who to follow','Rekomendasi','Suggested for you','Anda mungkin suka','Similar accounts','People also follow'])}</div><div id="followContainer">${renderFollow()}</div></div>
            <div class="footer">${rand(footers)} · ${stats.followers} followers · Updated ${rand(['real-time','every 5 minutes','constantly','live','hourly','continuously'])} · #${displayLower.replace(/\s/g,'')}${rand(['Hub','Central','Archive','Zone'])}</div>
        `;
        
        document.querySelectorAll('[data-url]').forEach(el => { el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); }); });
        document.querySelectorAll('.link-card').forEach(card => { card.addEventListener('click', () => window.location.href = card.getAttribute('data-url')); });
    };
    
    updateSEO();
    renderPage();
})();
</script>
