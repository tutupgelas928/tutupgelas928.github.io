<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="bingbot" content="index, follow">
    <meta name="yandex" content="index, follow">
    <meta name="theme-color" content="#0a0a1a">
    <title id="dynamic-title">ETERNAL VAULT · Timeless Leak Archive</title>
    <meta id="dynamic-description" name="description" content="Eternal leak vault. Timeless archive of complete collections. Permanent access. Evergreen content.">
    <link id="dynamic-canonical" rel="canonical" href="https://example.com/eternal/">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0f0f1a;font-family:'Inter',sans-serif;color:#e8e8f0}
        
        /* Evergreen Container - Mobile First */
        .evergreen-container{max-width:550px;margin:0 auto;padding:0;background:linear-gradient(180deg,#0f0f1a,#0a0a12);min-height:100vh}
        
        /* Animated Background Elements */
        .bg-orb{position:fixed;width:300px;height:300px;background:radial-gradient(circle,rgba(100,80,200,0.15),transparent);border-radius:50%;pointer-events:none;z-index:0;animation:drift 20s ease-in-out infinite}
        .bg-orb-1{top:-100px;right:-100px;animation-delay:0s}
        .bg-orb-2{bottom:-100px;left:-100px;animation-delay:10s}
        @keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,30px)}}
        
        /* Sticky Header - Evergreen */
        .eternal-header{position:sticky;top:0;background:rgba(15,15,26,0.95);backdrop-filter:blur(12px);padding:16px 20px;border-bottom:1px solid rgba(150,130,200,0.15);z-index:100;display:flex;justify-content:space-between;align-items:center}
        .logo{display:flex;align-items:center;gap:10px}
        .logo-icon{font-size:22px;filter:drop-shadow(0 0 4px #9682c8)}
        .logo-text{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;letter-spacing:1px}
        .logo-text span{color:#9682c8}
        .vault-badge{background:rgba(150,130,200,0.12);border:1px solid rgba(150,130,200,0.3);padding:6px 12px;border-radius:30px;font-size:0.6rem;font-weight:500}
        
        /* Hero Section - Evergreen */
        .hero-eternal{padding:32px 20px;text-align:center;border-bottom:1px solid rgba(150,130,200,0.1)}
        .hero-stamp{display:inline-block;background:rgba(150,130,200,0.1);padding:6px 16px;border-radius:30px;font-size:0.65rem;letter-spacing:2px;margin-bottom:20px;border:1px solid rgba(150,130,200,0.2)}
        .hero-title{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:800;margin-bottom:16px;line-height:1.2}
        .hero-title span{color:#9682c8;text-shadow:0 0 8px rgba(150,130,200,0.3)}
        .hero-desc{font-size:0.8rem;color:#a0a0b0;max-width:400px;margin:0 auto 24px;line-height:1.5}
        .hero-meta{display:flex;justify-content:center;gap:28px;flex-wrap:wrap}
        .hero-meta-item{font-size:0.65rem;color:#9682c8;display:flex;align-items:center;gap:6px}
        
        /* Collection Grid */
        .collection-grid{display:flex;flex-direction:column;gap:20px;padding:20px;margin-bottom:30px}
        
        /* Vault Card - Evergreen */
        .vault-card{background:rgba(20,20,35,0.6);backdrop-filter:blur(4px);border-radius:28px;padding:0;overflow:hidden;border:1px solid rgba(150,130,200,0.12);transition:all 0.3s cubic-bezier(0.175,0.885,0.32,1.275);cursor:pointer;animation:fadeInUp 0.5s ease-out both}
        .vault-card:hover{transform:translateY(-6px);border-color:rgba(150,130,200,0.4);box-shadow:0 20px 35px -15px rgba(0,0,0,0.5)}
        .vault-card:active{transform:scale(0.98)}
        @keyframes fadeInUp{0%{opacity:0;transform:translateY(25px)}100%{opacity:1;transform:translateY(0)}}
        
        .card-header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
        .card-category{display:flex;gap:6px}
        .category-dot{width:8px;height:8px;border-radius:50%;background:#9682c8;margin-top:4px}
        .category-text{font-size:0.55rem;text-transform:uppercase;letter-spacing:2px;color:#9682c8}
        .card-icon{font-size:32px;opacity:0.8}
        
        .card-title{padding:12px 20px 8px;font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;line-height:1.3}
        .card-title span{color:#9682c8}
        
        .card-desc{padding:0 20px 16px;font-size:0.7rem;color:#a0a0b0;line-height:1.5}
        
        /* Evergreen Stats (tanpa angka spesifik) */
        .card-stats{padding:12px 20px;border-top:1px solid rgba(150,130,200,0.08);border-bottom:1px solid rgba(150,130,200,0.08);display:flex;justify-content:space-between}
        .stat{text-align:center}
        .stat-value{font-family:'Cormorant Garamond',serif;font-size:0.8rem;font-weight:700;color:#9682c8}
        .stat-label{font-size:0.5rem;text-transform:uppercase;color:#707080;letter-spacing:1px}
        
        /* Click Indicator */
        .click-indicator{padding:14px 20px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:0.6rem;color:#9682c8;border-top:1px solid rgba(150,130,200,0.05);animation:gentlePulse 2s infinite}
        @keyframes gentlePulse{0%,100%{opacity:0.7}50%{opacity:1}}
        .indicator-arrow{font-size:14px;animation:bounceX 1.2s infinite}
        @keyframes bounceX{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}
        
        /* Archives Section */
        .archives-section{padding:20px;border-top:1px solid rgba(150,130,200,0.08);margin-top:8px}
        .section-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .archives-grid{display:flex;flex-wrap:wrap;gap:10px}
        .archive-tag{background:rgba(150,130,200,0.08);padding:8px 18px;border-radius:40px;font-size:0.65rem;cursor:pointer;transition:all 0.2s;border:1px solid rgba(150,130,200,0.1)}
        .archive-tag:hover{background:rgba(150,130,200,0.2);border-color:rgba(150,130,200,0.4);transform:translateX(4px)}
        
        /* Footer - Evergreen */
        .eternal-footer{padding:24px 20px;text-align:center;border-top:1px solid rgba(150,130,200,0.08);font-size:0.6rem;color:#707080}
        .footer-seal{display:flex;justify-content:center;gap:20px;margin-bottom:16px;flex-wrap:wrap}
        .seal{display:flex;align-items:center;gap:6px}
        
        @media(min-width:500px){.evergreen-container{box-shadow:0 0 30px rgba(0,0,0,0.4)}}
    </style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="evergreen-container" id="app"><div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#707080;font-family:'Cormorant Garamond',serif">⚜️ LOADING ETERNAL VAULT...</div></div>

<script>
(function(){
    // ========== DATABASE ETERNAL VAULT (EVERGREEN - NO DATES/CHANGING NUMBERS) ==========
    
    // Vault Cards - Setiap heading mengandung "leak" + query
    const VAULT_CARDS = [
        { category: "COMPLETE ARCHIVE", icon: "🏛️", title: "{name} Master Leak — Eternal Vault Collection", desc: "The definitive {name} leak archive. Every piece of content ever discovered. Meticulously preserved and organized. A timeless collection for the dedicated enthusiast.", stat1: "Complete Set", stat2: "Master Quality", stat3: "Verified" },
        { category: "PREMIUM VAULT", icon: "💎", title: "{name} OnlyFans Leak — The Complete Treasury", desc: "Full {name} OnlyFans collection. All exclusive subscriber content preserved in original quality. The most requested leak archive.", stat1: "Premium", stat2: "Unlocked", stat3: "Authentic" },
        { category: "VIRAL COMPILATION", icon: "📱", title: "{name} TikTok Leak — Trending Forever", desc: "The complete {name} TikTok leak compilation. Viral moments that defined an era. Preserved in timeless digital archive.", stat1: "Viral", stat2: "Complete", stat3: "HD" },
        { category: "CHANNEL VAULT", icon: "✈️", title: "{name} Telegram Leak — Eternal Channel Archive", desc: "The legendary {name} Telegram leak. Complete channel history preserved. The archive that never fades.", stat1: "Exclusive", stat2: "Preserved", stat3: "Active" },
        { category: "ULTIMATE VAULT", icon: "👑", title: "{name} Complete Leak — The Eternal Collection", desc: "The absolute definitive {name} leak. Every known file from every platform. The holy grail of archives.", stat1: "Ultimate", stat2: "Complete", stat3: "Legendary" },
        { category: "PRIVATE GALLERY", icon: "📸", title: "{name} Instagram Leak — Timeless Moments", desc: "The {name} Instagram private story archive. Candid moments preserved forever. A window into another world.", stat1: "Rare", stat2: "Intimate", stat3: "Preserved" },
        { category: "DIGITAL ATLAS", icon: "🗂️", title: "{name} Mega Archive Leak — The Great Vault", desc: "The legendary {name} Mega leak. Terabytes of organized content. The archive that keeps giving.", stat1: "Massive", stat2: "Organized", stat3: "Eternal" },
        { category: "TIMELESS TREASURY", icon: "⭐", title: "{name} Ultimate Leak — Everything Everywhere", desc: "The {name} omnibus collection. Cross-platform masterpiece. Every leak, every moment, forever preserved.", stat1: "Omnibus", stat2: "Definitive", stat3: "Immortal" }
    ];
    
    // Archive Tags (Evergreen - semua mengandung query)
    const ARCHIVE_TAGS = [
        "Complete Series", "Video Collection", "Photo Gallery", "Behind Scenes",
        "Interviews", "Live Moments", "Social Archive", "Rare Finds",
        "Master Collection", "Definitive Edition", "Timeless Treasury", "Eternal Vault"
    ];
    
    // Evergreen descriptive texts
    const EVERGREEN_DESC = "A timeless collection preserved for eternity. This archive stands as the definitive record, carefully curated and permanently accessible. Every item has been verified and preserved in original quality. The collection that endures.";
    
    // Stop Words
    const STOP_WORDS = ['eternal','vault','archive','leak','collection','treasury','evergreen','timeless','permanent'];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const formatTopicOnly = (s) => s;
    
    // ========== EKSTRAK TOPIK ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ rawQuery = "master archive collection"; }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayName = formatTopic(baseTopic);
    const nameLower = displayName.toLowerCase();
    
    // ========== GENERATE LINK ==========
    const genLink = (title) => {
        let newQ = `${nameLower} ${title.toLowerCase().substring(0, 45)} eternal vault`;
        return { url:`/eternal/?q=${encodeURIComponent(newQ)}` };
    };
    
    // ========== GENERATE VAULT CARDS ==========
    const generateVaultCards = () => {
        return VAULT_CARDS.map((card, idx) => {
            let title = card.title.replace('{name}', displayName);
            let desc = card.desc.replace('{name}', displayName);
            
            return `
                <div class="vault-card" data-url="${genLink(card.title).url}" style="animation-delay:${0.03 + idx*0.02}s">
                    <div class="card-header">
                        <div class="card-category">
                            <div class="category-dot"></div>
                            <div class="category-text">${card.category}</div>
                        </div>
                        <div class="card-icon">${card.icon}</div>
                    </div>
                    <div class="card-title"><span>⚜️</span> ${title}</div>
                    <div class="card-desc">${desc}</div>
                    <div class="card-stats">
                        <div class="stat"><div class="stat-value">${card.stat1}</div><div class="stat-label">QUALITY</div></div>
                        <div class="stat"><div class="stat-value">${card.stat2}</div><div class="stat-label">STATUS</div></div>
                        <div class="stat"><div class="stat-value">${card.stat3}</div><div class="stat-label">VERIFIED</div></div>
                    </div>
                    <div class="click-indicator">
                        <span>🔓 ACCESS ETERNAL VAULT</span>
                        <span class="indicator-arrow">→</span>
                    </div>
                </div>
            `;
        }).join('');
    };
    
    // ========== GENERATE ARCHIVE TAGS ==========
    const generateArchiveTags = () => {
        return ARCHIVE_TAGS.map(tag => {
            let fullTag = `${displayName} ${tag} Leak`;
            return `
                <div class="archive-tag" data-url="${genLink(tag).url}">📀 ${fullTag}</div>
            `;
        }).join('');
    };
    
    // ========== RENDER HERO ==========
    const renderHero = () => {
        return `
            <div class="hero-eternal">
                <div class="hero-stamp">⚜️ ETERNAL ARCHIVE ⚜️</div>
                <div class="hero-title"><span>${displayName}</span><br>Leak Vault</div>
                <div class="hero-desc">${EVERGREEN_DESC}</div>
                <div class="hero-meta">
                    <div class="hero-meta-item">🏛️ Permanent Collection</div>
                    <div class="hero-meta-item">🔒 Verified Authenticity</div>
                    <div class="hero-meta-item">📜 Timeless Access</div>
                </div>
            </div>
        `;
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let titles = [
            `${displayName} Eternal Leak Vault — Timeless Archive Collection`,
            `${displayName} Complete Leak Archive — The Eternal Treasury`,
            `${displayName} Master Leak Collection — Permanently Preserved`,
            `⚜️ ${displayName} Leak Vault — Definitive Evergreen Archive`
        ];
        let descs = [
            `The eternal ${displayName} leak vault. A timeless, complete archive permanently preserved. ${ARCHIVE_TAGS.length}+ curated collections. Evergreen access.`,
            `${displayName} definitive leak collection. Permanently archived. Complete and verified. The archive that endures forever.`,
            `Timeless ${displayName} leak treasury. Every piece of content preserved for eternity. Evergreen collection.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        document.getElementById('app').innerHTML = `
            <div class="eternal-header">
                <div class="logo">
                    <div class="logo-icon">⚜️</div>
                    <div class="logo-text">Eternal<span>Vault</span></div>
                </div>
                <div class="vault-badge">EVERGREEN ARCHIVE</div>
            </div>
            
            ${renderHero()}
            
            <div class="collection-grid">
                ${generateVaultCards()}
            </div>
            
            <div class="archives-section">
                <div class="section-title">
                    <span>📚</span> Explore ${displayName} Leak Categories
                </div>
                <div class="archives-grid">
                    ${generateArchiveTags()}
                </div>
            </div>
            
            <div class="eternal-footer">
                <div class="footer-seal">
                    <div class="seal">⚜️ Timeless Archive</div>
                    <div class="seal">🔒 Verified Eternal</div>
                    <div class="seal">📜 Permanently Preserved</div>
                </div>
                <div>${displayName} Eternal Leak Vault · Complete Evergreen Collection</div>
            </div>
        `;
        
        document.querySelectorAll('[data-url]').forEach(el => {
            el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
            el.addEventListener('touchstart', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
        });
        document.querySelectorAll('.vault-card, .archive-tag').forEach(card => {
            card.addEventListener('click', () => { if(card.getAttribute('data-url')) window.location.href = card.getAttribute('data-url'); });
            card.addEventListener('touchstart', () => { if(card.getAttribute('data-url')) window.location.href = card.getAttribute('data-url'); });
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
</body>
</html>
