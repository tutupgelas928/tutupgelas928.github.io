<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="bingbot" content="index, follow">
    <meta name="yandex" content="index, follow">
    <meta name="referrer" content="always">
    <title id="dynamic-title">DEEP ARCHIVE EXPLORER · Complete Content Intelligence Hub</title>
    <meta id="dynamic-description" name="description" content="Deep archive intelligence hub. Complete content explorer with advanced discovery tools.">
    <link id="dynamic-canonical" rel="canonical" href="https://example.com/explorer/">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#030712;font-family:'Outfit',sans-serif;color:#f1f5f9}
        
        /* Style Content Intelligence Hub - Modern, Data-Rich, Explorer */
        .explorer-container{max-width:1400px;margin:0 auto;padding:0 24px}
        
        /* Header */
        .intel-header{background:rgba(3,7,18,0.95);backdrop-filter:blur(12px);border-bottom:1px solid #1f2937;padding:16px 0;position:sticky;top:0;z-index:100}
        .header-content{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
        .logo-area{display:flex;align-items:center;gap:12px}
        .logo-icon{font-size:26px}
        .logo-text{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#60a5fa,#c084fc);-webkit-background-clip:text;background-clip:text;color:transparent}
        .header-stats{display:flex;gap:20px}
        .header-stat{font-size:0.7rem;color:#94a3b8}
        .header-stat strong{color:#60a5fa}
        
        /* Hero - Deep Explorer */
        .deep-hero{background:linear-gradient(135deg,#0f172a,#030712);border-radius:32px;padding:56px 48px;margin:32px 0;border:1px solid #1e293b}
        .hero-eyebrow{font-size:0.7rem;letter-spacing:3px;color:#60a5fa;margin-bottom:16px;text-transform:uppercase}
        .hero-main-title{font-size:3rem;font-weight:800;margin-bottom:20px;line-height:1.2}
        .hero-main-title span{background:linear-gradient(135deg,#60a5fa,#c084fc,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent}
        .hero-description{font-size:1rem;color:#94a3b8;max-width:700px;margin-bottom:32px;line-height:1.5}
        .hero-metrics{display:flex;gap:48px;flex-wrap:wrap}
        .hero-metric .value{font-size:1.8rem;font-weight:800;color:#60a5fa}
        .hero-metric .label{font-size:0.65rem;color:#64748b;text-transform:uppercase}
        
        /* Search Section */
        .search-section{margin-bottom:48px}
        .search-container{background:#0f172a;border:1px solid #1e293b;border-radius:60px;padding:6px 6px 6px 28px;display:flex;align-items:center;gap:12px}
        .search-icon{color:#64748b}
        .search-input{flex:1;background:transparent;border:none;outline:none;color:#f1f5f9;font-size:1rem;padding:16px 0}
        .search-actions{display:flex;gap:8px}
        .search-btn{background:#3b82f6;border:none;padding:10px 28px;border-radius:40px;color:#fff;font-weight:600;cursor:pointer}
        .adv-btn{background:#1e293b;border:none;padding:10px 20px;border-radius:40px;color:#94a3b8;cursor:pointer}
        
        /* Explorer Grid - 4 Columns Master */
        .explorer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-bottom:56px}
        
        /* Explorer Card */
        .explorer-card{background:#0f172a;border:1px solid #1e293b;border-radius:24px;padding:24px;transition:all 0.3s}
        .explorer-card:hover{transform:translateY(-6px);border-color:#3b82f6}
        .card-icon{font-size:36px;margin-bottom:16px}
        .card-title{font-size:1.1rem;font-weight:700;margin-bottom:12px;line-height:1.3}
        .card-title a{color:#f1f5f9;text-decoration:none}
        .card-desc{font-size:0.7rem;color:#94a3b8;margin-bottom:16px;line-height:1.5}
        .card-stats{display:flex;justify-content:space-between;padding-top:16px;border-top:1px solid #1e293b}
        .card-stat{text-align:center}
        .card-stat .num{font-size:0.9rem;font-weight:700;color:#60a5fa}
        .card-stat .lab{font-size:0.55rem;color:#64748b}
        
        /* Intelligence Feed - 2 Columns */
        .intel-feed{margin-bottom:56px}
        .feed-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
        .feed-title{font-size:1.2rem;font-weight:700}
        .feed-title span{color:#60a5fa}
        .feed-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
        
        .intel-item{background:#0f172a;border:1px solid #1e293b;border-radius:20px;padding:24px;cursor:pointer;transition:all 0.2s}
        .intel-item:hover{background:#1e293b}
        .intel-badge{display:inline-block;background:#1e293b;padding:4px 12px;border-radius:20px;font-size:0.6rem;color:#60a5fa;margin-bottom:12px}
        .intel-title{font-size:0.95rem;font-weight:700;margin-bottom:12px;line-height:1.4}
        .intel-desc{font-size:0.7rem;color:#94a3b8;margin-bottom:16px;line-height:1.5}
        .intel-meta{display:flex;gap:16px;font-size:0.6rem;color:#64748b}
        
        /* Deep Dive Section */
        .deepdive-section{margin-bottom:48px;background:#0f172a;border-radius:28px;padding:32px;border:1px solid #1e293b}
        .deepdive-title{font-size:1.2rem;font-weight:700;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #1e293b}
        .deepdive-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
        .deepdive-item{padding:12px 16px;background:#1e293b;border-radius:16px;cursor:pointer;transition:all 0.2s}
        .deepdive-item:hover{background:#2d3a5e;transform:translateX(4px)}
        .deepdive-name{font-size:0.8rem;font-weight:500;margin-bottom:4px}
        .deepdive-meta{font-size:0.55rem;color:#64748b}
        
        /* Footer */
        .explorer-footer{margin-top:56px;padding:32px 0;border-top:1px solid #1e293b;display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;font-size:0.65rem;color:#64748b}
        
        @media(max-width:1200px){.explorer-grid{grid-template-columns:repeat(2,1fr)}}
        @media(max-width:800px){.explorer-grid{grid-template-columns:1fr}.feed-grid{grid-template-columns:1fr}.hero-main-title{font-size:2rem}.deep-hero{padding:32px 24px}}
        @media(max-width:600px){.explorer-container{padding:0 16px}}
    </style>
</head>
<body>
<div class="explorer-container" id="app"><div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#64748b">⚡ Initializing Deep Archive Explorer...</div></div>

<script>
(function(){
    // ========== DATABASE CONTENT INTELLIGENCE HUB ==========
    
    // Explorer Cards Data (8 cards dengan heading mengandung query)
    const EXPLORER_CARDS = [
        { icon: "🎬", title: "{name} Complete Video Intelligence", desc: "Deep analysis of all {name} video content across platforms. Comprehensive metadata and preservation status." },
        { icon: "📸", title: "{name} Photo Gallery Explorer", desc: "Visual content discovery tool for {name} photographs. High-resolution archive with facial recognition." },
        { icon: "💎", title: "{name} Premium Vault Access", desc: "Exclusive {name} content vault with verified authenticity. Limited edition collections." },
        { icon: "🔮", title: "{name} Rare Material Discovery", desc: "Uncover hidden {name} content. Algorithmic detection of rare and unreleased material." },
        { icon: "⭐", title: "{name} Fan Favorites Index", desc: "Community-curated {name} content rankings. Most requested and highest rated collections." },
        { icon: "📱", title: "{name} Platform Intelligence", desc: "Cross-platform {name} content aggregation. TikTok, OnlyFans, Instagram, Telegram, Discord." },
        { icon: "📊", title: "{name} Content Analytics", desc: "Statistical analysis of {name} content distribution. Trends, peaks, and patterns." },
        { icon: "🗂️", title: "{name} Master Archive Index", desc: "Complete {name} archival reference. Categorized and timestamped for rapid retrieval." }
    ];
    
    // Intelligence Feed Items (panjang)
    const INTEL_ITEMS = [
        { badge: "NEW DISCOVERY", title: "{name} Complete Video Archive Surface Analysis", desc: "Deep scan of {name} video content reveals {count} previously undocumented items. Metadata analysis confirms authenticity. Distribution patterns suggest coordinated archival effort." },
        { badge: "TRENDING", title: "{name} Rare Photo Collection Decoded", desc: "New {name} photo collection identified across {platforms} platforms. High-resolution images with original metadata preserved. Fan engagement up {percent}%." },
        { badge: "VERIFIED", title: "{name} Premium Vault Expansion", desc: "{name} exclusive vault now contains {count} verified items. Complete chain of custody documented. Access reliability improved by {percent}%." },
        { badge: "ALERT", title: "{name} Content Preservation Update", desc: "Archival redundancy for {name} material increased to {count} copies across {platforms} independent locations. Long-term preservation confirmed." }
    ];
    
    // Deep Dive Items (banyak)
    const DEEPDIVE_ITEMS = [
        "Video Archives", "Photo Galleries", "Interview Collections", "Live Performances",
        "Behind the Scenes", "Social Media Archive", "Fan Compilations", "Rare Footage",
        "Exclusive Content", "HD Collections", "Mobile Optimized", "Historical Archive",
        "Recent Additions", "Most Popular", "Community Picks", "Editor's Choice",
        "Complete Series", "Standalone Features", "Documentaries", "Short Clips"
    ];
    
    // Platform sources
    const PLATFORMS = ['TikTok', 'OnlyFans', 'Instagram', 'Twitter', 'Telegram', 'Discord', 'YouTube', 'Reddit'];
    
    // Stop Words
    const STOP_WORDS = [
        'explorer','intelligence','hub','archive','deep','discovery','navigator','finder',
        'leaked','leak','leaks','content','vault','collection','library','compilation'
    ];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const range = (min,max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const formatNumber = (n) => n.toLocaleString();
    
    // ========== EKSTRAK TOPIK ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ 
        rawQuery = "complete content archive";
    }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayName = formatTopic(baseTopic);
    const nameLower = displayName.toLowerCase();
    const namePlural = nameLower + (nameLower.endsWith('s') ? "'" : "'s");
    
    // ========== GENERATE LINK ==========
    const genLink = (category, item = null) => {
        let newQ = `${nameLower} ${(item || category).toLowerCase().substring(0, 45)}`;
        return { url:`/explorer/?q=${encodeURIComponent(newQ)}` };
    };
    
    // ========== GENERATE EXPLORER CARDS (dengan heading mengandung query) ==========
    const generateExplorerCards = () => {
        return EXPLORER_CARDS.map(card => {
            let title = card.title.replace('{name}', displayName);
            let desc = card.desc.replace('{name}', displayName);
            let items = formatNumber(range(85, 2850));
            let size = `${range(45, 850)} GB`;
            return `
                <div class="explorer-card" data-url="${genLink(card.title, 'card').url}">
                    <div class="card-icon">${card.icon}</div>
                    <div class="card-title"><a href="#">${title}</a></div>
                    <div class="card-desc">${desc}</div>
                    <div class="card-stats">
                        <div class="card-stat"><div class="num">${items}</div><div class="lab">Items</div></div>
                        <div class="card-stat"><div class="num">${size}</div><div class="lab">Size</div></div>
                        <div class="card-stat"><div class="num">${range(92,99)}%</div><div class="lab">Quality</div></div>
                    </div>
                </div>
            `;
        }).join('');
    };
    
    // ========== GENERATE INTELLIGENCE FEED (panjang) ==========
    const generateIntelFeed = () => {
        return INTEL_ITEMS.map(item => {
            let title = item.title.replace('{name}', displayName);
            let desc = item.desc
                .replace('{name}', displayName)
                .replace('{count}', formatNumber(range(45, 850)))
                .replace('{platforms}', range(2, 7))
                .replace('{percent}', range(15, 95));
            let timestamp = `${range(1,45)} minutes ago`;
            return `
                <div class="intel-item" data-url="${genLink(item.title, 'intel').url}">
                    <div class="intel-badge">${item.badge}</div>
                    <div class="intel-title">${title}</div>
                    <div class="intel-desc">${desc}</div>
                    <div class="intel-meta">
                        <span>🔍 ${timestamp}</span>
                        <span>✅ Verified</span>
                        <span>⭐ ${range(4,5)}.${range(0,9)}/5</span>
                    </div>
                </div>
            `;
        }).join('');
    };
    
    // ========== GENERATE DEEP DIVE ITEMS ==========
    const generateDeepDive = () => {
        let items = [];
        let shuffled = [...DEEPDIVE_ITEMS];
        for(let i=0;i<16;i++){
            let item = shuffled[i % shuffled.length];
            let enhanced = `${displayName} ${item}`;
            let count = formatNumber(range(45, 1850));
            items.push(`
                <div class="deepdive-item" data-url="${genLink(item, 'deepdive').url}">
                    <div class="deepdive-name">📁 ${enhanced}</div>
                    <div class="deepdive-meta">${count} items · updated ${range(1,12)}d ago</div>
                </div>
            `);
        }
        return items.join('');
    };
    
    // ========== RENDER HERO (dengan heading mengandung query) ==========
    const renderHero = () => {
        let totalItems = formatNumber(range(18500, 125000));
        let totalCollections = formatNumber(range(185, 1250));
        let platforms = PLATFORMS.length;
        
        return `
            <div class="deep-hero">
                <div class="hero-eyebrow">DEEP ARCHIVE EXPLORER</div>
                <div class="hero-main-title">Complete <span>${displayName}</span><br>Content Intelligence Hub</div>
                <div class="hero-description">Advanced discovery engine for ${displayName} content. Explore ${totalItems}+ verified items across ${platforms} platforms. Real-time intelligence updates and deep archive analysis.</div>
                <div class="hero-metrics">
                    <div class="hero-metric"><div class="value">${totalItems}+</div><div class="label">Total Items</div></div>
                    <div class="hero-metric"><div class="value">${totalCollections}</div><div class="label">Collections</div></div>
                    <div class="hero-metric"><div class="value">${platforms}</div><div class="label">Platforms</div></div>
                    <div class="hero-metric"><div class="value">24/7</div><div class="label">Live Access</div></div>
                </div>
            </div>
        `;
    };
    
    // ========== RENDER SEARCH ==========
    const renderSearch = () => {
        let searchTerm = `${displayName} complete content archive intelligence`;
        return `
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" value="${searchTerm}" placeholder="Search ${displayName} content...">
                <div class="search-actions">
                    <button class="search-btn">Explore</button>
                    <button class="adv-btn">Advanced</button>
                </div>
            </div>
        `;
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let titles = [
            `${displayName} Deep Archive Explorer | Complete Content Intelligence Hub`,
            `${displayName} Content Intelligence - Deep Archive Explorer`,
            `Complete ${displayName} Archive Intelligence | Explorer Hub`,
            `${displayName} Deep Explorer - Find Every ${displayName} Content`
        ];
        let descs = [
            `Deep archive intelligence for ${displayName}. ${formatNumber(range(18500, 125000))}+ verified items. Advanced discovery tools across ${PLATFORMS.length} platforms. Real-time intelligence updates.`,
            `${displayName} content explorer with deep archive analysis. Complete ${displayName} intelligence hub. Find every ${displayName} video, photo, and exclusive content.`,
            `The most comprehensive ${displayName} content intelligence platform. Deep archive explorer with verified collections and real-time updates.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        let totalIndexed = formatNumber(range(18500, 125000));
        let apiHits = formatNumber(range(125, 850));
        
        document.getElementById('app').innerHTML = `
            <div class="intel-header">
                <div class="header-content">
                    <div class="logo-area">
                        <div class="logo-icon">🧠</div>
                        <div class="logo-text">DeepArchive<span style="color:#60a5fa">Explorer</span></div>
                    </div>
                    <div class="header-stats">
                        <div class="header-stat"><strong>${totalIndexed}</strong> indexed items</div>
                        <div class="header-stat"><strong>${apiHits}K</strong> daily queries</div>
                        <div class="header-stat"><strong>${range(99,100)}%</strong> uptime</div>
                    </div>
                </div>
            </div>
            
            ${renderHero()}
            
            ${renderSearch()}
            
            <div class="explorer-grid">
                ${generateExplorerCards()}
            </div>
            
            <div class="intel-feed">
                <div class="feed-header">
                    <div class="feed-title">📡 <span>${displayName}</span> Intelligence Feed</div>
                    <div style="font-size:0.7rem;color:#60a5fa">Live updates · Real-time</div>
                </div>
                <div class="feed-grid">
                    ${generateIntelFeed()}
                </div>
            </div>
            
            <div class="deepdive-section">
                <div class="deepdive-title">🔍 Deep Dive: ${displayName} Content Categories</div>
                <div class="deepdive-grid">
                    ${generateDeepDive()}
                </div>
            </div>
            
            <div class="explorer-footer">
                <span>🧠 DeepArchiveExplorer · ${displayName} Intelligence Hub</span>
                <span>📊 ${totalIndexed} indexed · ${range(85,245)} active collections</span>
                <span>⚡ Last crawl: ${range(1,12)} minutes ago</span>
                <span>🔒 Verified source · High integrity</span>
            </div>
        `;
        
        // Attach event listeners
        document.querySelectorAll('[data-url]').forEach(el => {
            el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
        });
        document.querySelectorAll('.explorer-card, .intel-item, .deepdive-item, .search-btn, .adv-btn').forEach(card => {
            card.addEventListener('click', () => { 
                if(card.getAttribute('data-url')) window.location.href = card.getAttribute('data-url');
            });
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
</body>
</html>
