    const renderFollow = () => {
        let items = [];
        for(let i=0;i<4;i++){
            let link = genLink();
            items.push(`<div class="follow-suggest" data-url="${link.url}"><div class="suggest-info"><div class="suggest-name">${rand(DN)}</div><div class="suggest-handle">@${rand(UN)}</div></div><div class="suggest-follow">Follow</div></div>`);
        }
        return items.join('');
    };
    
    // ========== RENDER TRENDING BAR ==========
    const renderBar = (links) => links.slice(0,12).map(l => `<span class="trending-item" data-url="${l.url}">🏆 ${l.anchor}</span>`).join('');
    
    // ========== SEO DINAMIS ==========
    const updateSEO = () => {
        let titles = [
            `${displayName} · Complete Collection Archive | VaultX`,
            `${displayName} Premium Vault - Master Collection | VaultX`,
            `${displayName} Ultimate Archive - Full Access | VaultX`,
            `${displayName} Signature Collection - Premium Quality | VaultX`,
            `${displayName} Definitive Archive - Complete Set | VaultX`
        ];
        let descs = [
            `Complete ${displayName} collection archive. Premium quality, permanent access. Curated collection.`,
            `Access the definitive ${displayName} vault. Full collection, master quality, professional archive.`,
            `${displayName} ultimate collection online. Complete archive, premium content, verified source.`,
            `The most comprehensive ${displayName} archive. Professional curated, permanent access.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        let links = Array.from({length:24}, ()=>genLink());
        let stats = { tweets:range(80,750), following:range(40,380), followers:range(200,1800) };
        let bio = rand(BIO)(displayName, stats.followers);
        let handle = `${displayLower.replace(/\s/g,'')}${rand(['_','.',''])}${rand(HS)}`;
        let tabs = ['Collection','Archive','Vault','Library','Gallery','Showcase'];
        let secTitles = ['🏆 Top Collections','💎 Premium Vaults','⭐ Featured Archives','📀 Curated Selections','✨ Editor\'s Choice'];
        let footers = ['VaultX','ArchiveHub','CollectionCentral','VaultMaster','PremiumBase','CollectorPoint'];
        
        document.getElementById('app').innerHTML = `
            <div class="header"><div class="logo">Vault<span>X</span><span class="accent">.</span></div><div class="search-box">🔍 Search Collection</div></div>
            <div class="breadcrumb"><a href="/">Home</a> / <a href="/go/">Vault</a> / ${displayName}</div>
            <div class="evergreen-note">📀 Permanent Archive · Premium Quality · Verified Collection</div>
            <div class="trending-bar">${renderBar(links)}</div>
            <div class="profile-header"><div class="profile-row"><div><div class="profile-name">${displayName} <span style="font-size:0.7rem;color:#1d9bf0;">· ${rand(['Complete Archive','Master Vault','Premium Collection','Signature Set','Definitive Library'])}</span></div><div class="profile-handle">@${handle}</div></div><div class="follow-btn">Follow</div></div><div class="profile-bio">${bio}</div><div class="profile-stats"><span>📚 ${stats.tweets} Items</span><span>👥 ${stats.following} Following</span><span>❤️ ${stats.followers} Collectors</span></div></div>
            <div class="tabs"><div class="tab active">${rand(tabs)}</div><div class="tab">Archive</div><div class="tab">Media</div><div class="tab">Info</div></div>
            <div id="feedContainer">${links.map((l,i)=>renderCard(l,i)).join('')}</div>
            <div class="sidebar-section"><div class="section-title">${rand(secTitles)}</div><div id="trendingContainer">${renderTrending(links)}</div></div>
            <div class="sidebar-section"><div class="section-title">${rand(['Recommended Vaults','Similar Collections','You May Also Like','Collectors Also View','Related Archives'])}</div><div id="followContainer">${renderFollow()}</div></div>
            <div class="footer">${rand(footers)} · ${stats.followers.toLocaleString()} collectors · Permanent Archive · ${displayLower.replace(/\s/g,'')}${rand(['Complete','Archive','Collection','Vault'])}</div>
        `;
        
        document.querySelectorAll('[data-url]').forEach(el => { el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); }); });
        document.querySelectorAll('.link-card').forEach(card => { card.addEventListener('click', () => window.location.href = card.getAttribute('data-url')); });
    };
    
    updateSEO();
    renderPage();
})();
</script>
</body>
</html>
