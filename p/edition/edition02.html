                <div class="hero-desc">${bio}</div>
                <div class="hero-stats">
                    <div class="stat"><div class="stat-value">${stats.items.toLocaleString()}+</div><div class="stat-label">Archive Items</div></div>
                    <div class="stat"><div class="stat-value">${stats.followers.toLocaleString()}</div><div class="stat-label">Collectors</div></div>
                    <div class="stat"><div class="stat-value">24/7</div><div class="stat-label">Access</div></div>
                </div>
            </div>
            
            <div class="filter-bar">
                ${filterChips.map((f,i) => `<div class="filter-chip ${i===0?'filter-active':''}">${f}</div>`).join('')}
            </div>
            
            <div class="main-grid">
                <div>
                    <div class="card-grid" id="cardGrid">
                        ${links.map((l,i)=>renderCard(l,i)).join('')}
                    </div>
                </div>
                
                <div class="sidebar">
                    <div class="sidebar-card">
                        <div class="sidebar-title">📚 Related Collections</div>
                        <div class="topic-list" id="relatedList">
                            ${renderRelatedTopics(links)}
                        </div>
                    </div>
                    
                    <div class="sidebar-card">
                        <div class="sidebar-title">👥 Top Contributors</div>
                        <div class="topic-list">
                            ${renderRecommended()}
                        </div>
                    </div>
                    
                    <div class="sidebar-card">
                        <div class="sidebar-title">📊 Archive Stats</div>
                        <div style="display:flex;justify-content:space-between;margin-bottom:12px"><span>Total Items</span><span style="color:#60a5fa">${stats.items.toLocaleString()}</span></div>
                        <div style="display:flex;justify-content:space-between;margin-bottom:12px"><span>Total Size</span><span style="color:#60a5fa">${range(45,250)} GB</span></div>
                        <div style="display:flex;justify-content:space-between"><span>Last Update</span><span style="color:#60a5fa">Weekly</span></div>
                    </div>
                </div>
            </div>
            
            <div class="footer">
                DeepVault · ${stats.followers.toLocaleString()} collectors · Permanent Archive · ${currentYear} · Topic: ${displayTopic}
            </div>
        `;
        
        // Attach event listeners
        document.querySelectorAll('[data-url]').forEach(el => {
            el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
        });
        document.querySelectorAll('.topic-card').forEach(card => {
            card.addEventListener('click', () => window.location.href = card.getAttribute('data-url'));
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
</body>
</html>
