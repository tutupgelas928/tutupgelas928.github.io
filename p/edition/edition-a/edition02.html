<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="referrer" content="always">
    <title id="dynamic-title">Timeline · Chronological Intelligence Report</title>
    <meta id="dynamic-description" name="description" content="Complete chronological timeline of digital content emergence across multiple platforms.">
    <link id="dynamic-canonical" rel="canonical" href="https://example.com/edition-a03/">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#f4f1ea;font-family:'Inter',sans-serif;color:#1a1a1a}
        
        /* Style Timeline / Chronological Report - Vintage Investigative */
        .timeline-container{max-width:1000px;margin:0 auto;padding:32px 24px}
        
        /* Header Investigative */
        .investigative-header{border-bottom:3px double #1a1a1a;padding-bottom:24px;margin-bottom:32px}
        .report-type{font-family:'Cormorant Garamond',serif;font-size:0.7rem;letter-spacing:3px;color:#8b4513;text-transform:uppercase;margin-bottom:8px}
        .report-title{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:700;letter-spacing:-0.5px;margin-bottom:12px}
        .report-meta{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;margin-top:16px;font-size:0.7rem;color:#666}
        .case-number{font-family:monospace;background:#e8e4dd;padding:4px 12px;border-radius:4px}
        .classification{color:#8b4513;font-weight:600}
        
        /* Subject Profile Card */
        .subject-profile{background:#fff;border:1px solid #ddd8ce;padding:28px;margin-bottom:32px;box-shadow:0 2px 8px rgba(0,0,0,0.02)}
        .profile-grid{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:start}
        .profile-avatar{width:80px;height:80px;background:linear-gradient(135deg,#1a1a1a,#8b4513);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff}
        .profile-details h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;margin-bottom:8px}
        .profile-details .alias{font-size:0.7rem;color:#8b4513;margin-bottom:16px}
        .profile-stats{display:flex;gap:24px;flex-wrap:wrap;margin-top:12px}
        .profile-stat{text-align:center}
        .profile-stat-value{font-size:1.2rem;font-weight:700;color:#1a1a1a}
        .profile-stat-label{font-size:0.6rem;text-transform:uppercase;color:#8b4513;letter-spacing:1px}
        
        /* Executive Summary */
        .exec-summary{background:#faf8f4;border-left:4px solid #8b4513;padding:24px;margin-bottom:32px}
        .summary-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:2px;color:#8b4513;margin-bottom:8px}
        .summary-text{font-size:0.9rem;line-height:1.6;color:#333}
        
        /* Timeline Navigation */
        .timeline-nav{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap;border-bottom:1px solid #ddd8ce;padding-bottom:16px}
        .nav-period{padding:6px 16px;border-radius:30px;font-size:0.7rem;cursor:pointer;background:#fff;border:1px solid #ddd8ce}
        .nav-active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
        
        /* Timeline Container - Vertical Timeline */
        .timeline{position:relative;padding-left:40px}
        .timeline::before{content:'';position:absolute;left:15px;top:0;bottom:0;width:2px;background:#ddd8ce}
        
        /* Timeline Item - Panjang seperti investigasi */
        .timeline-item{position:relative;margin-bottom:48px}
        .timeline-marker{position:absolute;left:-40px;top:0;width:32px;height:32px;background:#fff;border:2px solid #8b4513;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;z-index:1}
        .timeline-marker::after{content:'';position:absolute;width:10px;height:10px;background:#8b4513;border-radius:50%}
        .timeline-date{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1rem;color:#8b4513;margin-bottom:8px}
        .timeline-card{background:#fff;border:1px solid #e8e4dd;border-radius:12px;padding:24px;transition:all 0.2s;cursor:pointer}
        .timeline-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.05);border-color:#8b451340}
        
        .event-platform{display:inline-block;padding:4px 12px;border-radius:20px;font-size:0.6rem;font-weight:600;margin-bottom:12px}
        .platform-tiktok{background:#000;color:#fff}
        .platform-onlyfans{background:#00aff0;color:#fff}
        .platform-instagram{background:#d62976;color:#fff}
        .platform-twitter{background:#1da1f2;color:#fff}
        .platform-telegram{background:#0088cc;color:#fff}
        .platform-discord{background:#5865f2;color:#fff}
        .platform-reddit{background:#ff4500;color:#fff}
        
        .event-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;margin-bottom:12px}
        .event-description{font-size:0.8rem;line-height:1.6;color:#444;margin-bottom:16px}
        
        .event-details{background:#faf8f4;padding:16px;margin:16px 0;border-left:3px solid #8b4513}
        .detail-row{display:flex;margin-bottom:8px;font-size:0.7rem}
        .detail-label{width:100px;font-weight:600;color:#666}
        .detail-value{color:#333}
        
        .event-stats{display:flex;gap:20px;margin:16px 0;flex-wrap:wrap}
        .event-stat{font-size:0.7rem}
        .event-stat span{font-weight:700;color:#8b4513}
        
        .event-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
        .event-tag{background:#f0ede8;padding:2px 10px;border-radius:14px;font-size:0.6rem}
        
        /* Timeline Footer */
        .timeline-footer{margin-top:40px;padding-top:24px;border-top:1px solid #ddd8ce;text-align:center;font-size:0.7rem;color:#999}
        
        /* Right Sidebar (untuk desktop) */
        .sidebar-right{display:none}
        
        @media(min-width:1200px){
            .timeline-container{max-width:1300px}
            .two-col{display:grid;grid-template-columns:1fr 300px;gap:48px}
            .sidebar-right{display:block}
            .right-sticky{position:sticky;top:20px}
        }
        
        /* Sidebar Widgets */
        .sidebar-widget{background:#fff;border:1px solid #ddd8ce;padding:20px;margin-bottom:24px}
        .widget-title{font-family:'Cormorant Garamond',serif;font-size:0.9rem;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #ddd8ce}
        .platform-list{display:flex;flex-direction:column;gap:12px}
        .platform-summary{display:flex;justify-content:space-between;align-items:center;font-size:0.7rem}
        .platform-bar{width:120px;height:4px;background:#e8e4dd;border-radius:2px;overflow:hidden}
        .platform-fill{height:4px;background:#8b4513;border-radius:2px}
        
        .related-item{padding:10px 0;border-bottom:1px solid #f0ede8;cursor:pointer;font-size:0.7rem}
        .related-item:hover{color:#8b4513}
        
        @media(max-width:800px){.timeline-container{padding:20px 16px}.timeline{padding-left:30px}.timeline-marker{left:-30px;width:26px;height:26px}}
        
        @media(max-width:500px){.profile-grid{grid-template-columns:1fr;text-align:center}.profile-stats{justify-content:center}}
    </style>
{% include head.html %}

<body><div loading="lazy">
<div class="timeline-container" id="app"><div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#999">⚡ Loading Timeline Report...</div></div>

<script>
(function(){
    // ========== DATABASE TIMELINE STYLE (PANJANG & KRONOLOGIS) ==========
    
    // Platforms with config
    const PLATFORMS = ['TikTok','OnlyFans','Instagram','Twitter/X','Telegram','Discord','Reddit','YouTube','Snapchat','Facebook'];
    const PLATFORM_CONFIG = {
        'TikTok': { icon: '📱', bg: '#000', class: 'platform-tiktok' },
        'OnlyFans': { icon: '🔞', bg: '#00aff0', class: 'platform-onlyfans' },
        'Instagram': { icon: '📸', bg: '#d62976', class: 'platform-instagram' },
        'Twitter/X': { icon: '🐦', bg: '#1da1f2', class: 'platform-twitter' },
        'Telegram': { icon: '✈️', bg: '#0088cc', class: 'platform-telegram' },
        'Discord': { icon: '🎮', bg: '#5865f2', class: 'platform-discord' },
        'Reddit': { icon: '🤖', bg: '#ff4500', class: 'platform-reddit' },
        'YouTube': { icon: '▶️', bg: '#ff0000', class: 'platform-youtube' }
    };
    
    // 60 Event Types
    const EVENT_TYPES = [
        "initial emergence","first detection","viral spread","mass distribution","archival preservation",
        "secondary leak","supplemental dump","backup creation","mirror deployment","content restoration",
        "platform removal","re-upload","cross-platform spread","telegram distribution","discord sharing",
        "mega upload","google drive share","dropbox link","torrent release","usenet posting"
    ];
    
    // 50 Content Descriptors
    const CONTENT_DESCS = [
        "exclusive behind-the-scenes footage","private conversation screenshots","deleted social media posts","unreleased photo set","archived livestream recording",
        "personal video compilation","restricted content collection","premium subscriber material","patreon exclusive content","members-only media",
        "unedited raw footage","high resolution gallery","original source files","master quality assets","complete documentary evidence"
    ];
    
    // 30 File Details
    const FILE_DETAILS = [
        "12 videos (total 4.2 GB)","45 photos (high resolution)","8 video clips (various lengths)","32 images (original quality)","1 archive file (ZIP, 2.3 GB)",
        "15 video files (MP4, 5.1 GB)","67 screenshots (PNG)","23 video clips (1080p)","89 photos (mixed formats)","3 video sets (complete series)"
    ];
    
    // 40 Source Names (Source of leak)
    const SOURCE_NAMES = [
        "anonymous server","private channel","restricted group","closed community","trusted source",
        "internal backup","cache recovery","archive retrieval","backup restoration","deleted recovery",
        "third-party host","mirror service","alternative platform","secondary source","independent archivist"
    ];
    
    // 40 Impact Descriptions
    const IMPACT_TEXTS = [
        "Content quickly spread across multiple platforms","Viewed over {views} times within first 24 hours","Generated significant discussion across social media","Archived permanently by preservation groups",
        "Platform moderators attempted removal but copies persist","Content mirrored on {count} alternative services","Downloaded over {downloads} times globally","Shared across {platforms} major platforms"
    ];
    
    // 30 Verification Notes
    const VERIFICATION_NOTES = [
        "Metadata analysis confirms authenticity","Timestamp verification matches claimed period","Content hash matches previously known samples","Digital forensics confirms original source",
        "Multiple independent sources verify legitimacy","Blockchain timestamp recorded","Archive.org snapshot preserved","Wayback Machine capture confirmed"
    ];
    
    // Stop Words
    const STOP_WORDS = [
        'leaked','leak','leaks','archive','collection','dump','vault','content','media','video','photo',
        'exclusive','private','premium','onlyfans','tiktok','instagram','twitter','telegram','discord',
        'timeline','report','investigation','chronological'
    ];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const range = (min,max) => Math.floor(Math.random() * (max - min + 1)) + min;
    
    // ========== EKSTRAK TOPIK (PUBLIC FIGURE) ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ window.location.href = "/"; return; }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayName = formatTopic(baseTopic);
    const nameLower = displayName.toLowerCase();
    
    // ========== GENERATE LINK ==========
    const genLink = () => {
        let platform = rand(PLATFORMS);
        let eventType = rand(EVENT_TYPES);
        let newQ = `${nameLower} ${eventType} ${platform}`;
        return { 
            url:`/edition-a03/?q=${encodeURIComponent(newQ)}`, 
            platform: platform,
            eventType: eventType
        };
    };
    
    // ========== GENERATE TIMELINE EVENT (PANJANG) ==========
    const generateTimelineEvent = (index, link) => {
        let months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        let currentYear = 2025;
        let yearOffset = Math.floor(index / 4);
        let monthIndex = (index * 2) % 12;
        let day = range(1,28);
        let year = currentYear - yearOffset;
        let dateStr = `${months[monthIndex]} ${day}, ${year}`;
        
        let platform = link.platform;
        let eventType = link.eventType;
        let platformConfig = PLATFORM_CONFIG[platform] || { icon: '📁', bg: '#666', class: '' };
        let contentDesc = rand(CONTENT_DESCS);
        let fileDetail = rand(FILE_DETAILS);
        let sourceName = rand(SOURCE_NAMES);
        let views = range(15000, 8500000);
        let downloads = range(500, 245000);
        let platformsCount = range(3, 12);
        let impactText = rand(IMPACT_TEXTS)
            .replace('{views}', views.toLocaleString())
            .replace('{count}', range(2,15).toString())
            .replace('{downloads}', downloads.toLocaleString())
            .replace('{platforms}', platformsCount.toString());
        let verificationNote = rand(VERIFICATION_NOTES);
        
        let fmt = (n) => n.toLocaleString();
        
        return `
            <div class="timeline-item" data-url="${link.url}">
                <div class="timeline-marker"></div>
                <div class="timeline-date">${dateStr}</div>
                <div class="timeline-card">
                    <div class="event-platform ${platformConfig.class}">${platformConfig.icon} ${platform}</div>
                    <div class="event-title">${eventType.charAt(0).toUpperCase() + eventType.slice(1)}: ${contentDesc.substring(0, 60)}...</div>
                    <div class="event-description">
                        On ${dateStr}, intelligence systems detected the ${eventType} of ${displayName}'s ${contentDesc.toLowerCase()} on ${platform}. 
                        The content consists of ${fileDetail}. Initial source traced to ${sourceName}.
                    </div>
                    
                    <div class="event-details">
                        <div class="detail-row"><span class="detail-label">Content Type:</span><span class="detail-value">${contentDesc}</span></div>
                        <div class="detail-row"><span class="detail-label">File Details:</span><span class="detail-value">${fileDetail}</span></div>
                        <div class="detail-row"><span class="detail-label">Source:</span><span class="detail-value">${sourceName}</span></div>
                        <div class="detail-row"><span class="detail-label">Verification:</span><span class="detail-value">${verificationNote}</span></div>
                    </div>
                    
                    <div class="event-stats">
                        <div class="event-stat">📊 <span>${fmt(views)}</span> estimated views</div>
                        <div class="event-stat">📥 <span>${fmt(downloads)}</span> estimated downloads</div>
                        <div class="event-stat">🌐 <span>${platformsCount}</span> platforms affected</div>
                    </div>
                    
                    <div class="event-description" style="margin-top:8px;font-size:0.75rem;color:#666">
                        ${impactText}
                    </div>
                    
                    <div class="event-tags">
                        <span class="event-tag">${platform}</span>
                        <span class="event-tag">${eventType.replace(/ /g,'')}</span>
                        <span class="event-tag">${contentDesc.split(' ')[0]}</span>
                        <span class="event-tag">#${nameLower.replace(/ /g,'')}</span>
                        <span class="event-tag">${verificationNote.split(' ')[0]} verified</span>
                    </div>
                </div>
            </div>
        `;
    };
    
    // ========== GENERATE PLATFORM SUMMARY FOR SIDEBAR ==========
    const generatePlatformSummary = () => {
        let platforms = PLATFORMS.slice(0,8);
        let totalItems = range(450, 2850);
        let platformStats = {};
        platforms.forEach(p => {
            platformStats[p] = range(25, 380);
        });
        let maxStat = Math.max(...Object.values(platformStats));
        
        return platforms.map(p => {
            let count = platformStats[p];
            let percentage = (count / maxStat) * 100;
            return `
                <div class="platform-summary">
                    <span>${PLATFORM_CONFIG[p]?.icon || '📁'} ${p}</span>
                    <span style="font-weight:600">${count}</span>
                    <div class="platform-bar"><div class="platform-fill" style="width:${percentage}%"></div></div>
                </div>
            `;
        }).join('');
    };
    
    // ========== GENERATE RELATED TIMELINES ==========
    const generateRelatedTimelines = () => {
        let related = [];
        let topics = ['Similar Cases', 'Comparative Analysis', 'Preservation Status', 'Legal Context', 'Media Coverage'];
        for(let i=0;i<5;i++){
            let link = genLink();
            related.push(`
                <div class="related-item" data-url="${link.url}">
                    ${topics[i]} ›
                </div>
            `);
        }
        return related.join('');
    };
    
    // ========== GENERATE SUMMARY STATS ==========
    const generateSummaryStats = () => {
        let totalEvents = range(18, 45);
        let totalPlatforms = range(6, 14);
        let totalSize = range(45, 380);
        let firstDetected = 2022 + range(-2, 1);
        
        return `
            <div class="widget-title">📊 SUMMARY STATISTICS</div>
            <div style="margin-bottom:12px"><span style="color:#8b4513;font-weight:700">${totalEvents}</span> recorded events</div>
            <div style="margin-bottom:12px"><span style="color:#8b4513;font-weight:700">${totalPlatforms}</span> platforms involved</div>
            <div style="margin-bottom:12px"><span style="color:#8b4513;font-weight:700">${totalSize}.${range(0,9)} GB</span> total content</div>
            <div style="margin-bottom:12px"><span style="color:#8b4513;font-weight:700">${firstDetected}</span> first detected</div>
            <div>Status: <span style="color:#8b4513;font-weight:600">ACTIVE MONITORING</span></div>
        `;
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let titles = [
            `${displayName} · Complete Chronological Timeline | Intelligence Report`,
            `${displayName} · Digital Content Emergence Timeline | Leak Investigation`,
            `${displayName} · Platform-by-Platform Content Timeline | Full Report`,
            `${displayName} · Chronological Intelligence Report | Digital Forensics`
        ];
        let descs = [
            `Complete chronological timeline of ${displayName} digital content emergence across ${range(6,12)} platforms. ${range(20,50)} recorded events. Full investigation report.`,
            `${displayName} content timeline from first detection to present. Detailed platform analysis and preservation status. Updated continuously.`,
            `Chronological report of ${displayName} digital footprint. Track content emergence across TikTok, OnlyFans, Instagram, Twitter, Telegram and more.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        let links = [];
        for(let i=0;i<14;i++){
            links.push(genLink());
        }
        
        let totalEvents = range(24, 52);
        let totalSize = range(48, 420);
        let totalPlatforms = range(6, 11);
        let firstYear = 2019 + range(-2, 3);
        let currentYear = new Date().getFullYear();
        let caseNumber = `DF-${currentYear}-${range(1000,9999)}`;
        
        document.getElementById('app').innerHTML = `
            <div class="two-col">
                <div>
                    <div class="investigative-header">
                        <div class="report-type">DIGITAL FORENSICS · INTELLIGENCE REPORT</div>
                        <div class="report-title">${displayName}</div>
                        <div class="report-meta">
                            <span class="case-number">Case No: ${caseNumber}</span>
                            <span class="classification">CLASSIFICATION: ${rand(['CONFIDENTIAL','RESTRICTED','UNCLASSIFIED','FOR REVIEW'])}</span>
                            <span>Report Date: ${new Date().toLocaleDateString()}</span>
                        </div>
                    </div>
                    
                    <div class="subject-profile">
                        <div class="profile-grid">
                            <div class="profile-avatar">👤</div>
                            <div class="profile-details">
                                <h2>${displayName}</h2>
                                <div class="alias">Also known as: @${nameLower.replace(/ /g,'')}_${rand(['official','real','source','original'])}</div>
                                <div class="profile-stats">
                                    <div class="profile-stat"><div class="profile-stat-value">${totalEvents}</div><div class="profile-stat-label">RECORDED EVENTS</div></div>
                                    <div class="profile-stat"><div class="profile-stat-value">${totalPlatforms}</div><div class="profile-stat-label">PLATFORMS</div></div>
                                    <div class="profile-stat"><div class="profile-stat-value">${totalSize}.${range(0,9)} GB</div><div class="profile-stat-label">TOTAL SIZE</div></div>
                                    <div class="profile-stat"><div class="profile-stat-value">${firstYear}</div><div class="profile-stat-label">FIRST DETECTED</div></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="exec-summary">
                        <div class="summary-label">EXECUTIVE SUMMARY</div>
                        <div class="summary-text">
                            This chronological intelligence report documents the complete digital content emergence timeline for ${displayName} across ${totalPlatforms} platforms. 
                            Beginning in ${firstYear}, a total of ${totalEvents} discrete events have been recorded, totaling approximately ${totalSize}.${range(0,9)} GB of content. 
                            Primary distribution channels include ${rand(['Telegram','Discord','private servers'])} with significant amplification across ${rand(['Twitter/X','Reddit','Instagram'])}. 
                            Content preservation efforts have resulted in ${range(8,25)} permanent archival copies. Platform moderation has been ${rand(['inconsistent','reactive','delayed','proactive'])} resulting in continued availability of ${range(45,85)}% of total material. 
                            This report will be updated as new information emerges.
                        </div>
                    </div>
                    
                    <div class="timeline-nav">
                        <span class="nav-period nav-active">Full Timeline</span>
                        <span class="nav-period">${firstYear}-${firstYear+2}</span>
                        <span class="nav-period">${firstYear+2}-${firstYear+4}</span>
                        <span class="nav-period">${firstYear+4}-Present</span>
                        <span class="nav-period">Critical Events</span>
                    </div>
                    
                    <div class="timeline" id="timelineContainer">
                        ${links.map((link, idx) => generateTimelineEvent(idx, link)).join('')}
                        ${generateTimelineEvent(14, genLink())}
                        ${generateTimelineEvent(15, genLink())}
                    </div>
                    
                    <div class="timeline-footer">
                        <p>Timeline last updated: ${new Date().toLocaleString()} · Data retrieved from ${range(12,35)} active sources</p>
                        <p style="margin-top:8px">⚠️ This is an automated intelligence report. New events are added continuously as they are detected.</p>
                    </div>
                </div>
                
                <div class="sidebar-right">
                    <div class="right-sticky">
                        <div class="sidebar-widget">
                            ${generateSummaryStats()}
                        </div>
                        
                        <div class="sidebar-widget">
                            <div class="widget-title">📱 PLATFORM BREAKDOWN</div>
                            <div class="platform-list">
                                ${generatePlatformSummary()}
                            </div>
                        </div>
                        
                        <div class="sidebar-widget">
                            <div class="widget-title">🔗 RELATED INVESTIGATIONS</div>
                            ${generateRelatedTimelines()}
                        </div>
                        
                        <div class="sidebar-widget">
                            <div class="widget-title">📋 REPORT INFORMATION</div>
                            <div style="font-size:0.65rem;color:#666;margin-bottom:8px">Report ID: ${caseNumber}</div>
                            <div style="font-size:0.65rem;color:#666;margin-bottom:8px">Analyst: ${rand(['DF-INTEL','TIMELINE-AI','AUTO-GENERATED'])}</div>
                            <div style="font-size:0.65rem;color:#666;margin-bottom:8px">Data Sources: ${range(15,45)} active feeds</div>
                            <div style="font-size:0.65rem;color:#666">Classification: ${rand(['FOR OFFICIAL USE','RESTRICTED','PUBLIC RELEASE'])}</div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        // Attach event listeners
        document.querySelectorAll('[data-url]').forEach(el => {
            el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
        });
        document.querySelectorAll('.timeline-card, .related-item, .nav-period').forEach(card => {
            card.addEventListener('click', () => { if(card.getAttribute('data-url')) window.location.href = card.getAttribute('data-url'); });
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
