    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g, ' '));

                    <div class="trending-rank">Trending ${i+1} · ${link.qualifier.toUpperCase()}</div>
                    <div class="trending-name">${topicName}</div>
                    <div class="trending-posts">${posts}K posts</div>
                </div>
            `);
        }
        return trendingItems.join('');
    }
    
    // ========== RENDER WHO TO FOLLOW (VARIAN BERBEDA) ==========
    function renderWhoToFollow() {
        const suggestions = [];
        for (let i = 0; i < 4; i++) {
            const link = generateVariantLink();
            const name = randomItem(DISPLAY_NAMES);
            const handle = randomItem(USERNAMES);
            suggestions.push(`
                <div class="follow-suggestion" data-url="${link.url}">
                    <div class="suggestion-info">
                        <div class="suggestion-name">${name}</div>
                        <div class="suggestion-handle">@${handle}</div>
                    </div>
                    <div class="suggestion-follow">Follow</div>
                </div>
            `);
        }
        return suggestions.join('');
    }
    
    // ========== RENDER TRENDING BAR ==========
    function renderTrendingBar(links) {
        return links.slice(0, 10).map(link => 
            `<span class="trending-item" data-url="${link.url}">🔥 ${link.anchor}</span>`
        ).join('');
    }
    
    // ========== UPDATE SEO DENGAN VARIAN ==========
    function updateSEO() {
        const seoTitles = [
            `${displayName} · Akses Konten Eksklusif Terbaru | LeakX`,
            `${displayName} Viral Archive - Full Collection | LeakX`,
            `${displayName} Leaked Content Hub - Update Harian | LeakX`,
            `${displayName} Exclusive Vault - Premium Access | LeakX`,
            `${displayName} Complete Archive - 2025 edition-a | LeakX`
        ];
        
        const seoDescs = [
            `Temukan konten eksklusif ${displayName} terbaru. Update viral setiap hari. Akses cepat dan mudah.`,
            `Archive lengkap ${displayName} termasuk video dan foto eksklusif. Update real-time dari berbagai sumber.`,
            `${displayName} leaked content collection terlengkap. Ribuan file siap diakses. Limited time only.`,
            `Kanal resmi ${displayName} archive. Dapatkan akses ke konten premium dan eksklusif.`,
            `${displayName} viral content hub. Update setiap jam. Jangan sampai ketinggalan.`
        ];
        
        document.title = randomItem(seoTitles);
        
        let metaDesc = document.getElementById('dynamic-description');
        if (metaDesc) metaDesc.setAttribute('content', randomItem(seoDescs));
        
        let canonical = document.getElementById('dynamic-canonical');
        if (canonical) canonical.setAttribute('href', window.location.href.split('?')[0]);
    }
    
    // ========== RENDER HALAMAN UTUH ==========
    function renderPage() {
        const bulkLinks = generateBulkLinks(18);
        const randomNumbers = {
            tweets: randomNumberRange(80, 580),
            following: randomNumberRange(40, 250),
            followers: randomNumberRange(150, 950)
        };
        
        // Bio yang bervariasi
        const bios = [
            `The complete archive of ${displayName} exclusive content. Updated daily with new material. ${randomNumbers.followers}+ followers.`,
            `Official ${displayName} content hub. Get the latest leaks, exclusives, and viral updates. Join ${randomNumbers.followers}+ others.`,
            `${displayName} archive since 2024. Thousands of files available. Premium quality guaranteed.`,
            `Your #1 source for ${displayName} content. Follow for daily updates and exclusive drops.`
        ];
        
        // Handle yang bervariasi
        const handleSuffixes = ['archive', 'hub', 'central', 'vault', 'leaks', 'exclusive', 'content', 'library', 'source', 'channel'];
        const randomHandle = `${displayLower}_${randomItem(handleSuffixes)}`;
        
        const html = `
            <div class="header">
                <div class="logo">Leak<span>X</span><span class="accent">.</span></div>
                <div class="search-box">🔍 Search</div>
            </div>
            <div class="breadcrumb">
                <a href="/">Home</a> / <a href="/edition-a06/">edition-a</a> / ${displayName}
            </div>
            <div class="trending-bar" id="trendingBar">
                ${renderTrendingBar(bulkLinks)}
            </div>
            
            <div class="profile-header">
                <div class="profile-row">
                    <div>
                        <div class="profile-name">${displayName} <span style="font-size:0.7rem; color:#1d9bf0;">· ${randomItem(['Archive', 'Hub', 'Vault', 'Central', 'Source'])}</span></div>
                        <div class="profile-handle">@${randomHandle}</div>
                    </div>
                    <div class="follow-btn">${Math.random() > 0.5 ? 'Follow' : '+ Follow'}</div>
                </div>
                <div class="profile-bio">
                    ${randomItem(bios)}
                </div>
                <div class="profile-stats">
                    <span>📝 ${randomNumbers.tweets} Posts</span>
                    <span>👥 ${randomNumbers.following} Following</span>
                    <span>❤️ ${randomNumbers.followers} Followers</span>
                </div>
            </div>
            
            <div class="tabs">
                <div class="tab active">${randomItem(['For You', 'Latest', 'Trending', 'New'])}</div>
                <div class="tab">Following</div>
                <div class="tab">Media</div>
                <div class="tab">Likes</div>
            </div>
            
            <div id="feedContainer">
                ${bulkLinks.map((link, idx) => renderLinkCard(link, idx)).join('')}
            </div>
            
            <div class="sidebar-section">
                <div class="section-title">🔥 ${randomItem(['Trending terkait', 'Viral sekarang', 'Populer', 'Sedang ramai'])}</div>
                <div id="trendingContainer">
                    ${renderTrendingTopics(bulkLinks)}
                </div>
            </div>
            
            <div class="sidebar-section">
                <div class="section-title">${randomItem(['Who to follow', 'Rekomendasi', 'Suggested for you', 'Anda mungkin suka'])}</div>
                <div id="followContainer">
                    ${renderWhoToFollow()}
                </div>
            </div>
            
            <div class="footer">
                LeakX · ${randomNumbers.followers} followers · Updated ${randomItem(['real-time', 'every 5 minutes', 'constantly', 'live'])} · #${displayLower.replace(/ /g, '')}${randomItem(['Archive', 'Hub', 'Central'])}
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
        attachEventListeners();
    }
    
    // ========== ATTACH EVENT LISTENER ==========
    function attachEventListeners() {
        const clickableElements = document.querySelectorAll('[data-url]');
        clickableElements.forEach(el => {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                const url = this.getAttribute('data-url');
                if (url) window.location.href = url;
            });
        });
        
        const linkCards = document.querySelectorAll('.link-card');
        linkCards.forEach(card => {
            card.addEventListener('click', function() {
                const url = this.getAttribute('data-url');
                if (url) window.location.href = url;
            });
        });
        
        const trendingItems = document.querySelectorAll('.trending-item');
        trendingItems.forEach(item => {
            item.addEventListener('click', function() {
                const url = this.getAttribute('data-url');
                if (url) window.location.href = url;
            });
        });
        
        const followSugg = document.querySelectorAll('.follow-suggestion');
        followSugg.forEach(sugg => {
            sugg.addEventListener('click', function() {
                const url = this.getAttribute('data-url');
                if (url) window.location.href = url;
            });
        });
        
        const trendingTopics = document.querySelectorAll('.trending-topic');
        trendingTopics.forEach(topic => {
            topic.addEventListener('click', function() {
                const url = this.getAttribute('data-url');
                if (url) window.location.href = url;
            });
        });
    }
    
    // ========== EKSEKUSI ==========
    updateSEO();
    renderPage();
})();
</script>
