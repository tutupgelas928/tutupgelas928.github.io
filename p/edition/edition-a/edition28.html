        /* Hero Section - SEO Rich */
        .hero-section{background:#f8f9fa;border-radius:16px;padding:32px;margin-bottom:32px}

        /* Main Grid - 2 Columns */
        .main-grid{display:grid;grid-template-columns:1fr 320px;gap:32px;margin-bottom:40px}
        
        /* Category Sections */
        .category-section{margin-bottom:32px}

        .category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
        
        /* Result Card - Clean, Fast, No Animation */
        .result-card{display:block;background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:16px;text-decoration:none;color:inherit;transition:none}
        .result-card:hover{border-color:#0066cc;background:#fafbfc}
        .result-badge{display:inline-block;background:#f0f0f0;padding:2px 10px;border-radius:16px;font-size:0.6rem;font-weight:600;margin-bottom:10px;color:#666}
        .result-title{font-size:0.85rem;font-weight:700;margin-bottom:6px;color:#1a1a1a;line-height:1.3}
        .result-title span{color:#0066cc}
        .result-desc{font-size:0.7rem;color:#666;line-height:1.4;margin-bottom:8px}
        .result-meta{display:flex;gap:12px;font-size:0.6rem;color:#999}
        
        /* Sidebar - SEO Rich */
        .sidebar{position:sticky;top:20px}
        .sidebar-card{background:#f8f9fa;border-radius:16px;padding:20px;margin-bottom:24px}
        .sidebar-title{font-size:0.8rem;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #e0e0e0}
        .sidebar-list{list-style:none}

        .sidebar-item a:hover{color:#0066cc}
        .sidebar-count{font-size:0.6rem;color:#999;margin-top:2px}
        
        /* Footer */
        .index-footer{margin-top:40px;padding:24px 0;border-top:1px solid #e0e0e0;text-align:center;font-size:0.65rem;color:#888}
        .footer-links{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:12px}
        
        @media(max-width:800px){.main-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}.hero-title{font-size:1.4rem}}
        @media(max-width:500px){.index-container{padding:16px}.stats-row{grid-template-columns:1fr}.category-grid{grid-template-columns:1fr}}

<script>
(function(){
    // ========== DATABASE MASTER INDEX (EVERGREEN, NO ANIMATION, SEO FOCUSED) ==========
    
    // Categories with items - Setiap heading mengandung "leak" + query
    const CATEGORIES = [
        {
            name: "Complete Leak Archives",
            items: [
                { title: "{name} Complete Master Leak � Ultimate Collection", desc: "The definitive {name} leak archive. Every file from every source. Complete and verified.", meta: "Complete Set � Master Quality" },
                { title: "{name} Comprehensive Leak � The Full Library", desc: "Complete {name} library containing all known content. Organized and preserved.", meta: "Full Library � Verified" },
                { title: "{name} Eternal Leak � The Timeless Vault", desc: "Permanent {name} leak archive. All content preserved forever.", meta: "Eternal � Complete" }
            ]
        },
        {
            name: "OnlyFans Leak Collections",
            items: [
                { title: "{name} OnlyFans Complete Leak � Full Subscription", desc: "Complete {name} OnlyFans leak. All exclusive subscriber content.", meta: "Premium � Complete" },
                { title: "{name} OnlyFans Master Leak � The Entire Vault", desc: "The master {name} OnlyFans collection. Every post preserved.", meta: "Master � Verified" },
                { title: "{name} OnlyFans Ultimate Leak � All Content", desc: "Ultimate {name} OnlyFans archive. Complete and authenticated.", meta: "Ultimate � Authentic" }
            ]
        },
        {
            name: "TikTok Leak Compilations",
            items: [
                { title: "{name} TikTok Complete Leak � Full Compilation", desc: "Complete {name} TikTok leak compilation. All viral moments preserved.", meta: "Complete � Viral" },
                { title: "{name} TikTok Master Leak � The Entire Feed", desc: "Master {name} TikTok archive. Every video ever posted.", meta: "Master � Full" }
            ]
        },
        {
            name: "Telegram Leak Channels",
            items: [
                { title: "{name} Telegram Complete Leak � Full Channel", desc: "Complete {name} Telegram leak. All channel content preserved.", meta: "Complete � Channel" },
                { title: "{name} Telegram Master Leak � The Archive", desc: "Master {name} Telegram archive. Full message and media history.", meta: "Master � Verified" }
            ]
        },
        {
            name: "Instagram Leak Galleries",
            items: [
                { title: "{name} Instagram Complete Leak � Full Gallery", desc: "Complete {name} Instagram leak. All private story content.", meta: "Complete � Gallery" },
                { title: "{name} Instagram Master Leak � The Collection", desc: "Master {name} Instagram archive. Everything preserved.", meta: "Master � Verified" }
            ]
        },
        {
            name: "Mega Archive Leaks",
            items: [
                { title: "{name} Mega Complete Leak � Full Archive", desc: "Complete {name} Mega leak archive. The entire backup.", meta: "Complete � Backup" },
                { title: "{name} Mega Master Leak � The Vault", desc: "Master {name} Mega vault. Complete file collection.", meta: "Master � Vault" }
            ]
        },
        {
            name: "Rare & Unreleased Leaks",
            items: [
                { title: "{name} Rare Leak Collection � Unseen Content", desc: "Rare and unseen {name} content. Hard to find material.", meta: "Rare � Unseen" },
                { title: "{name} Unreleased Leak � Exclusive Material", desc: "Previously unreleased {name} content. Exclusive archive.", meta: "Exclusive � Rare" }
            ]
        },
        {
            name: "Fan Favorite Leak Compilations",
            items: [
                { title: "{name} Fan Favorites Leak � Best Of", desc: "Fan-curated {name} leak collection. The most requested content.", meta: "Fan Favorite � Curated" },
                { title: "{name} Top Rated Leak � Community Picks", desc: "Highest rated {name} leak content by fans.", meta: "Top Rated � Community" }
            ]
        }
    ];
    
    // Related Topics (Evergreen)
    const RELATED_TOPICS = [
        "Complete Video Archive", "Photo Gallery Collection", "Behind the Scenes", "Interview Compilation",
        "Live Performance Archive", "Social Media Collection", "Personal Moments", "Professional Portfolio",
        "Documentary Archive", "Fan edition-a", "Collector's Set", "Master Series"
    ];
    
    // Quick Links
    const QUICK_LINKS = [
        "Newest Additions", "Most Popular", "Complete Guide", "How to Navigate",
        "Help Center", "Community Favorites", "Verified Content", "HD Quality"
    ];
    
    // Evergreen description
    const MASTER_DESC = "This master index serves as the definitive directory for {name} leak archives. Every entry has been verified and permanently preserved. The collection is complete, organized, and eternally accessible.";
    
    // Stop Words
    const STOP_WORDS = ['index','master','directory','archive','collection','library','catalog','listing','guide'];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    
    // ========== EKSTRAK TOPIK ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ rawQuery = "master archive collection"; }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayName = formatTopic(baseTopic);
    const nameLower = displayName.toLowerCase();
    
    // ========== GENERATE LINK ==========
    const genLink = (title) => {
        let newQ = `${nameLower} ${title.toLowerCase().substring(0, 45)} index`;
        return `/edition-a29/?q=${encodeURIComponent(newQ)}`;
    };
    
    // ========== GENERATE CATEGORY SECTIONS ==========
    const generateCategorySections = () => {
        let sections = '';
        for(let category of CATEGORIES){
            let categoryTitle = category.name.replace('Collections', `${displayName} ${category.name}`).replace('Archives', `${displayName} ${category.name}`).replace('Compilations', `${displayName} ${category.name}`).replace('Channels', `${displayName} ${category.name}`).replace('Galleries', `${displayName} ${category.name}`);
            
            let itemsHtml = '';
            for(let item of category.items){
                let title = item.title.replace('{name}', displayName);
                let desc = item.desc.replace('{name}', displayName);
                let meta = item.meta;
                let url = genLink(item.title);
                itemsHtml += `
                    <a href="${url}" class="result-card">
                        <div class="result-badge">LEAK ARCHIVE</div>
                        <div class="result-title"><span></span> ${title}</div>
                        <div class="result-desc">${desc}</div>
                        <div class="result-meta">
                            <span>${meta}</span>
                            <span>Permanent</span>
                        </div>
                    </a>
                `;
            }
            
            sections += `
                <div class="category-section">
                    <div class="category-title">${categoryTitle}</div>
                    <div class="category-grid">
                        ${itemsHtml}
                    </div>
                </div>
            `;
        }
        return sections;
    };
    
    // ========== GENERATE RELATED TOPICS ==========
    const generateRelatedTopics = () => {
        let items = '';
        for(let topic of RELATED_TOPICS){
            let fullTopic = `${displayName} ${topic}`;
            let url = genLink(topic);
            items += `
                <li class="sidebar-item">
                    <a href="${url}"> ${fullTopic}</a>
                    <div class="sidebar-count">Permanent Collection</div>
                </li>
            `;
        }
        return items;
    };
    
    // ========== GENERATE QUICK LINKS ==========
    const generateQuickLinks = () => {
        let items = '';
        for(let link of QUICK_LINKS){
            let url = genLink(link);
            items += `<li class="sidebar-item"><a href="${url}"> ${link}</a></li>`;
        }
        return items;
    };
    
    // ========== RENDER HERO ==========
    const renderHero = () => {
        let totalCollections = CATEGORIES.reduce((acc, cat) => acc + cat.items.length, 0);
        return `
            <div class="hero-section">
                <div class="hero-tag">MASTER INDEX</div>
                <div class="hero-title"><span>${displayName}</span> Leak Archive Directory</div>
                <div class="hero-description">${MASTER_DESC.replace('{name}', displayName)}</div>
                <div class="hero-meta">
                    <span> ${totalCollections} Collections</span>
                    <span> Verified Archive</span>
                    <span> Permanent Directory</span>
                </div>
            </div>
        `;
    };
    
    // ========== RENDER STATS ==========
    const renderStats = () => {
        let totalCollections = CATEGORIES.reduce((acc, cat) => acc + cat.items.length, 0);
        let totalCategories = CATEGORIES.length;
        return `
            <div class="stats-row">
                <div class="stat-card"><div class="stat-value">${totalCategories}</div><div class="stat-label">MAIN CATEGORIES</div></div>
                <div class="stat-card"><div class="stat-value">${totalCollections}</div><div class="stat-label">TOTAL COLLECTIONS</div></div>
                <div class="stat-card"><div class="stat-value">Complete</div><div class="stat-label">ARCHIVE STATUS</div></div>
                <div class="stat-card"><div class="stat-value">Verified</div><div class="stat-label">AUTHENTICITY</div></div>
            </div>
        `;
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let totalCollections = CATEGORIES.reduce((acc, cat) => acc + cat.items.length, 0);
        let titles = [
            `${displayName} Master Index � Complete Leak Directory`,
            `${displayName} Leak Archive Index � Permanent Directory`,
            `${displayName} Complete Leak Index � Master Collection`,
            `Index of ${displayName} Leak Archives � Complete Directory`
        ];
        let descs = [
            `Complete master index of ${displayName} leak archives. ${totalCollections}+ verified collections. Permanent directory. Evergreen reference.`,
            `${displayName} leak archive index. Complete directory of all ${displayName} leak collections. Verified and permanently preserved.`,
            `Master index for ${displayName} leak content. ${CATEGORIES.length} categories. Complete reference library.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== RENDER BREADCRUMB ==========
    const renderBreadcrumb = () => {
        return `
            <div class="breadcrumb">
                <a href="/">Home</a> � <a href="/edition-a29/">Index</a> � ${displayName} Leak Directory
            </div>
        `;
    };
    
    // ========== RENDER HEADER ==========
    const renderHeader = () => {
        let totalCollections = CATEGORIES.reduce((acc, cat) => acc + cat.items.length, 0);
        return `
            <div class="index-header">
                <div class="header-row">
                    <div class="logo"><h1>Leak<span>Index</span></h1></div>
                    <div class="header-stats"> ${totalCollections} collections �  Verified</div>
                </div>
            </div>
        `;
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        let totalCollections = CATEGORIES.reduce((acc, cat) => acc + cat.items.length, 0);
        
        document.getElementById('app').innerHTML = `
            ${renderHeader()}
            ${renderBreadcrumb()}
            ${renderHero()}
            ${renderStats()}
            
            <div class="main-grid">
                <div class="content">
                    ${generateCategorySections()}
                </div>
                
                <div class="sidebar">
                    <div class="sidebar-card">
                        <div class="sidebar-title"> Related Topics</div>
                        <ul class="sidebar-list">
                            ${generateRelatedTopics()}
                        </ul>
                    </div>
                    
                    <div class="sidebar-card">
                        <div class="sidebar-title"> Quick Navigation</div>
                        <ul class="sidebar-list">
                            ${generateQuickLinks()}
                        </ul>
                    </div>
                    
                    <div class="sidebar-card">
                        <div class="sidebar-title"> Directory Info</div>
                        <ul class="sidebar-list">
                            <li class="sidebar-item"><span>Total Collections: ${totalCollections}</span></li>
                            <li class="sidebar-item"><span>Categories: ${CATEGORIES.length}</span></li>
                            <li class="sidebar-item"><span>Status: Complete</span></li>
                            <li class="sidebar-item"><span>Verification: Authenticated</span></li>
                        </ul>
                    </div>
                </div>
            </div>
            
            <div class="index-footer">
                <div class="footer-links">
                    <a href="/">Home</a> � <a href="/edition-a29/">Index</a> � <a href="#">About</a>
                </div>
                <div>${displayName} Master Index � Complete Leak Directory � Permanently Preserved</div>
            </div>
        `;
        
        // Standard link attachment (no animation)
        document.querySelectorAll('a').forEach(link => {
            if(link.getAttribute('href') && link.getAttribute('href').startsWith('/edition-a29/?q=')){
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.location.href = link.getAttribute('href');
                });
            }
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
