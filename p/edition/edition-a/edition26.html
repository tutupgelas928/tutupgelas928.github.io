<body><div loading="lazy">
<div class="particles" id="particles"></div>
<div class="command-container" id="app"><div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#0ff;font-family:'Orbitron',monospace">>_ INITIALIZING HOLOGRAPHIC COMMAND...</div></div>

<script>
(function(){
    // Create particles
    function createParticles() {
        const container = document.getElementById('particles');
        for(let i=0;i<50;i++){
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 1;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 15 + 8 + 's';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.background = `rgba(${Math.random() * 100 + 155},${Math.random() * 100 + 155},255,${Math.random() * 0.3 + 0.1})`;
            container.appendChild(particle);
        }
    }
    
    // ========== DATABASE HOLOGRAPHIC BREACH COMMAND ==========
    
    const LEAK_CARDS = [
        { level: "CRITICAL", icon: "🔥", title: "{name} Complete Archive Leak — Full Content Exposure", desc: "Massive {name} content leak detected across {platforms} platforms. Total {count} verified files. Critical spread velocity detected. Click for immediate access." },
        { level: "CRITICAL", icon: "💎", title: "{name} OnlyFans Full Leak — Complete Subscription Dump", desc: "Full {name} OnlyFans subscription leak. All exclusive content exposed. {count} videos and {photos} photos. Verified authentic. Click to view." },
        { level: "HIGH", icon: "⚠️", title: "{name} Exclusive Vault Leak — Premium Content Breach", desc: "High-value {name} exclusive leak identified. Premium subscriber content now in public domain. {count} new files. Click for instant access." },
        { level: "HIGH", icon: "📱", title: "{name} TikTok Private Leak — Viral Content Dump", desc: "{name} TikTok private content leak detected. {count} videos compromised. Rapidly trending. Click to see all leaked videos." },
        { level: "HIGH", icon: "✈️", title: "{name} Telegram Channel Leak — Mass Distribution", desc: "{name} content spreading via private Telegram channels. {mirrors} active mirrors. Click to join the channel." },
        { level: "MEDIUM", icon: "📸", title: "{name} Instagram Story Leak — Private Gallery Exposure", desc: "{name} Instagram private story content leak. {count} images/videos from private account. Click to view gallery." }
    ];
    
    const FEED_ITEMS = [
        { text: "{name} Archive Leak Detected — {count} new files", badge: "NEW" },
        { text: "{name} OnlyFans Leak Trending — #{trending} worldwide", badge: "TRENDING" },
        { text: "{name} Telegram Leak — {speed}x spread velocity", badge: "ALERT" },
        { text: "{name} TikTok Leak — {count}K views in 1 hour", badge: "VIRAL" },
        { text: "{name} Discord Server Leak — {count} files exposed", badge: "BREACH" },
        { text: "{name} Mega Backup Leak — {size} GB available", badge: "NEW" },
        { text: "{name} Twitter Leak — Private media circulating", badge: "ALERT" },
        { text: "{name} Complete Archive — Now {count} total files", badge: "UPDATED" }
    ];
    
    const PLATFORMS = [
        { name: "Telegram", leaks: 0, trend: "↑" },
        { name: "OnlyFans", leaks: 0, trend: "↑↑" },
        { name: "Discord", leaks: 0, trend: "↑" },
        { name: "TikTok", leaks: 0, trend: "↑↑" },
        { name: "Instagram", leaks: 0, trend: "→" },
        { name: "Twitter/X", leaks: 0, trend: "↑" },
        { name: "Reddit", leaks: 0, trend: "↓" },
        { name: "Telegram (Backup)", leaks: 0, trend: "↑↑" }
    ];
    
    const STOP_WORDS = ['command','center','holographic','breach','leak','intelligence','threat','alert'];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const range = (min,max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const formatNumber = (n) => n.toLocaleString();
    
    // ========== EKSTRAK TOPIK ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ rawQuery = "celebrity exclusive leak"; }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayName = formatTopic(baseTopic);
    const nameLower = displayName.toLowerCase();
    
    // ========== GENERATE LINK ==========
    const genLink = (title) => {
        let newQ = `${nameLower} ${title.toLowerCase().substring(0, 55)} leak access`;
        return { url:`/edition-a27/?q=${encodeURIComponent(newQ)}` };
    };
    
    // ========== GENERATE THREAT GAUGES ==========
    const generateThreatGauges = () => {
        const threats = [
            { label: "LEAK VELOCITY", value: range(72, 98) },
            { label: "PLATFORM SPREAD", value: range(68, 95) },
            { label: "VERIFICATION", value: range(88, 99) },
            { label: "THREAT INDEX", value: range(82, 97) }
        ];
        return threats.map((t, i) => {
            let angle = (t.value / 100) * 360;
            return `
                <div class="holo-card" data-url="${genLink(t.label).url}" style="animation-delay:${0.1 + i*0.1}s">
                    <div class="threat-gauge">
                        <div class="gauge-ring" style="--angle:${angle}deg;--target:${angle}deg">
                            <div class="gauge-inner">${t.value}%</div>
                        </div>
                    </div>
                    <div class="threat-label">${t.label}</div>
                    <div style="font-size:0.55rem;color:#0ff;margin-top:8px">ACTIVE</div>
                </div>
            `;
        }).join('');
    };
    
    // ========== GENERATE LEAK CARDS ==========
    const generateLeakCards = () => {
        return LEAK_CARDS.map((card, idx) => {
            let title = card.title.replace('{name}', displayName);
            let desc = card.desc
                .replace('{name}', displayName)
                .replace('{platforms}', range(2, 7))
                .replace('{count}', formatNumber(range(125, 2850)))
                .replace('{photos}', formatNumber(range(45, 850)))
                .replace('{mirrors}', range(3, 18));
            let levelClass = card.level === 'CRITICAL' ? 'level-critical' : (card.level === 'HIGH' ? 'level-high' : 'level-medium');
            let fileSize = `${range(45, 850)} MB`;
            return `
                <div class="leak-card" data-url="${genLink(card.title).url}" style="animation-delay:${0.1 + idx*0.08}s">
                    <div class="card-header">
                        <div class="card-level ${levelClass}">${card.level} LEAK</div>
                        <div class="card-icon">${card.icon}</div>
                    </div>
                    <div class="card-title"><span>⚠️</span> ${title}</div>
                    <div class="card-desc">${desc.substring(0, 120)}... <span style="color:#0ff">[CLICK TO ACCESS]</span></div>
                    <div class="card-stats">
                        <span>📁 ${fileSize}</span>
                        <span>⏱️ ${range(1, 30)} min ago</span>
                        <span class="click-indicator">🔘 CLICK →</span>
                    </div>
                </div>
            `;
        }).join('');
    };
    
    // ========== GENERATE LIVE FEED ==========
    const generateLiveFeed = () => {
        let items = [];
        for(let i=0;i<8;i++){
            let item = rand(FEED_ITEMS);
            let text = item.text
                .replace('{name}', displayName)
                .replace('{count}', formatNumber(range(45, 1850)))
                .replace('{trending}', ['#1','#2','#3','#5','#10'][range(0,4)])
                .replace('{speed}', range(3, 15))
                .replace('{size}', `${range(25, 450)}GB`);
            let time = `${range(0,23).toString().padStart(2,'0')}:${range(0,59).toString().padStart(2,'0')}:${range(0,59).toString().padStart(2,'0')}`;
            items.push(`
                <div class="feed-item" data-url="${genLink(item.text).url}" style="animation-delay:${0.05 + i*0.03}s">
                    <div class="feed-time">${time}</div>
                    <div class="feed-text">🔴 ${text}</div>
                    <div class="feed-badge">${item.badge}</div>
                </div>
            `);
        }
        return items.join('');
    };
    
    // ========== GENERATE PLATFORM INTEL ==========
    const generatePlatformIntel = () => {
        let leftPlatforms = PLATFORMS.slice(0,4);
        let rightPlatforms = PLATFORMS.slice(4,8);
        
        const renderList = (platforms) => {
            return platforms.map(p => {
                let leakCount = formatNumber(range(45, 2850));
                return `
                    <div class="platform-row" data-url="${genLink(p.name).url}">
                        <div class="platform-name">📱 ${p.name}</div>
                        <div class="platform-leaks">${p.trend} ${leakCount} leaks</div>
                    </div>
                `;
            }).join('');
        };
        
        return `
            <div class="platform-card">
                <div class="platform-title">🌀 PRIMARY LEAK VECTORS</div>
                <div class="platform-list">${renderList(leftPlatforms)}</div>
            </div>
            <div class="platform-card">
                <div class="platform-title">🌀 SECONDARY DISTRIBUTION</div>
                <div class="platform-list">${renderList(rightPlatforms)}</div>
            </div>
        `;
    };
    
    // ========== RENDER HERO ==========
    const renderHero = () => {
        let totalLeaks = formatNumber(range(185, 1850));
        let activeThreats = range(12, 45);
        let monitoredPlatforms = PLATFORMS.length;
        
        return `
            <div class="hero-holo">
                <div class="hero-tag">⚡ HOLOGRAPHIC BREACH INTELLIGENCE NETWORK ⚡</div>
                <div class="hero-title"><span>${displayName}</span> Leak Command Center</div>
                <div class="hero-desc">Real-time holographic breach detection for ${displayName}. Live threat visualization from ${monitoredPlatforms} vectors. Verified leak alerts. Click any card for instant access to complete archives.</div>
                <div class="hero-stats">
                    <div class="hero-stat"><div class="value">${totalLeaks}</div><div class="label">CONFIRMED LEAKS</div></div>
                    <div class="hero-stat"><div class="value">${activeThreats}</div><div class="label">ACTIVE THREATS</div></div>
                    <div class="hero-stat"><div class="value">${monitoredPlatforms}</div><div class="label">MONITORED VECTORS</div></div>
                </div>
            </div>
        `;
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let titles = [
            `${displayName} Leak Command — Holographic Breach Intelligence Center`,
