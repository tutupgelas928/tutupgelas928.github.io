<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="bingbot" content="index, follow">
    <meta name="yandex" content="index, follow">
    <meta name="theme-color" content="#0a0a0a">
    <title id="dynamic-title">VIRAL LEAK HUB · Trending Content Discovery</title>
    <meta id="dynamic-description" name="description" content="Trending leak discovery hub. Viral content feed. Real-time updates from across the web.">
    <link id="dynamic-canonical" rel="canonical" href="https://example.com/viral/">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;font-family:'Inter',sans-serif;color:#fff}
        
        /* Viral Feed Container - Mobile First */
        .viral-container{max-width:500px;margin:0 auto;padding:0;background:#000;min-height:100vh}
        
        /* Sticky Header */
        .sticky-header{position:sticky;top:0;background:rgba(0,0,0,0.95);backdrop-filter:blur(12px);padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.08);z-index:100;display:flex;justify-content:space-between;align-items:center}
        .logo{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#fff,#ff4444);-webkit-background-clip:text;background-clip:text;color:transparent}
        .trending-badge{background:rgba(255,68,68,0.15);padding:6px 12px;border-radius:30px;font-size:0.65rem;color:#ff4444;display:flex;align-items:center;gap:6px}
        .trending-dot{width:6px;height:6px;background:#ff4444;border-radius:50%;animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        
        /* Story Ring Row */
        .story-row{padding:12px 16px;display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,0.05)}
        .story-row::-webkit-scrollbar{display:none}
        .story-item{text-align:center;cursor:pointer;min-width:70px;animation:slideUp 0.4s ease-out both}
        .story-ring{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#ff4444,#ff8844);padding:2px;margin-bottom:6px;animation:ringPulse 2s infinite}
        .story-ring-inner{width:100%;height:100%;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;font-size:24px}
        .story-name{font-size:0.6rem;color:#aaa}
        
        /* Hero Section - Viral Header */
        .viral-hero{padding:20px 16px;background:linear-gradient(135deg,#0a0a0a,#1a0a0a);margin-bottom:8px;border-bottom:1px solid rgba(255,68,68,0.2)}
        .hero-badge{display:inline-block;background:#ff4444;padding:4px 12px;border-radius:20px;font-size:0.55rem;font-weight:700;margin-bottom:12px;animation:badgeFlash 1.5s infinite}
        @keyframes badgeFlash{0%,100%{opacity:1}50%{opacity:0.7}}
        .hero-title{font-size:1.4rem;font-weight:800;margin-bottom:8px;line-height:1.3}
        .hero-title span{color:#ff4444;text-shadow:0 0 8px rgba(255,68,68,0.5)}
        .hero-stats{display:flex;gap:20px;margin-top:12px}
        .hero-stat{font-size:0.6rem;color:#888}
        .hero-stat strong{color:#ff4444}
        
        /* Search Bar */
        .search-bar{margin:12px 16px;background:#1a1a1a;border-radius:30px;padding:10px 16px;display:flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,0.05)}
        .search-icon{color:#666;font-size:14px}
        .search-input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:0.85rem}
        .search-input::placeholder{color:#444}
        .search-hot{background:#ff4444;padding:4px 10px;border-radius:20px;font-size:0.55rem;font-weight:700}
        
        /* Trending Hashtags */
        .hashtag-row{padding:8px 16px;display:flex;gap:10px;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,0.05)}
        .hashtag{background:#1a1a1a;padding:6px 14px;border-radius:30px;font-size:0.65rem;white-space:nowrap;cursor:pointer;transition:all 0.2s}
        .hashtag:hover{background:#ff4444;color:#fff}
        .hashtag-trend{color:#ff4444}
        
        /* Viral Feed - Cards */
        .viral-feed{display:flex;flex-direction:column;gap:0;margin-bottom:60px}
        
        /* Viral Card - Like TikTok/IG Reel */
        .viral-card{background:#0a0a0a;border-bottom:8px solid #0a0a0a;cursor:pointer;transition:all 0.2s;animation:cardReveal 0.5s ease-out both;position:relative}
        @keyframes cardReveal{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
        .viral-card:active{background:#111}
        .card-header{display:flex;align-items:center;gap:12px;padding:12px 16px}
        .avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#ff4444,#ff8844);display:flex;align-items:center;justify-content:center;font-size:20px}
        .user-info{flex:1}
        .user-name{font-size:0.85rem;font-weight:700}
        .user-time{font-size:0.55rem;color:#666}
        .more-icon{color:#666;font-size:18px}
        
        /* Media Preview - Click Magnet */
        .media-preview{position:relative;margin:0 12px;border-radius:20px;overflow:hidden;background:#1a1a1a;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
        .media-preview:active{transform:scale(0.98)}
        .play-overlay{position:absolute;width:60px;height:60px;background:rgba(0,0,0,0.6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;backdrop-filter:blur(4px);transition:all 0.2s}
        .media-preview:hover .play-overlay{transform:scale(1.1);background:rgba(255,68,68,0.8)}
        .media-badge{position:absolute;top:12px;left:12px;background:#ff4444;padding:4px 10px;border-radius:20px;font-size:0.55rem;font-weight:700;animation:pulseBadge 1.5s infinite}
        @keyframes pulseBadge{0%,100%{box-shadow:0 0 0px #ff4444}50%{box-shadow:0 0 10px #ff4444}}
        .media-duration{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,0.7);padding:4px 8px;border-radius:8px;font-size:0.55rem}
        
        /* Card Content */
        .card-title{padding:12px 16px 8px;font-size:0.9rem;font-weight:700;line-height:1.3}
        .card-title span{color:#ff4444}
        .card-desc{padding:0 16px 8px;font-size:0.7rem;color:#aaa;line-height:1.4}
        
        /* Engagement Bar */
        .engagement-bar{padding:8px 16px;display:flex;gap:20px;border-top:1px solid rgba(255,255,255,0.05);margin-top:8px}
        .eng-item{display:flex;align-items:center;gap:6px;font-size:0.65rem;color:#888}
        .eng-item.active{color:#ff4444}
        .click-hint{background:rgba(255,68,68,0.1);padding:8px 16px;margin:8px 16px;border-radius:30px;text-align:center;font-size:0.55rem;color:#ff4444;display:flex;align-items:center;justify-content:center;gap:8px;animation:hintPulse 1.5s infinite}
        @keyframes hintPulse{0%,100%{background:rgba(255,68,68,0.1)}50%{background:rgba(255,68,68,0.2)}}
        
        /* Bottom Nav */
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.95);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.08);padding:10px 24px;display:flex;justify-content:space-between;max-width:500px;margin:0 auto;z-index:100}
        .nav-item{text-align:center;font-size:0.55rem;color:#666;cursor:pointer}
        .nav-item.active{color:#ff4444}
        .nav-icon{font-size:20px;margin-bottom:4px}
        
        @media(min-width:500px){.viral-container{box-shadow:0 0 30px rgba(0,0,0,0.5)}.bottom-nav{left:50%;transform:translateX(-50%);width:500px}}
    </style>
</head>
<body>
<div class="viral-container" id="app"><div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#666">⚡ LOADING VIRAL FEED...</div></div>

<script>
(function(){
    // ========== DATABASE VIRAL LEAK FEED ==========
    
    // Viral Cards Data - setiap heading mengandung "leak"
    const VIRAL_CARDS = [
        { avatar: "🔥", name: "LeakAlert", user: "@leakalert", title: "{name} COMPLETE LEAK ARCHIVE — All Content Exposed", desc: "The biggest {name} leak ever! Complete archive with {count}+ files. Trending #1 worldwide. Click to see everything!", mediaIcon: "🎬", duration: "12:45", badge: "EXCLUSIVE" },
        { avatar: "💎", name: "VaultKeeper", user: "@vaultkeeper", title: "{name} OnlyFans FULL LEAK — Premium Unlocked", desc: "Full {name} OnlyFans subscription dump. {count} videos, {photos} photos. All exclusive content. Tap to access the vault!", mediaIcon: "🔞", duration: "08:32", badge: "ONLYFANS" },
        { avatar: "📱", name: "ViralHunter", user: "@viralhunter", title: "{name} TikTok LEAK — Viral Video Compilation", desc: "{name} TikTok private content going VIRAL! {count} trending videos. {views}M views in 24 hours. Click to watch!", mediaIcon: "🎵", duration: "15:20", badge: "TRENDING" },
        { avatar: "✈️", name: "TelegramLeaks", user: "@tgleaks", title: "{name} Telegram CHANNEL LEAK — Join Now", desc: "Exclusive {name} Telegram channel leak. {count} members already inside. Daily updates. Tap to join the channel!", mediaIcon: "💬", duration: "--:--", badge: "CHANNEL" },
        { avatar: "🏆", name: "MasterArchive", user: "@masterarch", title: "{name} COMPLETE COLLECTION — Every Leak Ever", desc: "The ULTIMATE {name} archive. Every leak from all platforms. {size} GB total. The collection every fan wants. Click to unlock!", mediaIcon: "📀", duration: "--:--", badge: "LEGENDARY" },
        { avatar: "📸", name: "InstaLeaks", user: "@instaleaks", title: "{name} Instagram PRIVATE STORY LEAK", desc: "{name} Instagram private story exposed. {count} unseen photos and videos. Limited time before removal. Click to view!", mediaIcon: "📷", duration: "05:18", badge: "NEW" },
        { avatar: "🗂️", name: "MegaDump", user: "@megadump", title: "{name} MEGA ARCHIVE LEAK — Complete Backup", desc: "Full {name} Mega backup leak. {size} GB organized archive. Everything in one place. Tap to download!", mediaIcon: "☁️", duration: "--:--", badge: "MEGA" }
    ];
    
    // Story items
    const STORIES = [
        { emoji: "🔥", name: "Latest Leak" },
        { emoji: "💎", name: "Exclusive" },
        { emoji: "📱", name: "TikTok" },
        { emoji: "✈️", name: "Telegram" },
        { emoji: "🏆", name: "Complete" },
        { emoji: "🆕", name: "New" }
    ];
    
    // Hashtags
    const HASHTAGS = [
        "#LeakAlert", "#ViralContent", "#ExclusiveAccess", "#TrendingNow", "#OnlyLeaks"
    ];
    
    // Stop Words
    const STOP_WORDS = ['viral','leak','hub','feed','trending','discovery','content','access'];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const range = (min,max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const formatNumber = (n) => n.toLocaleString();
    
    // ========== EKSTRAK TOPIK ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ rawQuery = "celebrity viral leak"; }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayName = formatTopic(baseTopic);
    const nameLower = displayName.toLowerCase();
    
    // ========== GENERATE LINK ==========
    const genLink = (title) => {
        let newQ = `${nameLower} ${title.toLowerCase().substring(0, 50)} leak viral`;
        return { url:`/viral/?q=${encodeURIComponent(newQ)}` };
    };
    
    // ========== GENERATE VIRAL CARDS ==========
    const generateViralCards = () => {
        return VIRAL_CARDS.map((card, idx) => {
            let count = formatNumber(range(45, 2850));
            let photos = formatNumber(range(20, 450));
            let views = range(125, 850);
            let size = `${range(25, 850)} GB`;
            let title = card.title.replace('{name}', displayName);
            let desc = card.desc
                .replace('{name}', displayName)
                .replace('{count}', count)
                .replace('{photos}', photos)
                .replace('{views}', views)
                .replace('{size}', size);
            
            let likes = formatNumber(range(1250, 185000));
            let comments = formatNumber(range(45, 1850));
            let shares = formatNumber(range(25, 850));
            
            return `
                <div class="viral-card" data-url="${genLink(card.title).url}" style="animation-delay:${0.05 + idx*0.03}s">
                    <div class="card-header">
                        <div class="avatar">${card.avatar}</div>
                        <div class="user-info">
                            <div class="user-name">${card.name} <span style="color:#ff4444;font-size:10px">●</span></div>
                            <div class="user-time">${card.user} · ${range(5, 58)}m ago</div>
                        </div>
                        <div class="more-icon">⋯</div>
                    </div>
                    
                    <div class="media-preview">
                        <div class="play-overlay">▶</div>
                        <div class="media-badge">${card.badge}</div>
                        <div class="media-duration">${card.duration}</div>
                        <div style="font-size:48px;opacity:0.3">${card.mediaIcon}</div>
                    </div>
                    
                    <div class="card-title"><span>⚠️ LEAK</span> ${title}</div>
                    <div class="card-desc">${desc}</div>
                    
                    <div class="engagement-bar">
                        <div class="eng-item active">❤️ ${likes}</div>
                        <div class="eng-item">💬 ${comments}</div>
                        <div class="eng-item">↗️ ${shares}</div>
                    </div>
                    
                    <div class="click-hint">
                        👆 TAP TO VIEW COMPLETE LEAK → <span style="font-size:12px">▶</span>
                    </div>
                </div>
            `;
        }).join('');
    };
    
    // ========== GENERATE STORIES ==========
    const generateStories = () => {
        return STORIES.map((story, idx) => `
            <div class="story-item" data-url="${genLink(story.name).url}" style="animation-delay:${0.02 + idx*0.01}s">
                <div class="story-ring"><div class="story-ring-inner">${story.emoji}</div></div>
                <div class="story-name">${story.name}</div>
            </div>
        `).join('');
    };
    
    // ========== GENERATE HASHTAGS ==========
    const generateHashtags = () => {
        let tags = [...HASHTAGS];
        let nameHash = `#${displayName.replace(/\s/g,'')}Leak`;
        tags.unshift(nameHash);
        return tags.map(tag => `
            <div class="hashtag ${tag.includes(nameHash) ? 'hashtag-trend' : ''}" data-url="${genLink(tag).url}">${tag} 🔥</div>
        `).join('');
    };
    
    // ========== RENDER HERO ==========
    const renderHero = () => {
        let trendingRank = range(1, 5);
        let totalViews = formatNumber(range(125, 1850));
        return `
            <div class="viral-hero">
                <div class="hero-badge">#${trendingRank} TRENDING NOW</div>
                <div class="hero-title"><span>${displayName}</span> LEAK HUB</div>
                <div class="hero-stats">
                    <div class="hero-stat"><strong>${totalViews}K</strong> viral views</div>
                    <div class="hero-stat"><strong>${range(12, 85)}</strong> active leaks</div>
                    <div class="hero-stat"><strong>⚡</strong> real-time</div>
                </div>
            </div>
        `;
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let titles = [
            `${displayName} Viral Leak Hub — Trending Content Discovery`,
            `${displayName} Leak Feed — Watch Viral Content Now`,
            `${displayName} Complete Leak Archive — Trending #1`,
            `🔥 ${displayName} Leak — Viral Video Compilation`
        ];
        let descs = [
            `Trending ${displayName} leak content. ${range(45, 850)}+ viral videos. Watch now before takedown. Updated real-time.`,
            `${displayName} viral leak hub. Complete archive. Trending worldwide. Tap to watch.`,
            `Discover ${displayName} leaked content. #1 trending. Click to view complete collection.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        document.getElementById('app').innerHTML = `
            <div class="sticky-header">
                <div class="logo">🔴 VIRAL<span style="color:#ff4444">LEAK</span></div>
                <div class="trending-badge"><div class="trending-dot"></div> ${range(125, 850)}K watching</div>
            </div>
            
            <div class="story-row">
                ${generateStories()}
            </div>
            
            ${renderHero()}
            
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="Search ${displayName} leaks..." value="${displayName} leak">
                <div class="search-hot">HOT</div>
            </div>
            
            <div class="hashtag-row">
                ${generateHashtags()}
            </div>
            
            <div class="viral-feed">
                ${generateViralCards()}
            </div>
            
            <div class="bottom-nav">
                <div class="nav-item active"><div class="nav-icon">🔥</div><div>For You</div></div>
                <div class="nav-item"><div class="nav-icon">🔍</div><div>Discover</div></div>
                <div class="nav-item"><div class="nav-icon">📁</div><div>Archives</div></div>
                <div class="nav-item"><div class="nav-icon">👤</div><div>Profile</div></div>
            </div>
        `;
        
        document.querySelectorAll('[data-url]').forEach(el => {
            el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
            el.addEventListener('touchstart', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
        });
        document.querySelectorAll('.viral-card, .story-item, .hashtag, .nav-item').forEach(card => {
            if(card.classList && card.classList.contains('viral-card')){
                card.addEventListener('click', () => { if(card.getAttribute('data-url')) window.location.href = card.getAttribute('data-url'); });
                card.addEventListener('touchstart', () => { if(card.getAttribute('data-url')) window.location.href = card.getAttribute('data-url'); });
            }
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
</body>
</html>
