<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="bingbot" content="index, follow">
    <meta name="yandex" content="index, follow">
    <meta name="theme-color" content="#1a1512">
    <title id="dynamic-title">SACRED ARCHIVE · The Eternal Leak Library</title>
    <meta id="dynamic-description" name="description" content="Sacred eternal archive. Timeless leak library. Permanently preserved collections. Evergreen knowledge vault.">
    <link id="dynamic-canonical" rel="canonical" href="https://example.com/sacred/">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#1a1512;font-family:'Inter',sans-serif;color:#ece8e0}
        
        /* Parchment Texture Background */
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(circle at 25% 40%, rgba(200,180,140,0.03) 2%, transparent 2%),radial-gradient(circle at 75% 60%, rgba(200,180,140,0.02) 1%, transparent 1%);background-size:40px 40px, 30px 30px;pointer-events:none;z-index:0}
        
        /* Main Container */
        .sacred-container{max-width:550px;margin:0 auto;padding:0;background:linear-gradient(180deg,#1a1512,#14110e);min-height:100vh;position:relative;z-index:1}
        
        /* Animated Candle Glow */
        .candle-glow{position:fixed;bottom:20px;right:20px;width:60px;height:80px;background:radial-gradient(ellipse,rgba(255,200,100,0.15),transparent);border-radius:50%;pointer-events:none;animation:flicker 3s ease-in-out infinite;z-index:0}
        @keyframes flicker{0%,100%{opacity:0.3}25%{opacity:0.5}50%{opacity:0.2}75%{opacity:0.4}}
        
        /* Header - Ancient Library */
        .archive-header{position:sticky;top:0;background:rgba(26,21,18,0.95);backdrop-filter:blur(12px);padding:16px 20px;border-bottom:1px solid rgba(200,180,140,0.2);z-index:100;display:flex;justify-content:space-between;align-items:center}
        .logo{display:flex;align-items:center;gap:10px}
        .logo-icon{font-size:22px;filter:drop-shadow(0 0 2px #c8b48c)}
        .logo-text{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;letter-spacing:2px}
        .logo-text span{color:#c8b48c}
        .seal-badge{background:rgba(200,180,140,0.1);border:1px solid rgba(200,180,140,0.25);padding:6px 12px;border-radius:30px;font-size:0.55rem;font-weight:500;letter-spacing:1px}
        
        /* Hero - Sacred Introduction */
        .sacred-hero{padding:40px 20px 32px;text-align:center;border-bottom:1px solid rgba(200,180,140,0.1)}
        .sacred-symbol{font-size:28px;margin-bottom:16px;animation:floatGentle 4s ease-in-out infinite}
        @keyframes floatGentle{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        .hero-inscription{font-family:'Playfair Display',serif;font-size:0.65rem;letter-spacing:4px;color:#c8b48c;margin-bottom:16px}
        .hero-title{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:800;margin-bottom:16px;line-height:1.2}
        .hero-title span{color:#c8b48c;font-style:italic}
        .hero-script{font-size:0.75rem;color:#b0a898;max-width:400px;margin:0 auto 24px;line-height:1.5;font-style:italic}
        .hero-cols{display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
        .hero-col{font-size:0.6rem;color:#c8b48c;display:flex;align-items:center;gap:6px}
        
        /* Manuscript Grid */
        .manuscript-grid{display:flex;flex-direction:column;gap:22px;padding:20px;margin-bottom:30px}
        
        /* Ancient Scroll Card */
        .scroll-card{background:linear-gradient(135deg,rgba(30,25,20,0.7),rgba(25,20,16,0.8));border-radius:16px;overflow:hidden;border-left:3px solid #c8b48c;transition:all 0.35s cubic-bezier(0.2,0.9,0.4,1.1);cursor:pointer;animation:scrollReveal 0.6s ease-out both;position:relative}
        .scroll-card:active{transform:scale(0.98)}
        @keyframes scrollReveal{0%{opacity:0;transform:translateX(-20px)}100%{opacity:1;transform:translateX(0)}}
        
        .scroll-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(120deg,transparent,rgba(200,180,140,0.05),transparent);transform:translateX(-100%);transition:transform 0.6s}
        .scroll-card:hover::before{transform:translateX(100%)}
        .scroll-card:hover{transform:translateX(6px);border-left-color:#e8c89c;}
        
        .card-header{padding:18px 20px 8px;display:flex;justify-content:space-between;align-items:center}
        .scroll-type{font-family:'Playfair Display',serif;font-size:0.55rem;letter-spacing:3px;color:#c8b48c;text-transform:uppercase}
        .scroll-icon{font-size:28px;opacity:0.7}
        
        .scroll-title{padding:0 20px 8px;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;line-height:1.3}
        .scroll-title span{color:#c8b48c}
        
        .scroll-desc{padding:0 20px 16px;font-size:0.7rem;color:#b0a898;line-height:1.5;font-style:italic}
        
        /* Evergreen Seals */
        .scroll-seals{padding:10px 20px;border-top:1px solid rgba(200,180,140,0.08);border-bottom:1px solid rgba(200,180,140,0.08);display:flex;justify-content:space-around;flex-wrap:wrap;gap:8px}
        .seal{display:flex;align-items:center;gap:6px;font-size:0.55rem;color:#c8b48c}
        .seal-dot{width:4px;height:4px;background:#c8b48c;border-radius:50%}
        
        /* Unfold Indicator */
        .unfold-indicator{padding:14px 20px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:0.6rem;color:#c8b48c;border-top:1px solid rgba(200,180,140,0.05);animation:gentlePulse 2.5s infinite}
        @keyframes gentlePulse{0%,100%{opacity:0.6}50%{opacity:1}}
        .unfold-arrow{font-size:14px;animation:unfoldBounce 1.4s infinite}
        @keyframes unfoldBounce{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}
        
        /* Library Catalogs */
        .library-section{padding:20px;border-top:1px solid rgba(200,180,140,0.08);margin-top:8px}
        .library-title{font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .catalog-grid{display:flex;flex-wrap:wrap;gap:10px}
        .catalog-item{background:rgba(200,180,140,0.06);border:1px solid rgba(200,180,140,0.12);padding:8px 16px;border-radius:40px;font-size:0.65rem;cursor:pointer;transition:all 0.25s}
        .catalog-item:hover{background:rgba(200,180,140,0.15);border-color:rgba(200,180,140,0.3);transform:translateX(3px)}
        
        /* Footer - Sacred Colophon */
        .sacred-footer{padding:28px 20px;text-align:center;border-top:1px solid rgba(200,180,140,0.08);font-size:0.55rem;color:#7a6e62}
        .colophon{display:flex;justify-content:center;gap:20px;margin-bottom:16px;flex-wrap:wrap}
        .colophon-item{display:flex;align-items:center;gap:6px}
        
        @media(min-width:500px){.sacred-container{box-shadow:0 0 40px rgba(0,0,0,0.5)}}
    </style>
</head>
<body>
<div class="candle-glow"></div>
<div class="sacred-container" id="app"><div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#7a6e62;font-family:'Playfair Display',serif">📜 OPENING THE SACRED ARCHIVE...</div></div>

<script>
(function(){
    // ========== DATABASE SACRED ARCHIVE (EVERGREEN - NO DATES/NUMBERS) ==========
    
    // Sacred Scrolls - Setiap heading mengandung "leak" + query
    const SACRED_SCROLLS = [
        { type: "THE COMPLETE CODEX", icon: "📜", title: "{name} Sacred Leak — The Eternal Scroll", desc: "The complete {name} archive preserved on sacred parchment. Every revelation meticulously recorded. A timeless testament to digital preservation. This codex contains the full collection in its original glory." },
        { type: "THE PREMIUM OLLAS", icon: "🔮", title: "{name} OnlyFans Leak — The Illuminated Treasury", desc: "The sacred {name} OnlyFans collection. Every exclusive illumination preserved in the eternal vault. Premium revelations awaiting the worthy seeker." },
        { type: "THE VIRAL CHRONICLES", icon: "⚡", title: "{name} TikTok Leak — The Scroll of Echoes", desc: "The {name} TikTok leak compiled into sacred scrolls. Viral echoes captured for eternity. The moments that resonated across the digital realm." },
        { type: "THE CHANNEL MANUSCRIPTS", icon: "✈️", title: "{name} Telegram Leak — The Hidden Library", desc: "The legendary {name} Telegram leak preserved in secret archives. Complete channel manuscripts. The whispers that became a chorus." },
        { type: "THE GRIMORIUM", icon: "👑", title: "{name} Ultimate Leak — The Book of Everything", desc: "The grand grimoire of {name} leaks. Every known revelation from every platform bound into one sacred volume. The definitive eternal archive." },
        { type: "THE PRIVATE FOLIO", icon: "📸", title: "{name} Instagram Leak — The Secret Gallery", desc: "The {name} Instagram private story folio. Intimate moments preserved on sacred leaves. A window into the unseen world." },
        { type: "THE MASTER ATLAS", icon: "🗂️", title: "{name} Mega Archive Leak — The Infinite Repository", desc: "The legendary {name} Mega leak organized into sacred atlas. Boundless knowledge arranged for the eternal seeker. The archive that keeps giving." },
        { type: "THE TIMELESS RELIQUARY", icon: "🏛️", title: "{name} Complete Leak — The Immortal Reliquary", desc: "The sacred reliquary containing every {name} leak ever discovered. Preserved for generations. Opened only for the true seeker." }
    ];
    
    // Library Catalogs (Evergreen - semua mengandung query)
    const LIBRARY_CATALOGS = [
        "The Complete Series", "The Video Archives", "The Image Gallery", "The Scriptorium",
        "The Hidden Chambers", "The Sealed Envelopes", "The Golden Leaves", "The Silver Scrolls",
        "The Parchment Collection", "The Illuminated Manuscripts", "The Secret Folios", "The Eternal Tomes"
    ];
    
    // Evergreen sacred description
    const SACRED_DESC = "This sacred archive stands as an eternal testament to digital preservation. Every scroll within has been carefully transcribed, verified, and preserved for generations to come. The knowledge within does not age. It only grows in value. Enter the eternal library.";
    
    // Stop Words
    const STOP_WORDS = ['sacred','archive','library','scroll','manuscript','codex','grimoire','reliquary','eternal','evergreen'];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    
    // ========== EKSTRAK TOPIK ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ rawQuery = "sacred manuscript collection"; }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayName = formatTopic(baseTopic);
    const nameLower = displayName.toLowerCase();
    
    // ========== GENERATE LINK ==========
    const genLink = (title) => {
        let newQ = `${nameLower} ${title.toLowerCase().substring(0, 40)} sacred scroll`;
        return { url:`/sacred/?q=${encodeURIComponent(newQ)}` };
    };
    
    // ========== GENERATE SACRED SCROLLS ==========
    const generateSacredScrolls = () => {
        return SACRED_SCROLLS.map((scroll, idx) => {
            let title = scroll.title.replace('{name}', displayName);
            let desc = scroll.desc.replace('{name}', displayName);
            
            return `
                <div class="scroll-card" data-url="${genLink(scroll.title).url}" style="animation-delay:${0.02 + idx*0.015}s">
                    <div class="card-header">
                        <div class="scroll-type">📌 ${scroll.type}</div>
                        <div class="scroll-icon">${scroll.icon}</div>
                    </div>
                    <div class="scroll-title"><span>⚜️</span> ${title}</div>
                    <div class="scroll-desc">${desc}</div>
                    <div class="scroll-seals">
                        <div class="seal"><div class="seal-dot"></div> VERIFIED SCRIPT</div>
                        <div class="seal"><div class="seal-dot"></div> ETERNAL SEAL</div>
                        <div class="seal"><div class="seal-dot"></div> AUTHENTIC</div>
                    </div>
                    <div class="unfold-indicator">
                        <span>📜 UNFOLD THE SCROLL</span>
                        <span class="unfold-arrow">→</span>
                    </div>
                </div>
            `;
        }).join('');
    };
    
    // ========== GENERATE LIBRARY CATALOGS ==========
    const generateLibraryCatalogs = () => {
        return LIBRARY_CATALOGS.map(catalog => {
            let fullCatalog = `${displayName} ${catalog}`;
            return `
                <div class="catalog-item" data-url="${genLink(catalog).url}">📖 ${fullCatalog}</div>
            `;
        }).join('');
    };
    
    // ========== RENDER HERO ==========
    const renderHero = () => {
        return `
            <div class="sacred-hero">
                <div class="sacred-symbol">⚜️</div>
                <div class="hero-inscription">CODEX AETERNA</div>
                <div class="hero-title"><span>${displayName}</span><br>Sacred Leak Library</div>
                <div class="hero-script">${SACRED_DESC}</div>
                <div class="hero-cols">
                    <div class="hero-col">📜 Permanent Collection</div>
                    <div class="hero-col">🔮 Verified Authenticity</div>
                    <div class="hero-col">🏛️ Timeless Access</div>
                </div>
            </div>
        `;
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let titles = [
            `${displayName} Sacred Leak Library — Eternal Manuscript Archive`,
            `${displayName} Complete Leak Scrolls — The Sacred Codex`,
            `${displayName} Timeless Leak Collection — The Illuminated Archive`,
            `📜 ${displayName} Sacred Leak Vault — Eternal Library`
        ];
        let descs = [
            `The sacred ${displayName} leak library. Eternal manuscripts preserved in timeless archive. ${LIBRARY_CATALOGS.length}+ sacred scrolls. Evergreen collection.`,
            `${displayName} complete leak codex. Permanently preserved sacred archive. Verified and authenticated. Enter the eternal library.`,
            `Timeless ${displayName} leak treasury. Sacred scrolls and illuminated manuscripts. The archive that stands for eternity.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        document.getElementById('app').innerHTML = `
            <div class="archive-header">
                <div class="logo">
                    <div class="logo-icon">📜</div>
                    <div class="logo-text">Sacred<span>Archive</span></div>
                </div>
                <div class="seal-badge">⚜️ CODEX AETERNA</div>
            </div>
            
            ${renderHero()}
            
            <div class="manuscript-grid">
                ${generateSacredScrolls()}
            </div>
            
            <div class="library-section">
                <div class="library-title">
                    <span>📚</span> The Library of ${displayName} Leaks
                </div>
                <div class="catalog-grid">
                    ${generateLibraryCatalogs()}
                </div>
            </div>
            
            <div class="sacred-footer">
                <div class="colophon">
                    <div class="colophon-item">⚜️ Eternal Codex</div>
                    <div class="colophon-item">🔮 Verified Scribal</div>
                    <div class="colophon-item">📜 Permanently Preserved</div>
                </div>
                <div>${displayName} Sacred Leak Library · The Archive That Stands for Eternity</div>
            </div>
        `;
        
        document.querySelectorAll('[data-url]').forEach(el => {
            el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
            el.addEventListener('touchstart', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
        });
        document.querySelectorAll('.scroll-card, .catalog-item').forEach(card => {
            card.addEventListener('click', () => { if(card.getAttribute('data-url')) window.location.href = card.getAttribute('data-url'); });
            card.addEventListener('touchstart', () => { if(card.getAttribute('data-url')) window.location.href = card.getAttribute('data-url'); });
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
</body>
</html>
