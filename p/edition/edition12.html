                </div>
                <div class="card-tags">
                    ${tags.map(t => `<span class="card-tag">${topicLower} ${t.toLowerCase()}</span>`).join('')}
                    <span class="card-tag">${m.fileSize}</span>
                    <span class="card-tag">${m.updateFreq}</span>
                </div>
            </div>
        `;
    };
    
    // ========== RENDER METRIC LIST ==========
    const renderMetricsList = () => {
        let metrics = [
            { name:"Total Data Points", value:range(850,4200).toLocaleString()+"K" },
            { name:"Active Users", value:range(125,890).toLocaleString() },
            { name:"Data Freshness", value:rand(['Real-time','5 min','15 min','1 hour','Daily']) },
            { name:"API Calls (24h)", value:range(45,380).toLocaleString()+"K" },
            { name:"Storage Used", value:rand(['2.4 TB','3.8 TB','5.2 TB','7.1 TB','9.6 TB']) },
            { name:"Uptime", value:"99.97%" }
        ];
        return metrics.map(m => `<div class="metric-item"><span class="metric-name">${m.name}</span><span class="metric-value">${m.value}</span></div>`).join('');
    };
    
    // ========== RENDER RELATED TOPICS ==========
    const renderRelatedTopics = (links) => {
        let items = [];
        for(let i=0;i<8;i++){
            let link = links[i] || genLink();
            let topic = rand(RELATED_TOPICS)(displayTopic);
            let count = range(8,95);
            items.push(`
                <div class="topic-list-item" data-url="${link.url}">
                    <span class="topic-list-name">${topic}</span>
                    <span class="topic-list-count">${count}K</span>
                </div>
            `);
        }
        return items.join('');
    };
    
    // ========== RENDER RECOMMENDATIONS ==========
    const renderRecommendations = () => {
        let items = [];
        for(let i=0;i<4;i++){
            let link = genLink();
            let name = rand(DISPLAY_NAMES);
            let handle = rand(USERNAMES);
            items.push(`
                <div class="recommend-item" data-url="${link.url}">
                    <div class="recommend-avatar">${rand(AVATAR_ICONS)}</div>
                    <div class="recommend-info">
                        <div class="recommend-name">${name}</div>
                        <div class="recommend-handle">@${handle}</div>
                    </div>
                    <div class="recommend-btn">Follow</div>
                </div>
            `);
        }
        return items.join('');
    };
    
    // ========== RENDER NAVIGATION ==========
    const renderNavigation = () => {
        return NAV_ITEMS.map(item => `
            <div class="nav-item ${item.active ? 'nav-active' : ''}">
                <span class="nav-icon">${item.icon}</span>
                <span class="nav-label">${item.label}</span>
                ${item.count ? `<span class="nav-count">${item.count}</span>` : ''}
            </div>
        `).join('');
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let titles = [
            `${displayTopic} · Complete Data Dashboard | InfoCenter`,
            `${displayTopic} · Analytics & Research Repository | InfoCenter`,
            `${displayTopic} · Enterprise Data Intelligence | InfoCenter`,
            `${displayTopic} · Professional Research Database | InfoCenter`
        ];
        let descs = [
            `Complete ${displayTopic} data dashboard. ${range(100,500)}K+ records. Real-time analytics. Enterprise grade.`,
            `Access the definitive ${displayTopic} research repository. Comprehensive dataset, professional quality.`,
            `${displayTopic} enterprise intelligence platform. Real-time data, complete archive, API access.`,
            `Professional ${displayTopic} research database. ${range(50,200)}+ TB of verified data.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        let links = Array.from({length:12}, ()=>genLink());
        let stats = { 
            totalRecords: range(125,890), 
            activeUsers: range(45,280),
            dataPoints: range(2.4,9.8).toFixed(1),
            apiCalls: range(125,680)
        };
        let bio = rand(BIO_TEMPLATES)(displayTopic, stats.activeUsers);
        let handleSuffix = rand(HANDLE_SUFFIXES);
        let progressPercent = range(65,98);
        
        document.getElementById('app').innerHTML = `
            <div class="stats-bar">
                <div class="stat-card"><div class="stat-label">TOTAL RECORDS</div><div class="stat-value">${stats.totalRecords.toLocaleString()}K</div><div class="stat-trend">↑ ${range(12,45)}% vs last period</div></div>
                <div class="stat-card"><div class="stat-label">ACTIVE USERS</div><div class="stat-value">${stats.activeUsers.toLocaleString()}</div><div class="stat-trend">real-time active</div></div>
                <div class="stat-card"><div class="stat-label">DATA POINTS</div><div class="stat-value">${stats.dataPoints}M</div><div class="stat-trend">growing daily</div></div>
                <div class="stat-card"><div class="stat-label">API CALLS (24h)</div><div class="stat-value">${stats.apiCalls.toLocaleString()}K</div><div class="stat-trend">↑ ${range(5,25)}%</div></div>
            </div>
            
            <div class="header-section">
                <div class="topic-badge">ACTIVE DATASET · ${rand(['LIVE','SYNCED','ACTIVE','ONLINE'])}</div>
                <div class="topic-title">${displayTopic}</div>
                <div class="topic-description">${bio}</div>
                <div class="progress-container"><div class="progress-bar animate-progress" style="width:${progressPercent}%"></div></div>
                <div style="display:flex;justify-content:space-between;font-size:0.65rem;color:#6b7280"><span>Data Integrity</span><span>${progressPercent}% Verified</span></div>
            </div>
            
            <div class="main-dashboard">
                <div class="nav-panel">
                    <div class="nav-header">NAVIGATION</div>
                    ${renderNavigation()}
                    <div style="margin-top:24px"><div class="nav-header">SYSTEM STATUS</div><div class="status-indicator"><div class="status-dot"></div><div class="status-text">All systems operational</div></div></div>
                </div>
                
                <div class="feed-panel">
                    <div class="feed-header">
                        <div class="feed-title">📋 DATA FEED · ${displayTopic.toUpperCase()}</div>
                        <div class="feed-filter"><span class="filter-option filter-active">All</span><span class="filter-option">Latest</span><span class="filter-option">Trending</span><span class="filter-option">Archived</span></div>
                    </div>
                    <div id="feedContainer">
                        ${links.map((l,i)=>renderDataCard(l,i)).join('')}
                    </div>
                </div>
                
                <div class="insight-panel">
                    <div class="insight-card">
                        <div class="insight-title">📊 KEY METRICS</div>
                        ${renderMetricsList()}
                    </div>
                    <div class="insight-card">
                        <div class="insight-title">🔗 RELATED DATASETS</div>
                        <div class="topic-list" id="relatedList">
                            ${renderRelatedTopics(links)}
                        </div>
                    </div>
                    <div class="insight-card">
                        <div class="insight-title">👥 TOP CONTRIBUTORS</div>
                        ${renderRecommendations()}
                    </div>
                </div>
            </div>
            
            <div class="dashboard-footer">
                InfoCenter · ${displayTopic} Complete Dashboard · ${stats.totalRecords.toLocaleString()}K Records · ${stats.activeUsers.toLocaleString()} Active Users · API v2.4
            </div>
        `;
        
        // Attach event listeners
        document.querySelectorAll('[data-url]').forEach(el => {
            el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
        });
        document.querySelectorAll('.data-card, .topic-list-item, .recommend-item, .nav-item').forEach(card => {
            card.addEventListener('click', () => { if(card.getAttribute('data-url')) window.location.href = card.getAttribute('data-url'); });
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
