<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="referrer" content="always">
    <title id="dynamic-title">PREMIUM ACCESS · Complete Content Vault</title>
    <meta id="dynamic-description" name="description" content="Premium content access gateway. Complete vault with exclusive collections and verified archives.">
    <link id="dynamic-canonical" rel="canonical" href="https://example.com/access/">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#16213e 100%);min-height:100vh;font-family:'Montserrat',sans-serif;color:#e2e2e6}
        
        /* Style Premium Gateway - Luxury, Exclusive, High-End */
        .gateway-container{max-width:1300px;margin:0 auto;padding:32px 24px}
        
        /* Hero Section - Luxury */
        .hero-premium{text-align:center;margin-bottom:60px}
        .premium-badge{display:inline-block;background:linear-gradient(135deg,#c4a747,#e8c87a);color:#0a0a0a;padding:6px 20px;border-radius:40px;font-size:0.7rem;font-weight:800;letter-spacing:2px;margin-bottom:24px;text-transform:uppercase}
        .hero-title{font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:800;margin-bottom:16px;background:linear-gradient(135deg,#fff,#c4a747);-webkit-background-clip:text;background-clip:text;color:transparent}
        .hero-subtitle{font-size:1rem;color:#aaa;max-width:600px;margin:0 auto 32px;line-height:1.6}
        
        /* Access Options - 3 Tiers */
        .tiers-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;margin-bottom:60px}
        .tier-card{background:rgba(20,20,40,0.6);backdrop-filter:blur(12px);border-radius:28px;padding:32px;border:1px solid rgba(196,167,71,0.2);transition:all 0.3s;cursor:pointer;position:relative}
        .tier-card:hover{transform:translateY(-8px);border-color:#c4a747;box-shadow:0 20px 40px rgba(0,0,0,0.3)}
        .tier-popular{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:#c4a747;color:#0a0a0a;padding:4px 16px;border-radius:30px;font-size:0.6rem;font-weight:800;letter-spacing:1px}
        .tier-icon{font-size:48px;margin-bottom:20px}
        .tier-name{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:8px}
        .tier-price{font-size:2rem;font-weight:800;color:#c4a747;margin-bottom:16px}
        .tier-price span{font-size:0.8rem;color:#888}
        .tier-features{list-style:none;margin:20px 0;padding-top:20px;border-top:1px solid rgba(255,255,255,0.1)}
        .tier-features li{padding:8px 0;font-size:0.75rem;display:flex;align-items:center;gap:8px}
        .tier-button{background:transparent;border:1px solid #c4a747;padding:12px 24px;border-radius:40px;font-weight:600;width:100%;cursor:pointer;transition:all 0.2s;color:#fff}
        .tier-button:hover{background:#c4a747;color:#0a0a0a}
        
        /* Featured Collections */
        .featured-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
        .featured-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700}
        .featured-link{color:#c4a747;font-size:0.8rem;cursor:pointer}
        
        .collections-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;margin-bottom:60px}
        .collection-card{background:rgba(20,20,40,0.4);border-radius:24px;padding:24px;border:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:all 0.3s}
        .collection-card:hover{background:rgba(30,30,50,0.6);border-color:#c4a74740;transform:translateY(-4px)}
        .collection-icon{font-size:32px;margin-bottom:16px}
        .collection-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:8px}
        .collection-desc{font-size:0.7rem;color:#aaa;margin-bottom:16px;line-height:1.5}
        .collection-meta{display:flex;justify-content:space-between;font-size:0.6rem;color:#666}
        
        /* Testimonials */
        .testimonials-section{margin-bottom:60px}
        .testimonials-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
        .testimonial-card{background:rgba(20,20,40,0.4);border-radius:20px;padding:24px;border-left:3px solid #c4a747}
        .testimonial-text{font-size:0.8rem;line-height:1.5;color:#ccc;margin-bottom:16px;font-style:italic}
        .testimonial-author{font-size:0.7rem;font-weight:600;color:#c4a747}
        .testimonial-role{font-size:0.55rem;color:#666}
        
        /* FAQ Section */
        .faq-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:60px}
        .faq-item{padding:16px;border-bottom:1px solid rgba(255,255,255,0.05)}
        .faq-question{font-size:0.85rem;font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;cursor:pointer}
        .faq-answer{font-size:0.7rem;color:#888;line-height:1.5;margin-top:8px}
        
        /* Footer */
        .gateway-footer{margin-top:60px;padding:32px 0;border-top:1px solid rgba(255,255,255,0.05);text-align:center;font-size:0.65rem;color:#666;display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px}
        
        @media(max-width:900px){.tiers-grid{grid-template-columns:1fr;max-width:400px;margin-left:auto;margin-right:auto}.testimonials-grid{grid-template-columns:1fr}.faq-grid{grid-template-columns:1fr}.hero-title{font-size:2.5rem}}
        @media(max-width:600px){.gateway-container{padding:20px 16px}.hero-title{font-size:1.8rem}}
    </style>
</head>
<body>
<div class="gateway-container" id="app"><div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#666;font-family:'Montserrat',sans-serif">⚡ Loading Premium Gateway...</div></div>

<script>
(function(){
    // ========== DATABASE PREMIUM GATEWAY ==========
    
    // Collection Names
    const COLLECTION_NAMES = [
        "The Complete Archive", "Master Vault Collection", "Ultimate Fan Library",
        "Premier Content Suite", "Signature Collection", "Legacy Archive",
        "Diamond Edition Vault", "Platinum Collection", "Collector's Choice",
        "Exclusive Masters", "Heritage Archive", "Crown Jewel Collection"
    ];
    
    // Collection Descriptions (panjang)
    const COLLECTION_DESCS = [
        "This comprehensive collection features every available piece of content spanning the entire career. Carefully curated and organized for easy access. Includes rare behind-the-scenes material and personal moments.",
        "The most requested collection in our vault. Features exclusive content not available anywhere else. Verified authentic and presented in highest quality. Updated regularly with new discoveries.",
        "Perfect for dedicated fans. Includes all major content releases plus rare bonus material. Organized by date and category for seamless browsing. Over {count} items total.",
        "Premium selection of the finest content available. Hand-picked by our curation team for quality and significance. Includes detailed metadata and preservation notes.",
        "The ultimate fan experience. This collection offers complete access to everything we've preserved. From early works to recent content, it's all here."
    ];
    
    // 40 Testimonials
    const TESTIMONIALS = [
        "Finally found what I've been searching for months. The collection is complete and well-organized. Worth every penny!",
        "Amazing quality and fast access. The team really understands what fans want. Highly recommended!",
        "I've tried other sources but nothing compares to this. Complete, verified, and constantly updated.",
        "The best investment for any fan. The archive is incredibly thorough and easy to navigate.",
        "Great customer support and even better content. So happy I found this gateway.",
        "Worth it just for the rare content alone. Everything else is a bonus. 10/10 recommended.",
        "Finally a trustworthy source. No broken links, no fake content. Just what I was looking for."
    ];
    
    // 30 FAQ Items
    const FAQS = [
        { q: "What's included in each tier?", a: "Each tier offers progressively more content. Starter includes basic collections, Pro includes all current content, and Ultimate includes everything plus future updates and priority support." },
        { q: "How often is new content added?", a: "Our team actively monitors and adds new content daily. Pro and Ultimate members get immediate access to new additions." },
        { q: "Is the content verified?", a: "Yes, all content undergoes verification process including metadata analysis and hash matching to ensure authenticity." },
        { q: "Can I access on multiple devices?", a: "Yes, your account works across all devices. Pro and Ultimate tiers support unlimited simultaneous access." },
        { q: "What if I can't find something?", a: "Our support team is available 24/7 to help you locate specific content. Ultimate members get priority assistance." },
        { q: "How do I get updates?", a: "You'll receive email notifications when new content is added to your purchased collections." }
    ];
    
    // 20 Platform Sources
    const PLATFORMS = ['TikTok','OnlyFans','Instagram','Twitter','Telegram','Discord','YouTube','Reddit'];
    
    // Stop Words
    const STOP_WORDS = ['premium','access','gateway','vault','collection','archive','content','resource','library'];
    
    // ========== UTILITY ==========
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const range = (min,max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const formatNumber = (n) => n.toLocaleString();
    
    // ========== EKSTRAK TOPIK ==========
    const urlParams = new URLSearchParams(window.location.search);
    let rawQuery = urlParams.get('q');
    if(!rawQuery || rawQuery.trim() === ""){ 
        rawQuery = "premium content access";
    }
    rawQuery = decodeURIComponent(rawQuery.replace(/\+/g,' '));
    
    let baseTopic = rawQuery.toLowerCase();
    STOP_WORDS.forEach(w => { baseTopic = baseTopic.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
    baseTopic = baseTopic.replace(/\s+/g,' ').trim();
    if(baseTopic.length < 2) baseTopic = rawQuery;
    
    const formatTopic = (s) => s.split(' ').map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    const displayName = formatTopic(baseTopic);
    const nameLower = displayName.toLowerCase();
    
    // ========== GENERATE LINK ==========
    const genLink = (type = 'collection') => {
        let newQ = `${nameLower} ${rand(['premium','complete','master','ultimate'])} ${rand(['vault','archive','collection','gateway'])}`;
        return { url:`/access/?q=${encodeURIComponent(newQ)}`, type: type };
    };
    
    // ========== GENERATE COLLECTION CARD ==========
    const generateCollectionCard = (idx) => {
        let name = rand(COLLECTION_NAMES);
        let platform = rand(PLATFORMS);
        let descTemplate = rand(COLLECTION_DESCS);
        let itemCount = formatNumber(range(45, 1850));
        let desc = descTemplate.replace('{count}', itemCount);
        let size = range(450, 3850);
        
        return `
            <div class="collection-card" data-url="${genLink('collection').url}">
                <div class="collection-icon">${idx % 2 === 0 ? '📀' : '💎'}</div>
                <div class="collection-name">${name}</div>
                <div class="collection-desc">${desc.substring(0, 100)}...</div>
                <div class="collection-meta">
                    <span>📁 ${itemCount} items</span>
                    <span>💾 ${size} MB</span>
                    <span>🔒 Premium</span>
                </div>
            </div>
        `;
    };
    
    // ========== GENERATE TESTIMONIALS ==========
    const generateTestimonials = () => {
        let testimonials = [];
        let names = ['Sarah M.','David K.','Emma L.','Michael R.','Jessica W.','Chris T.'];
        for(let i=0;i<4;i++){
            testimonials.push(`
                <div class="testimonial-card">
                    <div class="testimonial-text">"${rand(TESTIMONIALS)}"</div>
                    <div class="testimonial-author">${rand(names)}</div>
                    <div class="testimonial-role">Verified Member · ${range(3,24)} months</div>
                </div>
            `);
        }
        return testimonials.join('');
    };
    
    // ========== GENERATE FAQ ==========
    const generateFAQ = () => {
        let faqs = FAQS.slice(0,6);
        return faqs.map(faq => `
            <div class="faq-item">
                <div class="faq-question">❓ ${faq.q} <span style="color:#c4a747">▼</span></div>
                <div class="faq-answer">${faq.a}</div>
            </div>
        `).join('');
    };
    
    // ========== UPDATE SEO ==========
    const updateSEO = () => {
        let titles = [
            `${displayName} · Premium Content Gateway | Access Vault`,
            `${displayName} · Complete Archive Access | Premium Gateway`,
            `${displayName} · Exclusive Content Vault | Get Access Now`,
            `${displayName} · Premium Collections & Archives`
        ];
        let descs = [
            `Premium access gateway for ${displayName} content. Complete archives, exclusive collections, and verified content. Limited availability.`,
            `Get instant access to the complete ${displayName} vault. Premium collections with verified content. Updated daily.`,
            `${displayName} premium content access. Exclusive archives and collections. Join thousands of satisfied members.`
        ];
        document.title = rand(titles);
        let md = document.getElementById('dynamic-description'); if(md) md.setAttribute('content', rand(descs));
        let can = document.getElementById('dynamic-canonical'); if(can) can.setAttribute('href', window.location.href.split('?')[0]);
    };
    
    // ========== RENDER PAGE ==========
    const renderPage = () => {
        let memberCount = formatNumber(range(12500, 48500));
        let contentCount = formatNumber(range(12500, 48500));
        let satisfactionRate = range(94, 99);
        
        document.getElementById('app').innerHTML = `
            <div class="hero-premium">
                <div class="premium-badge">✦ PREMIUM ACCESS ✦</div>
                <div class="hero-title">${displayName}<br>Content Vault</div>
                <div class="hero-subtitle">Get instant access to the complete archive. Premium collections, verified content, and exclusive material not available anywhere else.</div>
            </div>
            
            <div class="tiers-grid">
                <div class="tier-card" data-url="${genLink('starter').url}">
                    <div class="tier-icon">📁</div>
                    <div class="tier-name">Starter Access</div>
                    <div class="tier-price">$<span>19</span> /one-time</div>
                    <ul class="tier-features">
                        <li>✓ Essential collections</li>
                        <li>✓ Standard quality access</li>
                        <li>✓ 30-day access window</li>
                        <li>✓ Email support</li>
                    </ul>
                    <button class="tier-button">Get Access →</button>
                </div>
                
                <div class="tier-card" data-url="${genLink('pro').url}">
                    <div class="tier-popular">⭐ MOST POPULAR</div>
                    <div class="tier-icon">💎</div>
                    <div class="tier-name">Pro Access</div>
                    <div class="tier-price">$<span>49</span> /one-time</div>
                    <ul class="tier-features">
                        <li>✓ All collections included</li>
                        <li>✓ Premium HD quality</li>
                        <li>✓ Lifetime access</li>
                        <li>✓ Priority support</li>
                        <li>✓ Future updates included</li>
                    </ul>
                    <button class="tier-button">Get Access →</button>
                </div>
                
                <div class="tier-card" data-url="${genLink('ultimate').url}">
                    <div class="tier-icon">👑</div>
                    <div class="tier-name">Ultimate Access</div>
                    <div class="tier-price">$<span>99</span> /one-time</div>
                    <ul class="tier-features">
                        <li>✓ Everything in Pro</li>
                        <li>✓ Exclusive bonus content</li>
                        <li>✓ 1-on-1 concierge</li>
                        <li>✓ Early access to new content</li>
                        <li>✓ VIP community access</li>
                    </ul>
                    <button class="tier-button">Get Access →</button>
                </div>
            </div>
            
            <div class="featured-header">
                <div class="featured-title">✨ Featured Collections</div>
                <div class="featured-link">View all →</div>
            </div>
            
            <div class="collections-grid">
                ${Array.from({length:6}, (_,i) => generateCollectionCard(i)).join('')}
            </div>
            
            <div class="featured-header">
                <div class="featured-title">⭐ What Our Members Say</div>
                <div class="featured-link">${memberCount}+ members</div>
            </div>
            
            <div class="testimonials-grid">
                ${generateTestimonials()}
            </div>
            
            <div class="featured-header">
                <div class="featured-title">❓ Frequently Asked Questions</div>
                <div class="featured-link">Need help? Contact support</div>
            </div>
            
            <div class="faq-grid">
                ${generateFAQ()}
            </div>
            
            <div class="gateway-footer">
                <span>✨ Premium Content Gateway v3.0</span>
                <span>⭐ ${satisfactionRate}% member satisfaction</span>
                <span>📚 ${contentCount}+ preserved items</span>
                <span>🔒 Secure access · Instant delivery</span>
            </div>
        `;
        
        // Attach event listeners
        document.querySelectorAll('[data-url]').forEach(el => {
            el.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = el.getAttribute('data-url'); });
        });
        document.querySelectorAll('.tier-card, .collection-card, .faq-question, .featured-link').forEach(card => {
            card.addEventListener('click', () => { 
                if(card.getAttribute('data-url')) window.location.href = card.getAttribute('data-url');
            });
        });
    };
    
    updateSEO();
    renderPage();
})();
</script>
</body>
</html>
